<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapot Saya | SAIS Siswa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { background: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; }

        .mobile-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .back-btn {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border-radius: 12px; color: white; text-decoration: none;
        }

        main { flex: 1; padding: 20px; width: 100%; max-width: 800px; margin: 0 auto; }

        .rapot-card { background: white; color: #334155; border-radius: 0; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .rapot-header { text-align: center; border-bottom: 2px solid #334155; padding-bottom: 20px; margin-bottom: 20px; }
        .rapot-header h2 { font-size: 18px; font-weight: 800; text-transform: uppercase; }
        
        .info-table { width: 100%; margin-bottom: 20px; font-size: 12px; }
        .info-table td { padding: 4px 0; }

        .grades-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; font-size: 12px; }
        .grades-table th, .grades-table td { border: 1px solid #334155; padding: 8px; text-align: center; }
        .grades-table th { background: #f1f5f9; }

        .footer-section { display: flex; justify-content: space-between; margin-top: 40px; font-size: 12px; }
        .signature { text-align: center; width: 150px; }
        
        @media print {
            body { background: white; }
            .mobile-header, .btn-print { display: none; }
            .rapot-card { box-shadow: none; padding: 0; }
        }
    </style>
</head>
<body>
    <div class="mobile-header">
        <a href="dashboard_siswa.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <button class="btn-print" onclick="window.print()" style="background:var(--primary); color:white; border:none; padding:8px 16px; border-radius:8px; font-size:12px;"><i class="fas fa-print"></i> Cetak</button>
    </div>

    <main>
        <div class="rapot-card">
            <div class="rapot-header">
                <h2>Laporan Hasil Belajar Siswa</h2>
                <p style="font-size: 14px;">SMP NEGERI SAIS PROFESSIONAL</p>
            </div>

            <table class="info-table">
                <tr>
                    <td width="15%">Nama Siswa</td><td width="2%">:</td><td id="rNama">-</td>
                    <td width="15%">Kelas</td><td width="2%">:</td><td id="rKelas">-</td>
                </tr>
                <tr>
                    <td>NISN</td><td>:</td><td id="rNisn">-</td>
                    <td>Semester</td><td>:</td><td>Ganjil</td>
                </tr>
            </table>

            <table class="grades-table">
                <thead>
                    <tr>
                        <th width="5%">No</th>
                        <th style="text-align: left;">Mata Pelajaran</th>
                        <th width="20%">Jenis Ujian</th>
                        <th width="15%">Nilai</th>
                        <th width="15%">Status</th>
                    </tr>
                </thead>
                <tbody id="rBody">
                    <!-- Data will be loaded -->
                </tbody>
            </table>

            <div class="footer-section">
                <div class="signature">
                    <p>Orang Tua/Wali</p>
                    <div style="height: 60px;"></div>
                    <p>( ........................ )</p>
                </div>
                <div class="signature">
                    <p>Kepala Sekolah</p>
                    <div style="height: 60px;"></div>
                    <p><strong>Dr. Budi Santoso</strong></p>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const currentUser = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('rNama').textContent = currentUser.nama || '-';
            document.getElementById('rKelas').textContent = currentUser.kelas || '-';
            document.getElementById('rNisn').textContent = currentUser.nisn || '-';

            loadRapot();
        });

        async function loadRapot() {
            const tbody = document.getElementById('rBody');
            const currentUser = JSON.parse(localStorage.getItem('sais_current_user') || '{}');

            try {
                const data = await window.db.getAllNilai();
                const filtered = data.filter(n => n.nisn === currentUser.nisn);

                if (filtered.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="padding: 20px;">Belum ada data nilai pelajaran.</td></tr>';
                    return;
                }

                // Sort by Mapel then Jenis Ujian
                filtered.sort((a, b) => a.mapel.localeCompare(b.mapel));

                tbody.innerHTML = filtered.map((n, i) => `
                    <tr>
                        <td>${i+1}</td>
                        <td style="text-align: left; font-weight: 600;">${n.mapel}</td>
                        <td>${n.jenis_ujian || '-'}</td>
                        <td style="font-weight: 700; color: var(--primary);">${n.nilai || 0}</td>
                        <td><span style="font-size: 10px; color: #10b981;"><i class="fas fa-check-circle"></i> Terverifikasi</span></td>
                    </tr>
                `).join('');
            } catch (err) { 
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="5" style="padding: 20px; color: #ef4444;">Gagal memuat data.</td></tr>';
            }
        }
    </script>
</body>
</html>
