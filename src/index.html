<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SAIS - Sistem Informasi SMP</title>
    <!-- PWA Support -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2940/2940651.png">

    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-main: #0b0f1a;
            --bg-card: #111827;
            --glass-bg: rgba(31, 41, 55, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f3f4f6;
            --text-dim: #9ca3af;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text-main);
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 24px;
            z-index: 10;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-section { text-align: center; margin-bottom: 40px; }

        .logo-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 28px;
            font-weight: 700;
            color: white;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }

        h1 { font-size: 28px; font-weight: 700; letter-spacing: -1px; margin-bottom: 4px; }
        p.subtitle { color: var(--text-dim); font-size: 15px; }

        .form-group { margin-bottom: 24px; }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-dim);
            margin-bottom: 10px;
            margin-left: 4px;
        }

        input, select {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 14px 18px;
            color: white;
            font-size: 14px;
            transition: var(--transition);
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        select option { background: #111827; color: white; }

        .input-wrapper { position: relative; }
        input[type="password"] { padding-right: 48px; }

        .toggle-password {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            cursor: pointer;
            transition: color 0.3s;
        }

        .toggle-password:hover { color: white; }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-dim);
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        .forgot-password {
            color: var(--primary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: var(--transition);
        }

        .forgot-password:hover { color: white; }

        button.login-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button.login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
        }

        button.login-btn:active { transform: translateY(-1px); }

        .loading .login-btn { pointer-events: none; opacity: 0.8; }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .spinner { display: block; }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 16px;
            padding: 14px 20px;
            margin-bottom: 24px;
            font-size: 14px;
            color: #f87171;
            display: none;
            text-align: center;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .error-message.show { display: block; }
    </style>
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="login-container">
        <div class="login-card" id="loginCard">
            <div class="logo-section">
                <div class="logo-icon">S</div>
                <h1>SAIS</h1>
                <p class="subtitle">Sistem Informasi SMP</p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="role">Masuk Sebagai</label>
                    <select id="role" required>
                        <option value="siswa">Siswa / Orang Tua</option>
                        <option value="guru">Guru Mapel / Wali Kelas</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="username">Username / NISN</label>
                    <input type="text" id="username" placeholder="Masukkan username atau NISN" required>
                </div>

                <div class="form-group">
                    <label for="password">Kata Sandi</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="Masukkan kata sandi" required>
                        <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                </div>

                <div class="options">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span>Ingat Saya</span>
                    </label>
                    <a href="#" class="forgot-password">Lupa kata sandi?</a>
                </div>

                <button type="submit" class="login-btn" id="submitBtn">
                    <div class="spinner"></div>
                    <span id="btnText">Masuk ke Sistem</span>
                </button>
            </form>
        </div>
    </div>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <script>
        // Toggle Password Visibility
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });

        // Show/Hide Error Message
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }

        function hideError() {
            document.getElementById('errorMessage').classList.remove('show');
        }

        // Login Form Handler
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            hideError();

            const role = document.getElementById('role').value;
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const card = document.getElementById('loginCard');

            card.classList.add('loading');
            document.getElementById('btnText').innerText = 'Memverifikasi...';

            // Simulate network delay
            await new Promise(resolve => setTimeout(resolve, 500));

            // Login menggunakan Database Helper
            let loginSuccess = false;
            let userData = null;
            let matchedRole = role;

            try {
                if (role === 'admin') {
                    userData = await window.db.verifyAdminLogin(username, password);
                    if (userData) {
                        loginSuccess = true;
                    }
                } else if (role === 'guru') {
                    userData = await window.db.verifyGuruLogin(username, password);
                    if (userData) {
                        loginSuccess = true;
                    }
                } else if (role === 'siswa') {
                    userData = await window.db.verifySiswaLogin(username, password);
                    if (userData) {
                        loginSuccess = true;
                    }
                }
            } catch (e) {
                console.error('Login error:', e);
            }

            if (loginSuccess && userData) {
                // Simpan session
                window.Session.set(userData, role);
                redirectByRole(role);
            } else {
                card.classList.remove('loading');
                document.getElementById('btnText').innerText = 'Masuk ke Sistem';
                showError('Username atau password salah!');
            }
        });

        // Helper function untuk label role
        function getRoleLabel(role) {
            const labels = {
                'admin': 'Administrator',
                'guru': 'Guru',
                'siswa': 'Siswa/Orang Tua'
            };
            return labels[role] || role;
        }

        function redirectByRole(role) {
            if (role === 'siswa') {
                window.location.href = 'dashboard_siswa.html';
            } else if (role === 'guru') {
                window.location.href = 'dashboard_guru.html';
            } else if (role === 'admin') {
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'dashboard_siswa.html';
            }
        }
    </script>
</body>
</html>
