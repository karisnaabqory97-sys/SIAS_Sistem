<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Ujian | SAIS Guru</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { background: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; }

        .mobile-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .back-btn {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border-radius: 12px; color: white; text-decoration: none;
        }

        main { flex: 1; padding: 20px; width: 100%; max-width: 800px; margin: 0 auto; }

        header { margin-bottom: 24px; }
        h1 { font-size: 20px; font-weight: 700; }
        .subtitle { font-size: 13px; color: var(--text-dim); }

        .exam-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 16px; }
        .exam-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .exam-title { font-size: 16px; font-weight: 600; }
        .exam-badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .badge-uts { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .badge-uas { background: rgba(16, 185, 129, 0.1); color: #10b981; }

        .exam-meta { display: flex; flex-direction: column; gap: 8px; font-size: 13px; color: var(--text-dim); }
        .exam-meta-item { display: flex; align-items: center; gap: 8px; }
        .exam-meta-item i { width: 16px; text-align: center; color: var(--primary); }
    </style>
</head>
<body>
    <div class="mobile-header">
        <a href="dashboard_guru.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div style="text-align: right;">
            <p id="userNama" style="font-size: 13px; font-weight: 600;">Nama Guru</p>
            <p id="userMapel" style="font-size: 11px; color: var(--text-dim);">Mapel -</p>
        </div>
    </div>

    <main>
        <header>
            <h1>Jadwal Ujian</h1>
            <p class="subtitle">Daftar pengawasan ujian semester ini.</p>
        </header>

        <div id="examContainer">
            <!-- Populated by JS -->
            <p style="text-align: center; padding: 40px; color: var(--text-dim);">Memuat jadwal ujian...</p>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userNama').textContent = currentUser.nama || 'Guru';
            document.getElementById('userMapel').textContent = currentUser.mapel || '-';
            
            renderExams();
        });

        function renderExams() {
            const container = document.getElementById('examContainer');
            const exams = [
                { mapel: 'Matematika', jenis: 'UTS', tanggal: '2025-10-12', waktu: '08:00 - 10:00', ruang: 'Lab Komputer', kelas: 'VII-A' },
                { mapel: 'Bahasa Indonesia', jenis: 'UAS', tanggal: '2025-12-05', waktu: '08:00 - 10:00', ruang: 'Ruang 102', kelas: 'VIII-B' }
            ];

            container.innerHTML = exams.map(u => `
                <div class="exam-card">
                    <div class="exam-header">
                        <div class="exam-title">${u.mapel} (${u.kelas})</div>
                        <span class="exam-badge badge-${u.jenis.toLowerCase()}">${u.jenis}</span>
                    </div>
                    <div class="exam-meta">
                        <div class="exam-meta-item"><i class="fas fa-calendar-alt"></i> ${u.tanggal}</div>
                        <div class="exam-meta-item"><i class="fas fa-clock"></i> ${u.waktu}</div>
                        <div class="exam-meta-item"><i class="fas fa-door-open"></i> ${u.ruang}</div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
