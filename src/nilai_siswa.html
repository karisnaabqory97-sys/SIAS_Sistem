<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Nilai | SAIS Siswa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { background: var(--bg-main); color: var(--text-main); display: flex; min-height: 100vh; flex-direction: column; }

        /* Mobile Header */
        .mobile-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .back-btn {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border-radius: 12px; color: white; text-decoration: none;
        }

        main { flex: 1; padding: 20px; max-width: 1000px; margin: 0 auto; width: 100%; }

        header { margin-bottom: 24px; }
        h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .subtitle { font-size: 13px; color: var(--text-dim); }

        .stats-container {
            display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 24px;
        }
        @media (min-width: 640px) { .stats-container { grid-template-columns: repeat(3, 1fr); } }

        .stat-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 20px;
        }
        .stat-card.highlight { background: linear-gradient(135deg, var(--primary) 0%, #047857 100%); border: none; }
        .stat-title { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
        .stat-card.highlight .stat-title { color: rgba(255,255,255,0.8); }
        .stat-value { font-size: 24px; font-weight: 700; }

        .content-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 20px; overflow: hidden; }

        .table-header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }

        select {
            background: var(--bg-sidebar); border: 1px solid var(--border); color: white;
            padding: 10px 14px; border-radius: 10px; font-size: 13px; outline: none; width: 100%;
        }
        @media (min-width: 640px) { select { width: auto; } }

        .grades-table-wrapper { overflow-x: auto; margin: 0 -20px; padding: 0 20px; }
        .grades-table { width: 100%; border-collapse: collapse; min-width: 600px; }
        .grades-table th { padding: 12px; font-size: 11px; color: var(--text-dim); border-bottom: 1px solid var(--border); text-transform: uppercase; }
        .grades-table td { padding: 16px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }

        .grade-badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 28px; height: 28px; border-radius: 6px; font-weight: 700; font-size: 12px;
        }
        .grade-a { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .grade-b { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .grade-c { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }

        .subject-col { display: flex; align-items: center; gap: 10px; }
        .subject-icon {
            width: 32px; height: 32px; background: rgba(255, 255, 255, 0.05);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-weight: 600; color: var(--text-dim); font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="mobile-header">
        <a href="dashboard_siswa.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div style="text-align: right;">
            <p id="userNama" style="font-size: 13px; font-weight: 600;">Nama Siswa</p>
            <p id="userKelas" style="font-size: 11px; color: var(--text-dim);">Kelas -</p>
        </div>
    </div>

    <main>
        <header>
            <h1>Laporan Nilai (Raport)</h1>
            <p class="subtitle">Hasil belajar akademik Anda semester ini.</p>
        </header>

        <div class="stats-container">
            <div class="stat-card highlight">
                <p class="stat-title">Rata-Rata Nilai</p>
                <p class="stat-value" id="avgValue">0.0</p>
            </div>
            <div class="stat-card">
                <p class="stat-title">Peringkat Kelas</p>
                <p class="stat-value">- <span style="font-size: 12px; color: var(--text-dim); font-weight: 400;">/ -</span></p>
            </div>
            <div class="stat-card">
                <p class="stat-title">Kehadiran</p>
                <p class="stat-value">100%</p>
            </div>
        </div>

        <div class="content-card">
            <div class="table-header-controls">
                <h3 style="font-size: 15px; font-weight: 600;">Detail Nilai</h3>
                <select id="filterSemester">
                    <option>Semester Ganjil 2025/2026</option>
                </select>
            </div>

            <div class="grades-table-wrapper">
                <table class="grades-table">
                    <thead>
                        <tr>
                            <th>Mata Pelajaran</th>
                            <th>KKM</th>
                            <th>Nilai</th>
                            <th>Predikat</th>
                        </tr>
                    </thead>
                    <tbody id="nilaiBody">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const currentUser = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userNama').textContent = currentUser.nama || 'Siswa';
            document.getElementById('userKelas').textContent = 'Kelas ' + (currentUser.kelas || '-');

            loadNilai();
        });

        async function loadNilai() {
            const tbody = document.getElementById('nilaiBody');
            const avgEl = document.getElementById('avgValue');
            const currentUser = JSON.parse(localStorage.getItem('sais_current_user') || '{}');

            try {
                // Fetch from Neon via window.db if available, else localStorage
                let data = [];
                try {
                    data = await window.db.getAllNilai();
                    data = data.filter(n => n.nisn === currentUser.nisn);
                } catch (e) {
                    data = JSON.parse(localStorage.getItem('sais_rapot_data') || '[]').filter(n => n.nisn === currentUser.nisn);
                }

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 40px; color: var(--text-dim);">Belum ada data nilai.</td></tr>';
                    return;
                }

                let total = 0;
                tbody.innerHTML = data.map(n => {
                    const score = n.nilaiAkhir || 0;
                    total += score;
                    const grade = n.grade || 'C';
                    const initial = n.mapel.substring(0, 2).toUpperCase();
                    return `
                        <tr>
                            <td>
                                <div class="subject-col">
                                    <div class="subject-icon">${initial}</div>
                                    <div style="font-weight: 500;">${n.mapel}</div>
                                </div>
                            </td>
                            <td>75</td>
                            <td style="font-weight: 700;">${score}</td>
                            <td><span class="grade-badge grade-${grade.toLowerCase()}">${grade}</span></td>
                        </tr>
                    `;
                }).join('');

                avgEl.textContent = (total / data.length).toFixed(1);
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 40px; color: #ef4444;">Gagal memuat data.</td></tr>';
            }
        }
    </script>
</body>
</html>
