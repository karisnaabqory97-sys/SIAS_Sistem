<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Jadwal | SAIS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style_admin_shared.css">
    <style>
        /* Specific management styles for Jadwal */
        .builder-container {
            display: flex; gap: 32px; background: var(--bg-card);
            border: 1px solid var(--border); border-radius: 32px;
            padding: 40px; min-height: 600px;
        }

        .drag-item {
            background: rgba(255,255,255,0.05);
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 14px;
            cursor: grab;
            border: 1px solid var(--border);
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .drag-item:active { cursor: grabbing; transform: scale(0.95); }
        .drag-item:hover { 
            background: rgba(255,255,255,0.1);
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(108, 99, 255, 0.2);
        }

        .builder-table {
            width: 100%; border-collapse: collapse; table-layout: fixed;
        }
        .builder-table th {
            font-size: 13px; color: var(--text-dim);
            padding: 16px; border: 1px solid var(--border);
            font-weight: 500;
        }
        .time-col {
            font-size: 12px; color: var(--text-dim);
            background: rgba(255,255,255,0.02);
            text-align: center; border: 1px solid var(--border);
            padding: 8px 4px;
        }
        .drop-zone {
            height: 100px; border: 1px solid var(--border);
            transition: 0.3s; padding: 8px; vertical-align: top;
        }
        .drop-zone:hover { background: rgba(108, 99, 255, 0.05); }

        .time-input {
            background: transparent; border: 1px solid transparent;
            color: white; border-radius: 4px; width: 70px;
            text-align: center; font-size: 12px; outline: none;
            cursor: pointer; transition: 0.3s;
        }
        .time-input:hover, .time-input:focus { border-color: var(--accent); background: rgba(0,0,0,0.2); }

        .dropped-item {
            background: var(--accent); color: white; padding: 10px;
            border-radius: 10px; font-size: 12px; text-align: center;
            position: relative; animation: popIn 0.3s;
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .remove-drop {
            position: absolute; top: -6px; right: -6px; background: #ef4444;
            width: 18px; height: 18px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; cursor: pointer;
        }

        .filter-select {
            background: var(--bg-body); border: 1px solid var(--border);
            color: white; padding: 10px 16px; border-radius: 12px;
            font-size: 13px; outline: none; cursor: pointer;
        }
    </style>
</head>
<body data-page="jadwal">
    <div id="sidebar-container"></div>

    <div class="wrapper">
        <header class="global-header">
            <div class="top-bar-left">
                <button id="menuToggle"><i class="fas fa-bars"></i></button>
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" placeholder="Cari data, menu, atau bantuan...">
                </div>
            </div>

            <div class="header-actions">
                <div class="user-profile">
                    <div class="user-info">
                        <span class="user-name" id="userName">Admin</span>
                        <span class="user-role">Administrator</span>
                    </div>
                    <div class="user-avatar" id="userInitial">A</div>
                </div>
            </div>
        </header>

        <main>
            <div class="page-header">
                <div class="header-title">
                    <h1>Manajemen Jadwal</h1>
                    <p>Tarik mata pelajaran ke kolom jadwal yang tersedia.</p>
                </div>
                <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                    <select class="filter-select">
                        <option>Semester Ganjil</option>
                        <option>Semester Genap</option>
                    </select>
                    <select class="filter-select" id="classSelector">
                        <option value="">Pilih Kelas</option>
                    </select>
                    <button class="btn btn-secondary" onclick="resetJadwal()" style="color: #ef4444; border-color: rgba(239, 68, 68, 0.2);">🔄 Reset</button>
                    <button class="btn btn-success" onclick="saveJadwal()">💾 Simpan Jadwal</button>
                </div>
            </div>

            <div class="builder-container">
                <!-- Draggable Subjects -->
                <div style="width: 240px; background: rgba(0,0,0,0.2); border-radius: 24px; padding: 24px; border: 1px solid var(--border);">
                    <h4 style="font-size: 12px; color: var(--accent); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px;">Mata Pelajaran</h4>
                    <div id="subjectList" style="display: flex; flex-direction: column; gap: 12px;">
                        <!-- Will be loaded dynamically -->
                    </div>
                </div>

                <!-- Weekly Grid -->
                <div style="flex: 1;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                        <h3 id="builderTitle" style="font-size: 20px;">Jadwal Builder</h3>
                        <button onclick="addTimeSlot()" class="btn btn-secondary" style="font-size: 11px;">+ Tambah Jam</button>
                    </div>
                    <div style="overflow-x: auto;">
                        <table class="builder-table">
                            <thead>
                                <tr>
                                    <th style="width: 140px;">Jam</th>
                                    <th>Senin</th>
                                    <th>Selasa</th>
                                    <th>Rabu</th>
                                    <th>Kamis</th>
                                    <th>Jumat</th>
                                    <th style="width: 80px;">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="builderBody">
                                <!-- Default slots -->
                                <tr>
                                    <td class="time-col">
                                        <div style="display:flex; align-items:center; gap:2px; justify-content:center;">
                                            <input type="time" value="07:30" class="time-input">
                                            <span>-</span>
                                            <input type="time" value="09:00" class="time-input">
                                        </div>
                                    </td>
                                    <td class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)"></td>
                                    <td class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)"></td>
                                    <td class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)"></td>
                                    <td class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)"></td>
                                    <td class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)"></td>
                                    <td style="text-align:center; border: 1px solid var(--border);">
                                        <button onclick="this.closest('tr').remove()" style="background:transparent; border:none; color:#ef4444; cursor:pointer;"><i class="fas fa-trash"></i></button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/load-sidebar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const user = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userName').textContent = user.nama || 'Admin';
            document.getElementById('userInitial').textContent = (user.nama || 'A').charAt(0).toUpperCase();

            await loadInitialData();
        });

        async function loadInitialData() {
            try {
                // Load Classes
                const kelasList = await window.db.getAllKelas();
                const classSelector = document.getElementById('classSelector');
                kelasList.forEach(k => {
                    const name = typeof k === 'object' ? k.nama : k;
                    const opt = document.createElement('option');
                    opt.value = name; opt.textContent = name;
                    classSelector.appendChild(opt);
                });

                // Load Subjects
                const mapelList = await window.db.getAllMapel();
                const subjectList = document.getElementById('subjectList');
                mapelList.forEach(m => {
                    const item = document.createElement('div');
                    item.className = 'drag-item';
                    item.draggable = true;
                    item.ondragstart = (e) => e.dataTransfer.setData("text", m.nama);
                    item.innerHTML = `📚 ${m.nama}`;
                    subjectList.appendChild(item);
                });
            } catch (e) { console.error(e); }
        }

        window.allowDrop = (ev) => ev.preventDefault();
        window.drop = (ev) => {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text");
            const dropZone = ev.target.closest('.drop-zone');
            if (dropZone) {
                dropZone.innerHTML = `<div class="dropped-item">${data}<span class="remove-drop" onclick="this.parentElement.remove()">×</span></div>`;
            }
        };

        window.addTimeSlot = () => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="time-col"><div style="display:flex; align-items:center; gap:2px; justify-content:center;"><input type="time" class="time-input"><span>-</span><input type="time" class="time-input"></div></td>
                <td class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)"></td>
                <td class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)"></td>
                <td class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)"></td>
                <td class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)"></td>
                <td class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)"></td>
                <td style="text-align:center; border: 1px solid var(--border);"><button onclick="this.closest('tr').remove()" style="background:transparent; border:none; color:#ef4444; cursor:pointer;"><i class="fas fa-trash"></i></button></td>
            `;
            document.getElementById('builderBody').appendChild(tr);
        };

        window.resetJadwal = () => { if(confirm('Riset jadwal?')) document.querySelectorAll('.drop-zone').forEach(z => z.innerHTML = ''); };
        window.saveJadwal = () => alert('Jadwal berhasil disimpan!');
    </script>
</body>
</html>
