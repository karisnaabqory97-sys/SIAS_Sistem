<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Pelajaran | SAIS Siswa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { background: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; }

        .mobile-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .back-btn {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border-radius: 12px; color: white; text-decoration: none;
        }

        main { flex: 1; padding: 20px; width: 100%; max-width: 1000px; margin: 0 auto; }

        header { margin-bottom: 24px; }
        h1 { font-size: 20px; font-weight: 700; }
        .subtitle { font-size: 13px; color: var(--text-dim); }

        .content-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 20px; overflow: hidden; }

        .table-wrapper { overflow-x: auto; margin: 0 -20px; padding: 0 20px; }
        .schedule-table { width: 100%; border-collapse: collapse; min-width: 600px; }
        .schedule-table th { padding: 12px; font-size: 11px; color: var(--text-dim); border-bottom: 1px solid var(--border); text-align: center; }
        .schedule-table td { padding: 16px 12px; border-bottom: 1px solid var(--border); text-align: center; vertical-align: top; }

        .time-col { font-weight: 600; color: var(--primary); font-size: 12px; }

        .subject-block {
            background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 12px; padding: 10px; margin-bottom: 6px; color: #10b981;
            text-align: left;
        }
        .subject-name { font-weight: 600; font-size: 13px; margin-bottom: 2px; color: white; }
        .subject-info { font-size: 10px; color: var(--text-dim); }

        .istirahat { background: rgba(255,255,255,0.03); color: var(--text-dim); border: none; text-align: center; padding: 8px; font-size: 11px; }
    </style>
</head>
<body>
    <div class="mobile-header">
        <a href="dashboard_siswa.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div style="text-align: right;">
            <p id="userNama" style="font-size: 13px; font-weight: 600;">Nama Siswa</p>
            <p id="userKelas" style="font-size: 11px; color: var(--text-dim);">Kelas -</p>
        </div>
    </div>

    <main>
        <header>
            <h1>Jadwal Pelajaran</h1>
            <p class="subtitle" id="scheduleSubtitle">Jadwal mingguan kelas Anda.</p>
        </header>

        <div class="content-card">
            <div class="table-wrapper">
                <table class="schedule-table">
                    <thead>
                        <tr>
                            <th style="width: 110px;">Waktu</th>
                            <th>Senin</th>
                            <th>Selasa</th>
                            <th>Rabu</th>
                            <th>Kamis</th>
                            <th>Jumat</th>
                        </tr>
                    </thead>
                    <tbody id="scheduleBody">
                        <!-- Will be populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const currentUser = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userNama').textContent = currentUser.nama || 'Siswa';
            document.getElementById('userKelas').textContent = 'Kelas ' + (currentUser.kelas || '-');
            document.getElementById('scheduleSubtitle').textContent = 'Jadwal mingguan Kelas ' + (currentUser.kelas || '-');

            await renderSchedule(currentUser.kelas);
        });

        async function renderSchedule(kelas) {
            const tbody = document.getElementById('scheduleBody');
            if (!kelas) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px;">Data kelas tidak ditemukan.</td></tr>';
                return;
            }

            try {
                const data = await window.db.getJadwalByKelas(kelas);
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px; color:var(--text-dim);">Belum ada jadwal yang diatur oleh Admin untuk kelas ini.</td></tr>';
                    return;
                }

                // Group by time range
                const slots = {};
                data.forEach(s => {
                    const key = `${s.jam_mulai}-${s.jam_selesai}`;
                    if (!slots[key]) slots[key] = { start: s.jam_mulai, end: s.jam_selesai, days: {} };
                    slots[key].days[s.hari.toLowerCase()] = { mapel: s.mapel, guru: s.guru };
                });

                // Sort slots by start time
                const sortedSlots = Object.values(slots).sort((a, b) => a.start.localeCompare(b.start));

                tbody.innerHTML = sortedSlots.map(slot => {
                    const days = ['senin', 'selasa', 'rabu', 'kamis', 'jumat'];
                    const dayCells = days.map(day => {
                        const item = slot.days[day];
                        if (item) {
                            return `<td><div class="subject-block"><div class="subject-name">${item.mapel}</div><div class="subject-info">${item.guru}</div></div></td>`;
                        }
                        return '<td>-</td>';
                    }).join('');

                    return `<tr><td class="time-col">${slot.start} - ${slot.end}</td>${dayCells}</tr>`;
                }).join('');
            } catch (e) {
                console.error(e);
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px; color:#ef4444;">Gagal memuat jadwal.</td></tr>';
            }
        }
    </script>
</body>
</html>
