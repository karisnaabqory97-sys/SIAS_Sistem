<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Pelajaran | SAIS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style_admin_shared.css">
    <style>
        /* Specific management styles for Pelajaran */
        .subject-badge {
            padding: 4px 12px;
            background: rgba(108, 99, 255, 0.1);
            color: var(--accent);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .assignment-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .class-label { color: #10b981; font-weight: 700; }
        .teacher-label { color: var(--text-dim); }

        .action-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-right: 8px;
            transition: all 0.3s;
        }

        .action-btn:hover { color: var(--accent); border-color: var(--accent); }

        /* Modal Styles */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 24px; padding: 32px; width: 100%; max-width: 650px;
            max-height: 90vh; overflow-y: auto;
        }

        .form-control {
            width: 100%; background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border); border-radius: 12px; padding: 12px;
            color: white; outline: none; transition: 0.3s; font-size: 13px;
        }
        .form-control:focus { border-color: var(--accent); }

        /* Repeater Styles */
        .assignment-repeater {
            background: rgba(0,0,0,0.15);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-top: 10px;
        }

        .repeater-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
        }

        .btn-add-row {
            background: rgba(108, 99, 255, 0.1);
            color: var(--accent);
            border: 1px dashed var(--accent);
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-add-row:hover { background: rgba(108, 99, 255, 0.2); }

        .btn-remove-row {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: none;
            width: 32px; height: 32px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body data-page="pelajaran">
    <div id="sidebar-container"></div>

    <div class="wrapper">
        <header class="global-header">
            <div class="top-bar-left">
                <button id="menuToggle"><i class="fas fa-bars"></i></button>
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" id="globalSearch" placeholder="Cari mata pelajaran...">
                </div>
            </div>

            <div class="header-actions">
                <div class="user-profile">
                    <div class="user-info">
                        <span class="user-name" id="userName">Admin</span>
                        <span class="user-role">Administrator</span>
                    </div>
                    <div class="user-avatar" id="userInitial">A</div>
                </div>
            </div>
        </header>

        <main>
            <div class="page-header">
                <div class="header-title">
                    <h1>Manajemen Pelajaran</h1>
                    <p id="totalPelajaranText">Total 0 mata pelajaran terdaftar</p>
                </div>
                <button class="btn btn-primary" id="btnTambahPelajaran"><i class="fas fa-plus"></i> Tambah Pelajaran</button>
            </div>

            <div class="content-card">
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>KODE</th>
                                <th>NAMA PELAJARAN</th>
                                <th>DAFTAR PENGAMPU, LEVEL & KELAS</th>
                                <th width="150px">AKSI</th>
                            </tr>
                        </thead>
                        <tbody id="pelajaranTableBody">
                            <tr><td colspan="4" style="text-align: center; padding: 40px;">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Tambah/Edit Pelajaran -->
    <div class="modal-overlay" id="modalPelajaran">
        <div class="modal">
            <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                <h2 class="modal-title" id="modalTitle">Tambah Pelajaran Baru</h2>
                <button class="btn-close" id="btnCloseModal" style="background:transparent; border:none; color:var(--text-dim); font-size:24px; cursor:pointer;">&times;</button>
            </div>
            <form id="formPelajaran">
                <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 16px; margin-bottom: 24px;">
                    <div class="form-group">
                        <label style="display:block; font-size:12px; color:var(--text-dim); margin-bottom:8px;">Kode</label>
                        <input type="text" class="form-control" id="inputKode" placeholder="MTK" required>
                    </div>
                    <div class="form-group">
                        <label style="display:block; font-size:12px; color:var(--text-dim); margin-bottom:8px;">Nama Pelajaran</label>
                        <input type="text" class="form-control" id="inputNama" placeholder="Matematika" required>
                    </div>
                </div>
                
                <label style="display:block; font-size:12px; color:var(--text-dim); margin-bottom:8px;">Penugasan Guru & Kelas (Sinkron DB)</label>
                <div class="assignment-repeater">
                    <div id="repeaterContainer">
                        <!-- Rows will be added here -->
                    </div>
                    <button type="button" class="btn-add-row" id="btnAddAssignment">
                        <i class="fas fa-plus-circle"></i> Tambah Penugasan Guru
                    </button>
                </div>

                <div class="modal-footer" style="display:flex; justify-content:flex-end; gap:12px; margin-top:32px;">
                    <button type="button" class="btn btn-secondary" id="btnBatal">Batal</button>
                    <button type="submit" class="btn btn-primary" id="btnSubmit">Simpan Pelajaran</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/load-sidebar.js"></script>
    <script>
        let pelajaranData = [];
        let kelasOptions = [];
        let guruOptions = [];
        let currentEditId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userName').textContent = user.nama || 'Admin';
            document.getElementById('userInitial').textContent = (user.nama || 'A').charAt(0).toUpperCase();

            await loadOptions();
            await fetchPelajaran();
            setupEventListeners();
        });

        async function loadOptions() {
            try {
                const [kelas, guru] = await Promise.all([
                    window.db.getAllKelas(),
                    window.db.getAllGuru()
                ]);
                kelasOptions = kelas;
                guruOptions = guru.map(g => g.nama);
            } catch (e) { console.error("Error loading options:", e); }
        }

        async function fetchPelajaran() {
            try {
                const data = await window.db.getAllMapel();
                pelajaranData = data;
                renderTable();
            } catch (e) {
                console.error("Gagal mengambil data:", e);
                pelajaranData = [];
                renderTable();
            }
        }

        function renderTable(filterQuery = '') {
            const tbody = document.getElementById('pelajaranTableBody');
            tbody.innerHTML = '';

            const lowerQuery = filterQuery.toLowerCase();
            const filtered = pelajaranData.filter(p => 
                p.nama.toLowerCase().includes(lowerQuery) || 
                p.singkatan.toLowerCase().includes(lowerQuery)
            );

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 40px; color: var(--text-dim);">Data tidak ditemukan.</td></tr>';
            }

            filtered.forEach((pel, index) => {
                const assignments = pel.penugasan || [];
                const assignmentHtml = assignments.map(a => `
                    <div class="assignment-tag">
                        <span class="class-label" style="color: #6366f1;">${a.level || ''}</span>
                        <span class="class-label">${a.kelas}</span>
                        <i class="fas fa-chevron-right" style="font-size: 10px; color: var(--border);"></i>
                        <span class="teacher-label">${a.guru}</span>
                    </div>
                `).join('') || '<span style="color: var(--text-dim); font-style: italic; font-size: 11px;">Belum ada penugasan</span>';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span class="subject-badge">${pel.singkatan}</span></td>
                    <td style="font-weight: 600;">${pel.nama}</td>
                    <td><div style="display: flex; flex-direction: column;">${assignmentHtml}</div></td>
                    <td>
                        <button class="action-btn" onclick="editPelajaran(${index})"><i class="fas fa-edit"></i></button>
                        <button class="action-btn" style="color:#ef4444;" onclick="deletePelajaran(${pel.id})"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('totalPelajaranText').textContent = `Total ${pelajaranData.length} mata pelajaran terdaftar`;
        }

        window.updateKelasOptions = (levelSelect) => {
            const row = levelSelect.closest('.repeater-row');
            const classSelect = row.querySelector('.row-kelas');
            const selectedLevel = levelSelect.value;
            
            const currentVal = classSelect.value;
            classSelect.innerHTML = '<option value="">-- Kelas --</option>';
            
            const filtered = kelasOptions.filter(k => k.kode === selectedLevel);
            filtered.forEach(k => {
                const opt = document.createElement('option');
                opt.value = k.nama;
                opt.textContent = k.nama;
                if (k.nama === currentVal) opt.selected = true;
                classSelect.appendChild(opt);
            });
        };

        function createRepeaterRow(selectedLevel = '', selectedKelas = '', selectedGuru = '') {
            const container = document.getElementById('repeaterContainer');
            const row = document.createElement('div');
            row.className = 'repeater-row';
            
            const levels = ['Level VII', 'Level VIII', 'Level IX'];
            const levelSelectHtml = `<select class="form-control row-level" required onchange="updateKelasOptions(this)">
                <option value="">-- Level --</option>
                ${levels.map(l => `<option value="${l}" ${l === selectedLevel ? 'selected' : ''}>${l}</option>`).join('')}
            </select>`;

            const classSelectHtml = `<select class="form-control row-kelas" required>
                <option value="">-- Kelas --</option>
                ${kelasOptions.filter(k => !selectedLevel || k.kode === selectedLevel).map(k => `<option value="${k.nama}" ${k.nama === selectedKelas ? 'selected' : ''}>${k.nama}</option>`).join('')}
            </select>`;

            const guruSelectHtml = `<select class="form-control row-guru" required>
                <option value="">-- Guru --</option>
                ${guruOptions.map(g => `<option value="${g}" ${g === selectedGuru ? 'selected' : ''}>${g}</option>`).join('')}
            </select>`;

            row.innerHTML = `
                ${levelSelectHtml}
                ${classSelectHtml}
                ${guruSelectHtml}
                <button type="button" class="btn-remove-row" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>
            `;
            container.appendChild(row);
        }

        window.editPelajaran = (index) => {
            const pel = pelajaranData[index];
            currentEditId = pel.id;
            document.getElementById('modalTitle').textContent = 'Edit Pelajaran';
            document.getElementById('inputKode').value = pel.singkatan;
            document.getElementById('inputNama').value = pel.nama;
            
            document.getElementById('repeaterContainer').innerHTML = '';
            if (pel.penugasan && pel.penugasan.length > 0) {
                pel.penugasan.forEach(a => createRepeaterRow(a.level || '', a.kelas, a.guru));
            } else {
                createRepeaterRow();
            }

            document.getElementById('modalPelajaran').classList.add('active');
        };

        window.deletePelajaran = async (id) => {
            if (confirm(`Hapus mata pelajaran ini?`)) {
                try {
                    await window.db.deleteMapel(id);
                    await fetchPelajaran();
                } catch (e) { alert('Gagal menghapus.'); }
            }
        };

        function setupEventListeners() {
            document.getElementById('btnTambahPelajaran').onclick = () => {
                currentEditId = null;
                document.getElementById('modalTitle').textContent = 'Tambah Pelajaran Baru';
                document.getElementById('formPelajaran').reset();
                document.getElementById('repeaterContainer').innerHTML = '';
                createRepeaterRow(); // Add one initial empty row
                document.getElementById('modalPelajaran').classList.add('active');
            };

            document.getElementById('btnAddAssignment').onclick = () => createRepeaterRow();

            document.getElementById('btnCloseModal').onclick = document.getElementById('btnBatal').onclick = () => {
                document.getElementById('modalPelajaran').classList.remove('active');
            };

            document.getElementById('formPelajaran').onsubmit = async (e) => {
                e.preventDefault();
                
                const rows = document.querySelectorAll('.repeater-row');
                const penugasan = Array.from(rows).map(row => ({
                    level: row.querySelector('.row-level').value,
                    kelas: row.querySelector('.row-kelas').value,
                    guru: row.querySelector('.row-guru').value
                }));

                const data = {
                    singkatan: document.getElementById('inputKode').value.toUpperCase(),
                    nama: document.getElementById('inputNama').value,
                    penugasan: penugasan
                };

                try {
                    if (currentEditId) {
                        await window.db.updateMapel(currentEditId, data);
                    } else {
                        await window.db.insertMapel(data);
                    }
                    await fetchPelajaran();
                    document.getElementById('modalPelajaran').classList.remove('active');
                } catch (err) { alert('Gagal menyimpan.'); }
            };

            document.getElementById('globalSearch').addEventListener('input', (e) => renderTable(e.target.value));
        }
    </script>
</body>
</html>
