<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Pelajaran | SAIS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style_admin_shared.css">
    <style>
        /* Specific management styles for Pelajaran */
        .subject-badge {
            padding: 4px 12px;
            background: rgba(108, 99, 255, 0.1);
            color: var(--accent);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .action-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-right: 8px;
            transition: all 0.3s;
        }

        .action-btn:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 24px; padding: 32px; width: 100%; max-width: 500px;
        }
        .form-control {
            width: 100%; background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border); border-radius: 12px; padding: 12px;
            color: white; outline: none; transition: 0.3s;
        }
        .form-control:focus { border-color: var(--accent); }
    </style>
</head>
<body data-page="pelajaran">
    <div id="sidebar-container"></div>

    <div class="wrapper">
        <header class="global-header">
            <div class="top-bar-left">
                <button id="menuToggle"><i class="fas fa-bars"></i></button>
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" placeholder="Cari data, menu, atau bantuan...">
                </div>
            </div>

            <div class="header-actions">
                <div class="user-profile">
                    <div class="user-info">
                        <span class="user-name" id="userName">Admin</span>
                        <span class="user-role">Administrator</span>
                    </div>
                    <div class="user-avatar" id="userInitial">A</div>
                </div>
            </div>
        </header>

        <main>
            <div class="page-header">
                <div class="header-title">
                    <h1>Manajemen Pelajaran</h1>
                    <p id="totalPelajaranText">Total 0 mata pelajaran terdaftar</p>
                </div>
                <button class="btn btn-primary" id="btnTambahPelajaran"><i class="fas fa-plus"></i> Tambah Pelajaran</button>
            </div>

            <div class="content-card">
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>KODE</th>
                                <th>NAMA PELAJARAN</th>
                                <th>KATEGORI</th>
                                <th>JUMLAH GURU</th>
                                <th>AKSI</th>
                            </tr>
                        </thead>
                        <tbody id="pelajaranTableBody">
                            <tr><td colspan="5" style="text-align: center; padding: 40px;">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Tambah/Edit Pelajaran -->
    <div class="modal-overlay" id="modalPelajaran">
        <div class="modal">
            <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                <h2 class="modal-title" id="modalTitle">Tambah Pelajaran Baru</h2>
                <button class="btn-close" id="btnCloseModal" style="background:transparent; border:none; color:var(--text-dim); font-size:24px; cursor:pointer;">&times;</button>
            </div>
            <form id="formPelajaran">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display:block; font-size:13px; color:var(--text-dim); margin-bottom:8px;">Kode Pelajaran</label>
                    <input type="text" class="form-control" id="inputKode" placeholder="Contoh: MTK, IPA" required>
                </div>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display:block; font-size:13px; color:var(--text-dim); margin-bottom:8px;">Nama Pelajaran</label>
                    <input type="text" class="form-control" id="inputNama" placeholder="Contoh: Matematika" required>
                </div>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display:block; font-size:13px; color:var(--text-dim); margin-bottom:8px;">Kategori</label>
                    <select class="form-control" id="inputKategori" style="background: var(--bg-body);">
                        <option value="Sains & Logika">Sains & Logika</option>
                        <option value="Bahasa & Sastra">Bahasa & Sastra</option>
                        <option value="Sains">Sains</option>
                        <option value="Bahasa">Bahasa</option>
                        <option value="IPS">IPS</option>
                        <option value="Seni & Olahraga">Seni & Olahraga</option>
                        <option value="Teknologi">Teknologi</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display:block; font-size:13px; color:var(--text-dim); margin-bottom:8px;">Jumlah Guru</label>
                    <input type="number" class="form-control" id="inputJumlahGuru" placeholder="0" min="0">
                </div>
                <div class="modal-footer" style="display:flex; justify-content:flex-end; gap:12px; margin-top:32px;">
                    <button type="button" class="btn btn-secondary" id="btnBatal">Batal</button>
                    <button type="submit" class="btn btn-primary" id="btnSubmit">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/load-sidebar.js"></script>
    <script>
        let pelajaranData = [];
        let currentEditIndex = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userName').textContent = user.nama || 'Admin';
            document.getElementById('userInitial').textContent = (user.nama || 'A').charAt(0).toUpperCase();

            await fetchPelajaran();
            setupEventListeners();
        });

        async function fetchPelajaran() {
            try {
                const data = await window.db.getAllMapel();
                pelajaranData = data.map(m => ({
                    id: m.id,
                    kode: m.singkatan || '',
                    nama: m.nama || '',
                    kategori: m.deskripsi || '',
                    guru: m.guru || 0
                }));
            } catch (e) {
                console.error("Gagal mengambil data:", e);
                pelajaranData = [];
            }
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('pelajaranTableBody');
            tbody.innerHTML = '';

            if (pelajaranData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px;">Belum ada data pelajaran.</td></tr>';
            }

            pelajaranData.forEach((pel, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span class="subject-badge">${pel.kode}</span></td>
                    <td style="font-weight: 600;">${pel.nama}</td>
                    <td>${pel.kategori}</td>
                    <td>${pel.guru} Guru</td>
                    <td>
                        <button class="action-btn" onclick="editPelajaran(${index})"><i class="fas fa-edit"></i></button>
                        <button class="action-btn" style="color:#ef4444;" onclick="deletePelajaran(${index})"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('totalPelajaranText').textContent = `Total ${pelajaranData.length} mata pelajaran terdaftar`;
        }

        window.editPelajaran = (index) => {
            currentEditIndex = index;
            const pel = pelajaranData[index];
            document.getElementById('modalTitle').textContent = 'Edit Pelajaran';
            document.getElementById('inputKode').value = pel.kode;
            document.getElementById('inputNama').value = pel.nama;
            document.getElementById('inputKategori').value = pel.kategori;
            document.getElementById('inputJumlahGuru').value = pel.guru;
            document.getElementById('modalPelajaran').classList.add('active');
        };

        window.deletePelajaran = async (index) => {
            if (confirm(`Hapus pelajaran "${pelajaranData[index].nama}"?`)) {
                try {
                    await window.db.deleteMapel(pelajaranData[index].id);
                    await fetchPelajaran();
                } catch (e) { alert('Gagal menghapus data.'); }
            }
        };

        function setupEventListeners() {
            document.getElementById('btnTambahPelajaran').onclick = () => {
                currentEditIndex = null;
                document.getElementById('modalTitle').textContent = 'Tambah Pelajaran Baru';
                document.getElementById('formPelajaran').reset();
                document.getElementById('modalPelajaran').classList.add('active');
            };

            document.getElementById('btnCloseModal').onclick = document.getElementById('btnBatal').onclick = () => {
                document.getElementById('modalPelajaran').classList.remove('active');
            };

            document.getElementById('formPelajaran').onsubmit = async (e) => {
                e.preventDefault();
                const newData = {
                    singkatan: document.getElementById('inputKode').value.toUpperCase(),
                    nama: document.getElementById('inputNama').value,
                    deskripsi: document.getElementById('inputKategori').value,
                    guru: parseInt(document.getElementById('inputJumlahGuru').value) || 0
                };

                try {
                    if (currentEditIndex !== null) {
                        await window.db.updateMapel(pelajaranData[currentEditIndex].id, newData);
                    } else {
                        await window.db.insertMapel(newData);
                    }
                    await fetchPelajaran();
                    document.getElementById('modalPelajaran').classList.remove('active');
                } catch (err) { alert('Gagal menyimpan data.'); }
            };
        }
    </script>
</body>
</html>
