<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Pelajaran | SAIS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style_admin_shared.css">
    <style>
        /* Specific management styles for Pelajaran */
        .subject-badge {
            padding: 4px 12px;
            background: rgba(108, 99, 255, 0.1);
            color: var(--accent);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .class-tag {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border-radius: 6px;
            font-size: 11px;
            margin-right: 4px;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .action-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-right: 8px;
            transition: all 0.3s;
        }

        .action-btn:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 24px; padding: 32px; width: 100%; max-width: 550px;
            max-height: 90vh; overflow-y: auto;
        }
        .form-control {
            width: 100%; background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border); border-radius: 12px; padding: 12px;
            color: white; outline: none; transition: 0.3s;
        }
        .form-control:focus { border-color: var(--accent); }

        .multi-select-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            cursor: pointer;
        }

        .checkbox-item input {
            cursor: pointer;
            accent-color: var(--accent);
        }
    </style>
</head>
<body data-page="pelajaran">
    <div id="sidebar-container"></div>

    <div class="wrapper">
        <header class="global-header">
            <div class="top-bar-left">
                <button id="menuToggle"><i class="fas fa-bars"></i></button>
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" id="globalSearch" placeholder="Cari data, menu, atau bantuan...">
                </div>
            </div>

            <div class="header-actions">
                <div class="user-profile">
                    <div class="user-info">
                        <span class="user-name" id="userName">Admin</span>
                        <span class="user-role">Administrator</span>
                    </div>
                    <div class="user-avatar" id="userInitial">A</div>
                </div>
            </div>
        </header>

        <main>
            <div class="page-header">
                <div class="header-title">
                    <h1>Manajemen Pelajaran</h1>
                    <p id="totalPelajaranText">Total 0 mata pelajaran terdaftar</p>
                </div>
                <button class="btn btn-primary" id="btnTambahPelajaran"><i class="fas fa-plus"></i> Tambah Pelajaran</button>
            </div>

            <div class="content-card">
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>KODE</th>
                                <th>NAMA PELAJARAN</th>
                                <th>KELAS</th>
                                <th>NAMA GURU</th>
                                <th>AKSI</th>
                            </tr>
                        </thead>
                        <tbody id="pelajaranTableBody">
                            <tr><td colspan="5" style="text-align: center; padding: 40px;">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Tambah/Edit Pelajaran -->
    <div class="modal-overlay" id="modalPelajaran">
        <div class="modal">
            <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                <h2 class="modal-title" id="modalTitle">Tambah Pelajaran Baru</h2>
                <button class="btn-close" id="btnCloseModal" style="background:transparent; border:none; color:var(--text-dim); font-size:24px; cursor:pointer;">&times;</button>
            </div>
            <form id="formPelajaran">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display:block; font-size:13px; color:var(--text-dim); margin-bottom:8px;">Kode Pelajaran</label>
                    <input type="text" class="form-control" id="inputKode" placeholder="Contoh: MTK, IPA" required>
                </div>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display:block; font-size:13px; color:var(--text-dim); margin-bottom:8px;">Nama Pelajaran</label>
                    <input type="text" class="form-control" id="inputNama" placeholder="Contoh: Matematika" required>
                </div>
                
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display:block; font-size:13px; color:var(--text-dim); margin-bottom:8px;">Pilih Kelas (Sinkron Manajemen Kelas)</label>
                    <div id="classCheckboxes" class="multi-select-container">
                        <!-- Classes will be loaded here -->
                        <span style="font-size: 11px; color: var(--text-dim);">Memuat kelas...</span>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display:block; font-size:13px; color:var(--text-dim); margin-bottom:8px;">Nama Guru (Sinkron Manajemen Guru)</label>
                    <select class="form-control" id="inputNamaGuru" style="background: var(--bg-body);">
                        <option value="">-- Pilih Guru --</option>
                    </select>
                </div>

                <div class="modal-footer" style="display:flex; justify-content:flex-end; gap:12px; margin-top:32px;">
                    <button type="button" class="btn btn-secondary" id="btnBatal">Batal</button>
                    <button type="submit" class="btn btn-primary" id="btnSubmit">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/load-sidebar.js"></script>
    <script>
        let pelajaranData = [];
        let currentEditIndex = null;
        let kelasList = [];
        let guruList = [];

        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userName').textContent = user.nama || 'Admin';
            document.getElementById('userInitial').textContent = (user.nama || 'A').charAt(0).toUpperCase();

            await initData();
            setupEventListeners();
        });

        async function initData() {
            try {
                // Load Classes for Checkboxes
                kelasList = await window.db.getAllKelas();
                const classContainer = document.getElementById('classCheckboxes');
                classContainer.innerHTML = kelasList.map(k => {
                    const name = typeof k === 'object' ? k.nama : k;
                    return `
                        <label class="checkbox-item">
                            <input type="checkbox" name="kelas" value="${name}"> ${name}
                        </label>
                    `;
                }).join('');

                // Load Teachers for Dropdown
                guruList = await window.db.getAllGuru();
                const guruSelect = document.getElementById('inputNamaGuru');
                guruSelect.innerHTML = '<option value="">-- Pilih Guru --</option>' + 
                    guruList.map(g => `<option value="${g.nama}">${g.nama}</option>`).join('');

                await fetchPelajaran();
            } catch (e) { console.error(e); }
        }

        async function fetchPelajaran() {
            try {
                const data = await window.db.getAllMapel();
                pelajaranData = data.map(m => ({
                    id: m.id,
                    kode: m.singkatan || '',
                    nama: m.nama || '',
                    kelas: m.kelas_list || [], // Array of class names
                    guru: m.pengampu || ''     // Teacher name
                }));
            } catch (e) {
                console.error("Gagal mengambil data:", e);
                pelajaranData = [];
            }
            renderTable();
        }

        function renderTable(filterQuery = '') {
            const tbody = document.getElementById('pelajaranTableBody');
            tbody.innerHTML = '';

            const lowerQuery = filterQuery.toLowerCase();
            const filtered = pelajaranData.filter(p => 
                p.nama.toLowerCase().includes(lowerQuery) || 
                p.kode.toLowerCase().includes(lowerQuery)
            );

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px;">Tidak ada data pelajaran.</td></tr>';
            }

            filtered.forEach((pel, index) => {
                const classTags = pel.kelas.map(k => `<span class="class-tag">${k}</span>`).join('');
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span class="subject-badge">${pel.kode}</span></td>
                    <td style="font-weight: 600;">${pel.nama}</td>
                    <td>${classTags || '-'}</td>
                    <td><i class="fas fa-user-tie" style="margin-right:8px; color:var(--text-dim);"></i>${pel.guru || '-'}</td>
                    <td>
                        <button class="action-btn" onclick="editPelajaran(${index})"><i class="fas fa-edit"></i></button>
                        <button class="action-btn" style="color:#ef4444;" onclick="deletePelajaran(${index})"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('totalPelajaranText').textContent = `Total ${pelajaranData.length} mata pelajaran terdaftar`;
        }

        window.editPelajaran = (index) => {
            currentEditIndex = index;
            const pel = pelajaranData[index];
            document.getElementById('modalTitle').textContent = 'Edit Pelajaran';
            document.getElementById('inputKode').value = pel.kode;
            document.getElementById('inputNama').value = pel.nama;
            document.getElementById('inputNamaGuru').value = pel.guru;
            
            // Set Checkboxes
            const checkboxes = document.querySelectorAll('input[name="kelas"]');
            checkboxes.forEach(cb => {
                cb.checked = pel.kelas.includes(cb.value);
            });

            document.getElementById('modalPelajaran').classList.add('active');
        };

        window.deletePelajaran = async (index) => {
            if (confirm(`Hapus pelajaran "${pelajaranData[index].nama}"?`)) {
                try {
                    await window.db.deleteMapel(pelajaranData[index].id);
                    await fetchPelajaran();
                } catch (e) { alert('Gagal menghapus data.'); }
            }
        };

        function setupEventListeners() {
            document.getElementById('btnTambahPelajaran').onclick = () => {
                currentEditIndex = null;
                document.getElementById('modalTitle').textContent = 'Tambah Pelajaran Baru';
                document.getElementById('formPelajaran').reset();
                document.getElementById('modalPelajaran').classList.add('active');
            };

            document.getElementById('btnCloseModal').onclick = document.getElementById('btnBatal').onclick = () => {
                document.getElementById('modalPelajaran').classList.remove('active');
            };

            document.getElementById('formPelajaran').onsubmit = async (e) => {
                e.preventDefault();
                
                // Get selected classes
                const selectedClasses = Array.from(document.querySelectorAll('input[name="kelas"]:checked')).map(cb => cb.value);

                const newData = {
                    singkatan: document.getElementById('inputKode').value.toUpperCase(),
                    nama: document.getElementById('inputNama').value,
                    kelas_list: selectedClasses,
                    pengampu: document.getElementById('inputNamaGuru').value
                };

                try {
                    if (currentEditIndex !== null) {
                        await window.db.updateMapel(pelajaranData[currentEditIndex].id, newData);
                    } else {
                        await window.db.insertMapel(newData);
                    }
                    await fetchPelajaran();
                    document.getElementById('modalPelajaran').classList.remove('active');
                } catch (err) { alert('Gagal menyimpan data.'); }
            };

            document.getElementById('globalSearch').addEventListener('input', (e) => renderTable(e.target.value));
        }
    </script>
</body>
</html>
