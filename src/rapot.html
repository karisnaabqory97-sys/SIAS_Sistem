<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Rapot | SAIS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style_admin_shared.css">
    <style>
        /* Specific management styles for Rapot */
        .summary-cards {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 16px; margin-bottom: 32px;
        }
        .summary-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px; text-align: center;
        }
        .summary-card .icon {
            width: 48px; height: 48px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 12px; font-size: 20px;
        }
        .summary-card .icon.blue { background: rgba(108, 99, 255, 0.1); color: var(--accent); }
        .summary-card .icon.green { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .summary-card .icon.yellow { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .summary-card .icon.red { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .summary-card .value { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
        .summary-card .label { font-size: 12px; color: var(--text-dim); }

        .grade-badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; }
        .grade-a { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .grade-b { background: rgba(108, 99, 255, 0.1); color: var(--accent); }
        .grade-c { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }

        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; }
        .status-sudah { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .status-belum { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }

        .filter-select {
            background: var(--bg-body); border: 1px solid var(--border);
            color: white; padding: 10px 16px; border-radius: 12px;
            font-size: 13px; outline: none; cursor: pointer;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 24px; padding: 32px; width: 100%; max-width: 800px;
            max-height: 90vh; overflow-y: auto;
        }
    </style>
</head>
<body data-page="rapot">
    <div id="sidebar-container"></div>

    <div class="wrapper">
        <header class="global-header">
            <div class="top-bar-left">
                <button id="menuToggle"><i class="fas fa-bars"></i></button>
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" id="globalSearch" placeholder="Cari NISN atau Nama Siswa...">
                </div>
            </div>

            <div class="header-actions">
                <div class="user-profile">
                    <div class="user-info">
                        <span class="user-name" id="userName">Admin</span>
                        <span class="user-role">Administrator</span>
                    </div>
                    <div class="user-avatar" id="userInitial">A</div>
                </div>
            </div>
        </header>

        <main>
            <div class="page-header">
                <div class="header-title">
                    <h1>Manajemen Nilai Pelajaran</h1>
                    <p>Pantau dan edit nilai yang telah diinput oleh Guru Mata Pelajaran.</p>
                </div>
                <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                    <select class="filter-select" id="filterKelas">
                        <option value="">Semua Kelas</option>
                    </select>
                    <select class="filter-select" id="filterJenis">
                        <option value="">Semua Jenis Ujian</option>
                        <option value="Harian 1">Harian 1</option>
                        <option value="Harian 2">Harian 2</option>
                        <option value="PTS Semester 1">PTS 1</option>
                        <option value="PTS Semester 2">PTS 2</option>
                        <option value="PAS">PAS</option>
                        <option value="PAT">PAT</option>
                    </select>
                </div>
            </div>

            <div class="content-card">
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>NO</th>
                                <th>NISN</th>
                                <th>NAMA SISWA</th>
                                <th>KELAS</th>
                                <th>MAPEL</th>
                                <th>JENIS UJIAN</th>
                                <th>NILAI</th>
                                <th>AKSI</th>
                            </tr>
                        </thead>
                        <tbody id="rapotTableBody">
                            <tr><td colspan="8" style="text-align: center; padding: 40px;">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Edit Nilai -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header" style="display:flex; justify-content:space-between; margin-bottom:24px;">
                <h2 class="modal-title">Edit Nilai Pelajaran</h2>
                <button class="btn-close" onclick="closeModal()" style="background:transparent; border:none; color:var(--text-dim); font-size:24px; cursor:pointer;">&times;</button>
            </div>
            <div id="editForm">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px;">
                    <div><label style="font-size:12px; color:var(--text-dim);">Nama Siswa</label><p id="editNama" style="font-weight:600;"></p></div>
                    <div><label style="font-size:12px; color:var(--text-dim);">NISN</label><p id="editNisn" style="font-weight:600;"></p></div>
                    <div><label style="font-size:12px; color:var(--text-dim);">Mata Pelajaran</label><p id="editMapel" style="font-weight:600;"></p></div>
                    <div><label style="font-size:12px; color:var(--text-dim);">Jenis Ujian</label><p id="editJenis" style="font-weight:600;"></p></div>
                </div>
                <div class="form-group">
                    <label style="display:block; margin-bottom:8px;">Nilai</label>
                    <input type="number" id="editValue" class="filter-select" style="width:100%; border:1px solid var(--border);" min="0" max="100">
                </div>
            </div>
            <div class="modal-footer" style="display:flex; justify-content:flex-end; gap:12px; margin-top:32px;">
                <button class="btn btn-secondary" onclick="closeModal()">Batal</button>
                <button class="btn btn-primary" onclick="updateNilai()">Simpan Perubahan</button>
            </div>
        </div>
    </div>

    <script src="js/load-sidebar.js"></script>
    <script>
        let rapotData = [];
        let currentEditItem = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userName').textContent = user.nama || 'Admin';
            document.getElementById('userInitial').textContent = (user.nama || 'A').charAt(0).toUpperCase();

            await fetchRapot();
            await loadClasses();
            setupListeners();
        });

        async function fetchRapot() {
            try {
                const data = await window.db.getAllNilai();
                rapotData = data || [];
                renderTable();
            } catch (e) { console.error(e); }
        }

        async function loadClasses() {
            try {
                const kelasList = await window.db.getAllKelas();
                const filterKelas = document.getElementById('filterKelas');
                kelasList.forEach(k => {
                    const name = typeof k === 'object' ? k.nama : k;
                    const opt = document.createElement('option');
                    opt.value = name; opt.textContent = name;
                    filterKelas.appendChild(opt);
                });
            } catch (e) { console.error(e); }
        }

        function setupListeners() {
            document.getElementById('filterKelas').onchange = renderTable;
            document.getElementById('filterJenis').onchange = renderTable;
            document.getElementById('globalSearch').oninput = renderTable;
        }

        function renderTable() {
            const fKelas = document.getElementById('filterKelas').value;
            const fJenis = document.getElementById('filterJenis').value;
            const query = document.getElementById('globalSearch').value.toLowerCase();
            const tbody = document.getElementById('rapotTableBody');
            tbody.innerHTML = '';
            
            let filtered = rapotData.filter(r => {
                const matchKelas = !fKelas || r.kelas === fKelas;
                const matchJenis = !fJenis || r.jenis_ujian === fJenis;
                const matchQuery = !query || r.nama.toLowerCase().includes(query) || r.nisn.includes(query);
                return matchKelas && matchJenis && matchQuery;
            });

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 40px;">Data tidak ditemukan.</td></tr>';
                return;
            }

            filtered.forEach((r, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${i+1}</td>
                    <td>${r.nisn}</td>
                    <td style="font-weight:600;">${r.nama}</td>
                    <td><span class="badge badge-purple">${r.kelas}</span></td>
                    <td>${r.mapel}</td>
                    <td><span class="badge" style="background:rgba(99,102,241,0.1); color:var(--primary); font-size:10px;">${r.jenis_ujian || '-'}</span></td>
                    <td style="font-weight:700;">${r.nilai || 0}</td>
                    <td>
                        <button class="action-btn" onclick="openEdit(${r.id || i})" style="color:var(--primary); background:transparent; border:none; cursor:pointer;"><i class="fas fa-edit"></i> Edit</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.openEdit = (id) => {
            currentEditItem = rapotData.find((x, i) => (x.id === id || i === id));
            if(!currentEditItem) return;

            document.getElementById('editNama').textContent = currentEditItem.nama;
            document.getElementById('editNisn').textContent = currentEditItem.nisn;
            document.getElementById('editMapel').textContent = currentEditItem.mapel;
            document.getElementById('editJenis').textContent = currentEditItem.jenis_ujian || '-';
            document.getElementById('editValue').value = currentEditItem.nilai || 0;

            document.getElementById('editModal').classList.add('active');
        };

        window.closeModal = () => document.getElementById('editModal').classList.remove('active');

        window.updateNilai = async () => {
            if(!currentEditItem) return;
            const newValue = document.getElementById('editValue').value;
            
            try {
                const updated = { ...currentEditItem, nilai: newValue };
                await window.db.upsertNilai(updated);
                alert('Berhasil memperbarui nilai.');
                closeModal();
                await fetchRapot();
            } catch (e) { alert('Gagal memperbarui nilai.'); }
        };
    </script>
    </script>
</body>
</html>
