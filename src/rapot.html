<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Rapot | SAIS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style_admin_shared.css">
    <style>
        /* Specific management styles for Rapot */
        .summary-cards {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 16px; margin-bottom: 32px;
        }
        .summary-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px; text-align: center;
        }
        .summary-card .icon {
            width: 48px; height: 48px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 12px; font-size: 20px;
        }
        .summary-card .icon.blue { background: rgba(108, 99, 255, 0.1); color: var(--accent); }
        .summary-card .icon.green { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .summary-card .icon.yellow { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .summary-card .icon.red { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .summary-card .value { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
        .summary-card .label { font-size: 12px; color: var(--text-dim); }

        .grade-badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; }
        .grade-a { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .grade-b { background: rgba(108, 99, 255, 0.1); color: var(--accent); }
        .grade-c { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }

        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; }
        .status-sudah { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .status-belum { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }

        .filter-select {
            background: var(--bg-body); border: 1px solid var(--border);
            color: white; padding: 10px 16px; border-radius: 12px;
            font-size: 13px; outline: none; cursor: pointer;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 24px; padding: 32px; width: 100%; max-width: 800px;
            max-height: 90vh; overflow-y: auto;
        }
    </style>
</head>
<body data-page="rapot">
    <div id="sidebar-container"></div>

    <div class="wrapper">
        <header class="global-header">
            <div class="top-bar-left">
                <button id="menuToggle"><i class="fas fa-bars"></i></button>
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" placeholder="Cari data, menu, atau bantuan...">
                </div>
            </div>

            <div class="header-actions">
                <div class="user-profile">
                    <div class="user-info">
                        <span class="user-name" id="userName">Admin</span>
                        <span class="user-role">Administrator</span>
                    </div>
                    <div class="user-avatar" id="userInitial">A</div>
                </div>
            </div>
        </header>

        <main>
            <div class="page-header">
                <div class="header-title">
                    <h1>Manajemen Rapot</h1>
                    <p>Pantau dan kelola nilai rapot seluruh siswa</p>
                </div>
                <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                    <select class="filter-select" id="filterKelas">
                        <option value="">Semua Kelas</option>
                    </select>
                    <button class="btn btn-primary" onclick="alert('Export PDF...')"><i class="fas fa-file-export"></i> Export</button>
                </div>
            </div>

            <div class="summary-cards">
                <div class="summary-card">
                    <div class="icon blue"><i class="fas fa-book"></i></div>
                    <div class="value" id="totalRapot">0</div>
                    <div class="label">Total Rapot</div>
                </div>
                <div class="summary-card">
                    <div class="icon green"><i class="fas fa-check-circle"></i></div>
                    <div class="value" id="sudahInput">0</div>
                    <div class="label">Sudah Diinput</div>
                </div>
                <div class="summary-card">
                    <div class="icon yellow"><i class="fas fa-clock"></i></div>
                    <div class="value" id="belumInput">0</div>
                    <div class="label">Belum Diinput</div>
                </div>
                <div class="summary-card">
                    <div class="icon red"><i class="fas fa-exclamation-triangle"></i></div>
                    <div class="value" id="belumValidasi">0</div>
                    <div class="label">Perlu Validasi</div>
                </div>
            </div>

            <div class="content-card">
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>NO</th>
                                <th>NISN</th>
                                <th>NAMA SISWA</th>
                                <th>KELAS</th>
                                <th>MAPEL</th>
                                <th>NILAI</th>
                                <th>GRADE</th>
                                <th>STATUS</th>
                                <th>AKSI</th>
                            </tr>
                        </thead>
                        <tbody id="rapotTableBody">
                            <tr><td colspan="9" style="text-align: center; padding: 40px;">Memuat data rapot...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Detail Rapot -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal">
            <div class="modal-header" style="display:flex; justify-content:space-between; margin-bottom:24px;">
                <h2 class="modal-title">Detail Rapot Siswa</h2>
                <button class="btn-close" onclick="document.getElementById('detailModal').classList.remove('active')" style="background:transparent; border:none; color:var(--text-dim); font-size:24px; cursor:pointer;">&times;</button>
            </div>
            <div id="rapotPreview"></div>
            <div class="modal-footer" style="display:flex; justify-content:flex-end; gap:12px; margin-top:24px;">
                <button class="btn btn-secondary" onclick="document.getElementById('detailModal').classList.remove('active')">Tutup</button>
                <button class="btn btn-primary" onclick="window.print()">Cetak</button>
            </div>
        </div>
    </div>

    <script src="js/load-sidebar.js"></script>
    <script>
        let rapotData = [];

        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userName').textContent = user.nama || 'Admin';
            document.getElementById('userInitial').textContent = (user.nama || 'A').charAt(0).toUpperCase();

            await fetchRapot();
            await loadClasses();
        });

        async function fetchRapot() {
            try {
                const data = await window.db.getAllNilai();
                rapotData = data || [];
                renderTable();
                updateSummary();
            } catch (e) { console.error(e); }
        }

        async function loadClasses() {
            try {
                const kelasList = await window.db.getAllKelas();
                const filterKelas = document.getElementById('filterKelas');
                kelasList.forEach(k => {
                    const name = typeof k === 'object' ? k.nama : k;
                    const opt = document.createElement('option');
                    opt.value = name; opt.textContent = name;
                    filterKelas.appendChild(opt);
                });
            } catch (e) { console.error(e); }
        }

        function renderTable(filterKelas = '') {
            const tbody = document.getElementById('rapotTableBody');
            tbody.innerHTML = '';
            
            let filtered = rapotData;
            if (filterKelas) filtered = filtered.filter(r => r.kelas === filterKelas);

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 40px;">Belum ada data rapot.</td></tr>';
                return;
            }

            filtered.forEach((r, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${i+1}</td>
                    <td>${r.nisn}</td>
                    <td style="font-weight:600;">${r.nama}</td>
                    <td><span class="badge badge-purple">${r.kelas}</span></td>
                    <td>${r.mapel}</td>
                    <td>${r.nilaiAkhir || '-'}</td>
                    <td><span class="grade-badge grade-${(r.grade || 'C').toLowerCase()}">${r.grade || '-'}</span></td>
                    <td><span class="status-badge status-${(r.status || 'Belum').toLowerCase()}">${r.status || 'Belum'}</span></td>
                    <td><button class="btn-action" style="padding:4px 10px; border-radius:8px; border:1px solid var(--border); background:transparent; color:white; cursor:pointer;" onclick="viewDetail(${r.id})">Lihat</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateSummary() {
            document.getElementById('totalRapot').textContent = rapotData.length;
            document.getElementById('sudahInput').textContent = rapotData.filter(r => r.status === 'Sudah').length;
            document.getElementById('belumInput').textContent = rapotData.filter(r => r.status === 'Belum').length;
            document.getElementById('belumValidasi').textContent = rapotData.filter(r => (r.nilaiAkhir || 0) < 75).length;
        }

        window.viewDetail = (id) => {
            const r = rapotData.find(x => x.id === id);
            if(!r) return;
            document.getElementById('rapotPreview').innerHTML = `
                <div style="text-align:center; border-bottom:2px solid var(--border); padding-bottom:20px; margin-bottom:20px;">
                    <h3>RAPOT HASIL BELAJAR</h3>
                    <p style="font-size:12px; color:var(--text-dim);">SMP NEGERI SAIS PROFESSIONAL</p>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; font-size:13px; margin-bottom:20px;">
                    <div><span style="color:var(--text-dim);">Nama:</span> <strong>${r.nama}</strong></div>
                    <div><span style="color:var(--text-dim);">NISN:</span> <strong>${r.nisn}</strong></div>
                    <div><span style="color:var(--text-dim);">Kelas:</span> <strong>${r.kelas}</strong></div>
                    <div><span style="color:var(--text-dim);">Mapel:</span> <strong>${r.mapel}</strong></div>
                </div>
                <div style="background:rgba(255,255,255,0.03); padding:20px; border-radius:16px; text-align:center;">
                    <div style="font-size:12px; color:var(--text-dim);">Nilai Akhir</div>
                    <div style="font-size:48px; font-weight:800; color:var(--accent);">${r.nilaiAkhir || 0}</div>
                    <div style="font-size:18px; font-weight:600;">Grade: ${r.grade || '-'}</div>
                </div>
            `;
            document.getElementById('detailModal').classList.add('active');
        };

        document.getElementById('filterKelas').onchange = (e) => renderTable(e.target.value);
    </script>
</body>
</html>
