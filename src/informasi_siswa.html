<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informasi & Pengumuman | SAIS Siswa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { background: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; }

        .mobile-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .back-btn {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border-radius: 12px; color: white; text-decoration: none;
        }

        main { flex: 1; padding: 20px; width: 100%; max-width: 800px; margin: 0 auto; }

        header { margin-bottom: 24px; }
        h1 { font-size: 20px; font-weight: 700; }
        .subtitle { font-size: 13px; color: var(--text-dim); }

        .info-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 16px; position: relative; }
        .info-date { font-size: 11px; color: var(--primary); font-weight: 600; margin-bottom: 8px; }
        .info-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; color: white; }
        .info-content { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
        .info-tag { position: absolute; top: 20px; right: 20px; font-size: 10px; background: rgba(99, 102, 241, 0.1); color: var(--primary); padding: 2px 8px; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="mobile-header">
        <a href="dashboard_siswa.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div style="text-align: right;">
            <p id="userNama" style="font-size: 13px; font-weight: 600;">Nama Siswa</p>
            <p id="userKelas" style="font-size: 11px; color: var(--text-dim);">Kelas -</p>
        </div>
    </div>

    <main>
        <header>
            <h1>Informasi & Pengumuman</h1>
            <p class="subtitle">Berita terbaru dari sekolah untuk Anda.</p>
        </header>

        <div id="infoContainer">
            <!-- Will be loaded by JS -->
            <p style="text-align: center; padding: 40px; color: var(--text-dim);">Memuat informasi...</p>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const currentUser = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userNama').textContent = currentUser.nama || 'Siswa';
            document.getElementById('userKelas').textContent = 'Kelas ' + (currentUser.kelas || '-');
            
            await renderInfo();
        });

        async function renderInfo() {
            const container = document.getElementById('infoContainer');
            try {
                const infoData = await window.db.getAllInformasi();
                const filtered = infoData.filter(i => i.sasaran === 'Semua' || i.sasaran === 'Siswa');

                if (filtered.length === 0) {
                    container.innerHTML = '<p style="text-align: center; padding: 40px; color: var(--text-dim);">Belum ada informasi terbaru.</p>';
                    return;
                }

                container.innerHTML = filtered.map(i => `
                    <div class="info-card">
                        <div class="info-tag">${i.kategori || 'Umum'}</div>
                        <div class="info-date">${i.tanggal || 'Baru Saja'}</div>
                        <div class="info-title">${i.judul}</div>
                        <div class="info-content">${i.isi}</div>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = '<p style="text-align: center; padding: 40px; color: #ef4444;">Gagal memuat data.</p>';
            }
        }
    </script>
</body>
</html>
