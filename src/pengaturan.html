<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan Sistem | SAIS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style_admin_shared.css">
    <style>
        .settings-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .settings-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 40px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--accent);
        }

        .form-group { margin-bottom: 24px; }
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 18px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        .form-control:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.07); }

        .logo-preview-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
        }

        .logo-preview {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .logo-preview img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }

        .btn-upload {
            background: rgba(108, 99, 255, 0.1);
            color: var(--accent);
            border: 1px dashed var(--accent);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-upload:hover { background: rgba(108, 99, 255, 0.2); }

        @media (max-width: 1024px) {
            .settings-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body data-page="pengaturan">
    <div id="sidebar-container"></div>

    <div class="wrapper">
        <header class="global-header">
            <div class="top-bar-left">
                <button id="menuToggle"><i class="fas fa-bars"></i></button>
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" placeholder="Cari pengaturan...">
                </div>
            </div>

            <div class="header-actions">
                <div class="user-profile">
                    <div class="user-info">
                        <span class="user-name" id="adminName">Admin</span>
                        <span class="user-role">Administrator</span>
                    </div>
                    <div class="user-avatar">A</div>
                </div>
            </div>
        </header>

        <main>
            <div class="page-header">
                <div class="header-title">
                    <h1>Pengaturan Sistem</h1>
                    <p>Konfigurasi identitas aplikasi, branding, dan tahun ajaran.</p>
                </div>
                <button class="btn btn-primary" id="btnSaveAll"><i class="fas fa-save"></i> Simpan Pengaturan</button>
            </div>

            <div class="settings-container">
                <!-- Identitas Aplikasi (Kiri) -->
                <div class="settings-card">
                    <div class="section-title">
                        <i class="fas fa-id-card"></i> Identitas Sekolah & Aplikasi
                    </div>
                    
                    <div class="form-group">
                        <label>Nama Aplikasi</label>
                        <input type="text" id="appName" class="form-control" placeholder="Contoh: SAIS">
                    </div>

                    <div class="form-group">
                        <label>Nama Sekolah</label>
                        <input type="text" id="schoolName" class="form-control" placeholder="Contoh: SMP Negeri SAIS Professional">
                    </div>

                    <div class="form-group">
                        <label>Tahun Ajaran Aktif</label>
                        <select id="academicYear" class="form-control" style="background: var(--bg-body);">
                            <option value="2024/2025">2024/2025</option>
                            <option value="2025/2026">2025/2026</option>
                            <option value="2026/2027">2026/2027</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Logo Aplikasi (Sidebar/Login)</label>
                        <div class="logo-preview-container">
                            <div class="logo-preview" id="logoPreview">
                                <i class="fas fa-image" style="font-size: 24px; color: var(--text-dim);"></i>
                            </div>
                            <input type="file" id="logoInput" accept="image/*" style="display: none;">
                            <button class="btn-upload" onclick="document.getElementById('logoInput').click()">Pilih Gambar</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Logo PWA (Aplikasi Mobile)</label>
                        <div class="logo-preview-container">
                            <div class="logo-preview" id="pwaPreview">
                                <i class="fas fa-mobile-alt" style="font-size: 24px; color: var(--text-dim);"></i>
                            </div>
                            <input type="file" id="pwaInput" accept="image/*" style="display: none;">
                            <button class="btn-upload" onclick="document.getElementById('pwaInput').click()">Pilih Gambar</button>
                        </div>
                    </div>
                </div>

                <!-- Keamanan & Akun (Kanan) -->
                <div class="settings-card">
                    <div class="section-title">
                        <i class="fas fa-shield-alt"></i> Keamanan Admin
                    </div>

                    <div class="form-group">
                        <label>Username Admin</label>
                        <input type="text" id="adminUsername" class="form-control" value="admin">
                    </div>

                    <div class="form-group">
                        <label>Ganti Password</label>
                        <input type="password" id="adminPassword" class="form-control" placeholder="Isi untuk mengganti password">
                    </div>

                    <div style="margin-top: 40px; padding: 24px; background: rgba(108, 99, 255, 0.05); border-radius: 20px; border: 1px solid var(--border);">
                        <h4 style="font-size: 14px; margin-bottom: 8px;"><i class="fas fa-info-circle" style="color: var(--accent);"></i> Tips Branding</h4>
                        <p style="font-size: 12px; color: var(--text-dim); line-height: 1.6;">Logo yang Anda unggah akan otomatis muncul di halaman login, sidebar, dan saat aplikasi diinstal di handphone (PWA).</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/load-sidebar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Load current user info
            const user = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('adminName').textContent = user.nama || 'Admin';

            // Initial Data Load
            loadSettings();

            // Handle Logo Upload Preview
            setupUploadPreview('logoInput', 'logoPreview');
            setupUploadPreview('pwaInput', 'pwaPreview');

            // Save Action
            document.getElementById('btnSaveAll').addEventListener('click', saveSettings);
        });

        function loadSettings() {
            document.getElementById('appName').value = localStorage.getItem('sais_appName') || 'SAIS';
            document.getElementById('schoolName').value = localStorage.getItem('sais_schoolName') || 'Sistem Informasi SMP';
            document.getElementById('academicYear').value = localStorage.getItem('sais_academicYear') || '2025/2026';
            
            const savedLogo = localStorage.getItem('sais_logo');
            if (savedLogo) {
                document.getElementById('logoPreview').innerHTML = `<img src="${savedLogo}">`;
            }

            const savedPwa = localStorage.getItem('sais_pwa');
            if (savedPwa) {
                document.getElementById('pwaPreview').innerHTML = `<img src="${savedPwa}">`;
            }
        }

        function setupUploadPreview(inputId, previewId) {
            document.getElementById(inputId).addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        document.getElementById(previewId).innerHTML = `<img src="${event.target.result}">`;
                        // Temporarily store in session for preview
                        if (inputId === 'logoInput') localStorage.setItem('sais_logo_temp', event.target.result);
                        else localStorage.setItem('sais_pwa_temp', event.target.result);
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        async function saveSettings() {
            try {
                // 1. Branding Settings
                localStorage.setItem('sais_appName', document.getElementById('appName').value);
                localStorage.setItem('sais_schoolName', document.getElementById('schoolName').value);
                localStorage.setItem('sais_academicYear', document.getElementById('academicYear').value);
                
                const tempLogo = localStorage.getItem('sais_logo_temp');
                if (tempLogo) {
                    localStorage.setItem('sais_logo', tempLogo);
                    localStorage.removeItem('sais_logo_temp');
                }

                const tempPwa = localStorage.getItem('sais_pwa_temp');
                if (tempPwa) {
                    localStorage.setItem('sais_pwa', tempPwa);
                    localStorage.removeItem('sais_pwa_temp');
                }

                // 2. Admin Account Settings (Logic placeholder for DB)
                const newPass = document.getElementById('adminPassword').value;
                if (newPass) {
                    // Update in DB via window.db adaptor if required
                    alert('Password admin berhasil diperbarui!');
                }

                alert('✅ Pengaturan berhasil disimpan! Tampilan akan diperbarui secara otomatis.');
                window.location.reload();
            } catch (err) {
                alert('Gagal menyimpan pengaturan: ' + err.message);
            }
        }
    </script>
</body>
</html>
