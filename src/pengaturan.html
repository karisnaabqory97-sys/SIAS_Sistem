<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan Sistem | SAIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #10b981;
            --bg-main: #0b0f1a;
            --bg-sidebar: #111827;
            --bg-card: #1f2937;
            --border: rgba(255, 255, 255, 0.06);
            --text-main: #f3f4f6;
            --text-dim: #9ca3af;
            --sidebar-width: 280px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* Main Content */
        main {
            flex: 1;
            margin-left: 260px;
            padding: 40px 60px;
            max-width: 1400px;
        }

        header {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 48px;
        }

        .header-title h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; letter-spacing: -1px; }
        .header-title p { color: var(--text-dim); font-size: 15px; }

        .btn-primary {
            background: var(--primary);
            color: white; border: none; padding: 14px 28px;
            border-radius: 16px; font-weight: 600; font-size: 14px;
            cursor: pointer; transition: var(--transition);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
            display: flex; align-items: center; gap: 10px;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        /* Settings Layout */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 32px;
        }

        .settings-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 32px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 32px; padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .card-header i { color: var(--primary); font-size: 20px; }
        .card-header h3 { font-size: 18px; font-weight: 700; }

        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 14px; font-weight: 500; color: var(--text-dim); margin-bottom: 10px; }

        input[type="text"], textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 18px;
            color: white; font-size: 14px;
            transition: var(--transition); outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.07);
        }

        /* Upload Area Modern */
        .upload-container {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 2px dashed var(--border);
            border-radius: 24px;
            padding: 40px 24px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .upload-container:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-icon { font-size: 32px; color: var(--primary); margin-bottom: 12px; }
        .upload-text { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .upload-hint { font-size: 12px; color: var(--text-dim); }

        .preview-wrapper {
            display: flex; align-items: center; gap: 20px;
            margin-top: 24px; padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
        }

        .img-preview {
            width: 72px; height: 72px;
            background: var(--bg-sidebar);
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .img-preview.pwa-icon { border-radius: 22px; }
        .preview-info h4 { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
        .preview-info p { font-size: 11px; color: var(--accent); }

        /* Responsive */
        @media (max-width: 1024px) {
            .settings-grid { grid-template-columns: 1fr; }
            main { padding: 32px 24px; }
        }
    </style>
</head>
<body data-page="pengaturan">
    <div id="sidebar-container"></div>

    <main>
        <header>
            <div class="header-title">
                <h1>Pengaturan Sistem</h1>
                <p>Sesuaikan identitas digital sekolah Anda.</p>
            </div>
            <button class="btn-primary" onclick="simulateSave()">
                <i class="fas fa-save"></i> Simpan Perubahan
            </button>
        </header>

        <div class="settings-grid">
            <!-- Informasi Umum -->
            <div class="settings-card">
                <div class="card-header">
                    <i class="fas fa-university"></i>
                    <h3>Profil Sekolah</h3>
                </div>
                
                <div class="form-group">
                    <label>Nama Aplikasi</label>
                    <input type="text" id="appName" placeholder="Contoh: SAIS SMPN 1">
                </div>

                <div class="form-group">
                    <label>Nama Lengkap Sekolah</label>
                    <input type="text" id="schoolName" placeholder="Masukkan nama resmi sekolah">
                </div>

                <div class="form-group">
                    <label>Profil & Alamat</label>
                    <textarea id="schoolProfile" rows="4" placeholder="Alamat lengkap dan visi misi singkat..."></textarea>
                </div>

                <div class="form-group">
                    <label>Kontak Utama</label>
                    <input type="text" id="schoolContact" placeholder="Email atau nomor telepon operasional">
                </div>
            </div>

            <!-- Identitas Visual -->
            <div class="settings-card">
                <div class="card-header">
                    <i class="fas fa-paint-brush"></i>
                    <h3>Branding & Ikon</h3>
                </div>

                <div class="form-group">
                    <label>Logo Dashboard (Sidebar)</label>
                    <div class="upload-container" onclick="document.getElementById('logoInput').click()">
                        <div class="upload-icon"><i class="fas fa-image"></i></div>
                        <div class="upload-text">Pilih Logo Sekolah</div>
                        <div class="upload-hint">PNG Transparan disarankan</div>
                    </div>
                    <input type="file" id="logoInput" style="display: none;" accept="image/*">
                    <div class="preview-wrapper">
                        <div class="img-preview" id="logoPreviewBox">
                            <span style="font-weight: 700; color: var(--primary);">S</span>
                        </div>
                        <div class="preview-info">
                            <h4 id="logoStatus">Default Logo</h4>
                            <p>Ukuran optimal: 200x200px</p>
                        </div>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 40px;">
                    <label>Ikon Aplikasi (PWA / Home Screen)</label>
                    <div class="upload-container" onclick="document.getElementById('pwaInput').click()">
                        <div class="upload-icon"><i class="fas fa-mobile-alt"></i></div>
                        <div class="upload-text">Pilih Ikon PWA</div>
                        <div class="upload-hint">Format PNG (512x512px)</div>
                    </div>
                    <input type="file" id="pwaInput" style="display: none;" accept="image/png">
                    <div class="preview-wrapper">
                        <div class="img-preview pwa-icon" id="pwaPreviewBox">
                            <i class="fas fa-th-large" style="color: var(--primary);"></i>
                        </div>
                        <div class="preview-info">
                            <h4 id="pwaStatus">Default PWA Icon</h4>
                            <p>Akan muncul di menu utama HP</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <script>
        // Load data on page load
        window.onload = function() {
            const savedAppName = localStorage.getItem('sais_appName');
            const savedSchoolName = localStorage.getItem('sais_schoolName');
            const savedSchoolProfile = localStorage.getItem('sais_schoolProfile');
            const savedSchoolContact = localStorage.getItem('sais_schoolContact');
            const savedLogo = localStorage.getItem('sais_logo');
            const savedPwa = localStorage.getItem('sais_pwa');

            if (savedAppName) document.getElementById('appName').value = savedAppName;
            if (savedSchoolName) document.getElementById('schoolName').value = savedSchoolName;
            if (savedSchoolProfile) document.getElementById('schoolProfile').value = savedSchoolProfile;
            if (savedSchoolContact) document.getElementById('schoolContact').value = savedSchoolContact;

            if (savedLogo) {
                const previewBox = document.querySelector('.img-preview:not(.pwa-icon)');
                previewBox.innerHTML = `<img src="${savedLogo}" alt="Logo" style="max-width: 100%; max-height: 100%; object-fit: contain;">`;
                previewBox.nextElementSibling.innerText = 'Logo Tersimpan';
            }

            if (savedPwa) {
                const previewBox = document.querySelector('.img-preview.pwa-icon');
                previewBox.innerHTML = `<img src="${savedPwa}" alt="PWA" style="max-width: 100%; max-height: 100%; object-fit: contain;">`;
                previewBox.nextElementSibling.innerText = 'Ikon Tersimpan';
            }
        };

        function simulateSave() {
            const btn = document.querySelector('.btn-primary');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '⏳ Menyimpan...';
            btn.style.opacity = '0.8';

            // Save to localStorage
            localStorage.setItem('sais_appName', document.getElementById('appName').value);
            localStorage.setItem('sais_schoolName', document.getElementById('schoolName').value);
            localStorage.setItem('sais_schoolProfile', document.getElementById('schoolProfile').value);
            localStorage.setItem('sais_schoolContact', document.getElementById('schoolContact').value);

            const logoImg = document.querySelector('.img-preview:not(.pwa-icon) img');
            if (logoImg) localStorage.setItem('sais_logo', logoImg.src);

            const pwaImg = document.querySelector('.img-preview.pwa-icon img');
            if (pwaImg) localStorage.setItem('sais_pwa', pwaImg.src);
            
            setTimeout(() => {
                btn.innerHTML = '✅ Berhasil Disimpan';
                btn.style.background = '#10b981';
                btn.style.opacity = '1';

                const logoText = document.querySelector('.img-preview:not(.pwa-icon)').nextElementSibling;
                if(logoText.innerText.includes('Belum')) logoText.innerText = 'Logo Tersimpan';

                const pwaText = document.querySelector('.img-preview.pwa-icon').nextElementSibling;
                if(pwaText.innerText.includes('Belum')) pwaText.innerText = 'Ikon Tersimpan';
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.background = 'var(--primary)';
                }, 2000);
            }, 1000);
        }

        // Handle file selection and preview
        document.getElementById('logoInput').addEventListener('change', function(e) {
            if(e.target.files.length > 0) {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = function(event) {
                    const previewBox = document.querySelector('.img-preview:not(.pwa-icon)');
                    previewBox.innerHTML = `<img src="${event.target.result}" alt="Logo Preview" style="max-width: 100%; max-height: 100%; object-fit: contain;">`;
                    previewBox.nextElementSibling.innerText = 'Logo Baru (Belum Disimpan)';
                }
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('pwaInput').addEventListener('change', function(e) {
            if(e.target.files.length > 0) {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = function(event) {
                    const previewBox = document.querySelector('.img-preview.pwa-icon');
                    previewBox.innerHTML = `<img src="${event.target.result}" alt="PWA Preview" style="max-width: 100%; max-height: 100%; object-fit: contain;">`;
                    previewBox.nextElementSibling.innerText = 'Ikon Baru (Belum Disimpan)';
                }
                reader.readAsDataURL(file);
            }
        });
    </script>
    <script src="js/load-sidebar.js"></script>
</body>
</html>
