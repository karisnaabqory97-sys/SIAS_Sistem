<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan Akun | SAIS Guru</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { background: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; }

        .mobile-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .back-btn {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border-radius: 12px; color: white; text-decoration: none;
        }

        main { flex: 1; padding: 20px; width: 100%; max-width: 500px; margin: 0 auto; }

        .settings-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 24px; margin-top: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
        .form-control { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; color: white; outline: none; font-size: 14px; }
        .form-control:focus { border-color: var(--primary); }
        
        .btn-update { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 600; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="mobile-header">
        <a href="dashboard_guru.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h3 style="font-size: 16px;">Pengaturan</h3>
    </div>

    <main>
        <div class="settings-card">
            <div style="text-align:center; margin-bottom: 30px;">
                <div style="width:80px; height:80px; background:var(--primary); border-radius:50%; display:flex; align-items:center; justify-content:center; margin: 0 auto 15px; font-size:32px; font-weight:700;" id="userInitial">G</div>
                <h2 id="userName" style="font-size:18px;">Nama Guru</h2>
                <p id="userRole" style="font-size:12px; color:var(--text-dim);">Guru Mata Pelajaran</p>
            </div>

            <form onsubmit="event.preventDefault(); alert('Profil berhasil diperbarui!');">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" class="form-control" id="uName" readonly>
                </div>
                <div class="form-group">
                    <label>Ganti Password</label>
                    <input type="password" class="form-control" placeholder="Password baru">
                </div>
                <div class="form-group">
                    <label>Konfirmasi Password</label>
                    <input type="password" class="form-control" placeholder="Ulangi password baru">
                </div>
                <button class="btn-update">Simpan Perubahan</button>
            </form>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userName').textContent = user.nama || 'Guru';
            document.getElementById('userRole').textContent = 'Guru ' + (user.mapel || '-');
            document.getElementById('uName').value = user.username || '';
            document.getElementById('userInitial').textContent = (user.nama || 'G').charAt(0).toUpperCase();
        });
    </script>
</body>
</html>
