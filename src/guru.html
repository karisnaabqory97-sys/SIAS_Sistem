<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Guru | SAIS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style_admin_shared.css">
    <style>
        /* Specific management styles */
        .search-bar {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 16px;
            width: 250px;
            color: white; outline: none;
            font-size: 13px;
        }
        .search-bar:focus { border-color: var(--accent); }
        .status { padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .status-aktif { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .status-nonaktif { background: rgba(239, 68, 68, 0.1); color: #f87171; }
        .action-btn { background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-size: 14px; margin-right: 12px; }
        .action-btn:hover { color: var(--accent); }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 24px; padding: 32px; width: 100%; max-width: 700px;
            max-height: 90vh; overflow-y: auto;
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .section-title { grid-column: 1 / -1; font-size: 12px; font-weight: 700; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-top: 10px; }
        .form-control { width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; color: white; outline: none; font-size: 13px; }
        .form-control:focus { border-color: var(--accent); }
        .required { color: #ef4444; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 10px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .btn-cancel { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border); padding: 10px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .info-box { background: rgba(108, 99, 255, 0.1); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; margin-bottom: 20px; font-size: 13px; }
        .progress-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 3000; }
        .progress-overlay.active { display: flex; }
        .progress-box { background: var(--bg-card); border-radius: 24px; padding: 32px; width: 350px; text-align: center; border: 1px solid var(--border); }
        .progress-bar-wrap { background: rgba(255,255,255,0.05); border-radius: 99px; height: 10px; overflow: hidden; margin: 20px 0; }
        .progress-bar-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.3s; }
        .progress-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .progress-sub { font-size: 13px; color: var(--text-dim); }
        .progress-count { font-size: 14px; font-weight: 600; color: var(--accent); }
</style>
</head>
<body data-page="guru">
    <div id="sidebar-container"></div>

    <div class="wrapper">
        <header class="global-header">
            <div class="top-bar-left">
                <button id="menuToggle"><i class="fas fa-bars"></i></button>
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" placeholder="Cari data, menu, atau bantuan...">
                </div>
            </div>

            <div class="header-actions">
                <div class="user-profile">
                    <div class="user-info">
                        <span class="user-name" id="userName">Admin</span>
                        <span class="user-role">Administrator</span>
                    </div>
                    <div class="user-avatar" id="userInitial">A</div>
                </div>
            </div>
        </header>

        <main>
            <div class="page-header">
                <div class="header-title">
                    <h1>Manajemen Guru</h1>
                    <p id="totalGuruText">Total 0 guru terdaftar</p>
                </div>
                <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                    <input type="text" class="search-bar" id="tableSearch" placeholder="Cari NUPTK atau Nama...">
                    <button class="btn btn-secondary" id="btnTemplate"><i class="fas fa-download"></i> Template</button>
                    <input type="file" id="fileUpload" accept=".csv" style="display: none;">
                    <button class="btn btn-secondary" id="btnUpload"><i class="fas fa-upload"></i> Upload</button>
                    <button class="btn btn-success" id="btnSimpan"><i class="fas fa-sync"></i> Sinkron</button>
                    <button class="btn btn-primary" id="openAddModal"><i class="fas fa-plus"></i> Tambah Guru</button>
                </div>
            </div>

            <div class="content-card">
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>NUPTK</th>
                                <th>NAMA GURU</th>
                                <th>USERNAME</th>
                                <th>STATUS</th>
                                <th>AKSI</th>
                            </tr>
                        </thead>
                        <tbody id="guruTableBody">
                            <tr><td colspan="5" style="text-align: center; padding: 40px;">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Tambah/Edit Guru -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Tambah Guru Baru</h2>
                <p style="color: var(--text-dim); font-size: 13px;">Masukkan data lengkap guru. <span class="required">*</span> wajib diisi.</p>
            </div>

            <div class="info-box" id="infoBox">
                <strong>Info:</strong> Password otomatis: <span id="autoPassword">-</span>
            </div>

            <form id="addGuruForm">
                <div class="form-grid">
                    <div class="section-title">Data Guru</div>
                    <div class="form-group">
                        <label>NUPTK</label>
                        <input type="text" class="form-control" id="inputNUPTK" placeholder="Contoh: 198501012010011001">
                    </div>
                    <div class="form-group">
                        <label>Nama Lengkap <span class="required">*</span></label>
                        <input type="text" class="form-control" id="inputNama" placeholder="Nama lengkap guru" required>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="section-title">Akun Login</div>
                    <div class="form-group">
                        <label>Username <span class="required">*</span></label>
                        <input type="text" class="form-control" id="inputUsername" required>
                    </div>
                    <div class="form-group">
                        <label>Password <span class="required">*</span></label>
                        <input type="text" class="form-control" id="inputPassword" required>
                    </div>
                </div>

                <div class="form-grid" id="statusGroup" style="display: none;">
                    <div class="section-title">Status</div>
                    <div class="form-group">
                        <select class="form-control" id="inputStatus">
                            <option value="Aktif">Aktif</option>
                            <option value="Nonaktif">Nonaktif</option>
                        </select>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="closeAddModal">Batal</button>
                    <button type="submit" class="btn-save">Simpan Data</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Detail Guru -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Detail Guru</h2>
            </div>
            <div id="detailContent" style="display: flex; flex-direction: column; gap: 16px; margin-top: 20px;"></div>
            <div class="modal-footer">
                <button type="button" class="btn-cancel" id="closeDetailModal">Tutup</button>
            </div>
        </div>
    </div>

    <!-- Progress Upload Modal -->
    <div class="progress-overlay" id="progressOverlay">
        <div class="progress-box">
            <div class="progress-title">⏳ Mengimpor Data...</div>
            <div class="progress-sub" id="progressSub">Menyiapkan data...</div>
            <div class="progress-bar-wrap">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <div class="progress-count" id="progressCount">0 / 0</div>
        </div>
    </div>

    <script src="js/load-sidebar.js"></script>
    <script>
        let guruData = [];
        const tableBody = document.getElementById('guruTableBody');
        const searchInput = document.getElementById('tableSearch');

        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userName').textContent = user.nama || 'Admin';
            document.getElementById('userInitial').textContent = (user.nama || 'A').charAt(0).toUpperCase();

            await initPage();
        });

        async function initPage() {
            await fetchGuru();
        }

        async function fetchGuru() {
            try {
                const data = await window.db.getAllGuru();
                guruData = data || [];
                renderTable();
            } catch (e) {
                console.error("Gagal mengambil data:", e);
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #ef4444; padding: 40px;">Gagal memuat data.</td></tr>';
            }
        }

        function renderTable(filterQuery = '') {
            tableBody.innerHTML = '';
            let visibleCount = 0;
            const lowerQuery = filterQuery.toLowerCase();

            guruData.forEach((guru, index) => {
                const rowText = `${guru.nuptk} ${guru.nama}`.toLowerCase();
                if (filterQuery && !rowText.includes(lowerQuery)) return;

                visibleCount++;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${guru.nuptk || '-'}</td>
                    <td style="font-weight: 600;">${guru.nama}</td>
                    <td style="color: var(--text-dim);">${guru.username || '-'}</td>
                    <td><span class="status status-${guru.status.toLowerCase()}">${guru.status}</span></td>
                    <td>
                        <button class="action-btn" onclick="editGuru(${index})"><i class="fas fa-edit"></i></button>
                        <button class="action-btn" onclick="detailGuru(${index})"><i class="fas fa-eye"></i></button>
                        <button class="action-btn" style="color:#ef4444;" onclick="deleteGuru(${index})"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });

            document.getElementById('totalGuruText').innerText = `Total ${guruData.length} guru terdaftar`;
        }

        searchInput.addEventListener('input', (e) => renderTable(e.target.value));

        // Modal Controls
        const addModal = document.getElementById('addModal');
        const detailModal = document.getElementById('detailModal');
        const addGuruForm = document.getElementById('addGuruForm');
        let currentEditId = null;

        document.getElementById('openAddModal').onclick = () => {
            currentEditId = null;
            document.getElementById('modalTitle').innerText = 'Tambah Guru Baru';
            document.getElementById('statusGroup').style.display = 'none';
            addGuruForm.reset();
            document.getElementById('inputPassword').value = 'guru' + Date.now().toString().slice(-4);
            addModal.style.display = 'flex';
        };

        document.getElementById('closeAddModal').onclick = () => addModal.style.display = 'none';
        document.getElementById('closeDetailModal').onclick = () => detailModal.style.display = 'none';

        document.getElementById('btnSimpan').onclick = async () => {
            const btn = document.getElementById('btnSimpan');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sinkronisasi...';
            btn.disabled = true;

            try {
                const [allGuru, allMapel, allKelas] = await Promise.all([
                    window.db.getAllGuru(),
                    window.db.getAllMapel(),
                    window.db.getAllKelas()
                ]);

                let updatedCount = 0;
                for (const guru of allGuru) {
                    // Find subjects assigned to this guru
                    const subjects = allMapel.filter(m => 
                        (m.penugasan || []).some(p => p.guru === guru.nama)
                    ).map(m => m.nama);

                    const mapelStr = subjects.join(', ');

                    // If mapel changed, update guru record
                    if (guru.mapel !== mapelStr) {
                        await window.db.updateGuru(guru.id, { ...guru, mapel: mapelStr });
                        updatedCount++;
                    }
                }

                alert(`Sinkronisasi selesai! ${updatedCount} data guru diperbarui.`);
                await fetchGuru();
            } catch (e) {
                console.error(e);
                alert("Gagal melakukan sinkronisasi: " + e.message);
            } finally {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        };

        // CRUD Actions
        window.editGuru = (index) => {
            const guru = guruData[index];
            currentEditId = guru.id;
            // Store old name to handle name changes in other tables
            window.oldGuruName = guru.nama; 

            document.getElementById('modalTitle').innerText = 'Edit Data Guru';
            document.getElementById('statusGroup').style.display = 'block';
            
            document.getElementById('inputNUPTK').value = guru.nuptk || '';
            document.getElementById('inputNama').value = guru.nama || '';
            document.getElementById('inputUsername').value = guru.username || '';
            document.getElementById('inputPassword').value = guru.password || '';
            document.getElementById('inputStatus').value = guru.status || 'Aktif';
            
            addModal.style.display = 'flex';
        };

        window.detailGuru = (index) => {
            const guru = guruData[index];
            const content = document.getElementById('detailContent');
            content.innerHTML = `
                <div style="display:grid; grid-template-columns: 1fr 2fr; gap: 10px; font-size: 14px;">
                    <div style="color: var(--text-dim);">NUPTK</div><div>: ${guru.nuptk || '-'}</div>
                    <div style="color: var(--text-dim);">Nama</div><div style="font-weight:600;">: ${guru.nama}</div>
                    <div style="color: var(--text-dim);">Mata Pelajaran</div><div>: ${guru.mapel || '-'}</div>
                    <div style="color: var(--text-dim);">Username</div><div>: ${guru.username}</div>
                    <div style="color: var(--text-dim);">Status</div><div>: <span class="badge badge-purple">${guru.status}</span></div>
                </div>
            `;
            detailModal.style.display = 'flex';
        };

        window.deleteGuru = async (index) => {
            const guru = guruData[index];
            if (confirm(`Apakah Anda yakin ingin menghapus guru ${guru.nama}?`)) {
                try {
                    await window.db.deleteGuru(guru.id);
                    await fetchGuru();
                } catch (e) {
                    alert("Gagal menghapus data guru.");
                }
            }
        };

        addGuruForm.onsubmit = async (e) => {
            e.preventDefault();
            const newName = document.getElementById('inputNama').value;
            const formData = {
                nuptk: document.getElementById('inputNUPTK').value,
                nama: newName,
                username: document.getElementById('inputUsername').value,
                password: document.getElementById('inputPassword').value,
                status: currentEditId ? document.getElementById('inputStatus').value : 'Aktif'
            };

            try {
                if (currentEditId) {
                    const oldName = window.oldGuruName;
                    const existingGuru = guruData.find(g => g.id === currentEditId) || {};
                    // Merge data lama + form agar field seperti mapel tidak hilang
                    await window.db.updateGuru(currentEditId, { ...existingGuru, ...formData });
                    
                    // If name changed, update other tables
                    if (oldName && oldName !== newName) {
                        await syncTeacherNameChange(oldName, newName);
                    }
                } else {
                    formData.type = 'guru';
                    formData.mapel = '';
                    await window.db.insertGuru(formData);
                }
                addModal.style.display = 'none';
                await fetchGuru();
            } catch (e) {
                console.error(e.message || e);
                alert("Gagal menyimpan data guru: " + (e.message || 'Unknown error'));
            }
        };

        async function syncTeacherNameChange(oldName, newName) {
            console.log(`Syncing name change: ${oldName} -> ${newName}`);
            try {
                // 1. Update Kelas (Wali Kelas)
                const allKelas = await window.db.getAllKelas();
                for (const k of allKelas) {
                    if (k.wali === oldName) {
                        await window.db.updateKelas(k.id, { ...k, wali: newName });
                    }
                }

                // 2. Update Mata Pelajaran (Penugasan Guru)
                const allMapel = await window.db.getAllMapel();
                for (const m of allMapel) {
                    let changed = false;
                    const newPenugasan = (m.penugasan || []).map(p => {
                        if (p.guru === oldName) {
                            changed = true;
                            return { ...p, guru: newName };
                        }
                        return p;
                    });
                    if (changed) {
                        await window.db.updateMapel(m.id, { ...m, penugasan: newPenugasan });
                    }
                }

                // 3. Update Jadwal Pelajaran (Guru)
                // Note: window.db.getAllJadwal() and update might be needed if supported by DB helper
                // For now we focus on Kelas and Mapel which are the primary assignments.
            } catch (err) {
                console.error("Error during cascading name change:", err);
            }
        }

        // Template & Upload CSV
        document.getElementById('btnTemplate').onclick = () => window.location.href = 'template_guru.csv';
        document.getElementById('btnUpload').onclick = () => document.getElementById('fileUpload').click();

        document.getElementById('fileUpload').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (evt) => {
                const text = evt.target.result;
                const lines = text.split('\n').filter(l => l.trim());
                if (lines.length < 2) return alert('File CSV kosong atau hanya header.');

                const delim = lines[0].includes(';') ? ';' : ',';
                const rawHeaders = lines[0].split(delim).map(h => h.trim().toLowerCase().replace(/\s+/g, ''));

                const idx = (key) => {
                    return rawHeaders.findIndex(h => h.includes(key));
                };

                if (idx('nuptk') === -1) return alert('Kolom NUPTK tidak ditemukan di CSV.');
                if (idx('nama') === -1) return alert('Kolom Nama tidak ditemukan di CSV.');

                const progressOverlay = document.getElementById('progressOverlay');
                const progressFill = document.getElementById('progressFill');
                const progressCount = document.getElementById('progressCount');
                const progressSub = document.getElementById('progressSub');

                progressOverlay.style.display = 'flex';
                const rows = lines.slice(1);
                let success = 0, failed = 0;

                for (let i = 0; i < rows.length; i++) {
                    const cols = rows[i].split(delim).map(c => c.trim());
                    const get = (key) => cols[idx(key)] || '';

                    const nuptk = get('nuptk');
                    if (!nuptk) { failed++; continue; }

                    const data = {
                        nuptk: nuptk,
                        nama: get('nama'),
                        mapel: get('mapel') || get('matapelajaran') || get('pelajaran') || '',
                        username: get('username') || nuptk,
                        password: get('password') || 'guru' + nuptk.slice(-4),
                        status: 'Aktif'
                    };

                    try {
                        await window.db.insertGuru(data);
                        success++;
                    } catch (err) {
                        failed++;
                        console.error(`Baris ${i+2} gagal:`, nuptk, err.message);
                    }

                    const pct = Math.round(((i + 1) / rows.length) * 100);
                    progressFill.style.width = pct + '%';
                    progressCount.textContent = `${i + 1} / ${rows.length}`;
                    progressSub.textContent = `Berhasil: ${success}, Gagal: ${failed}`;
                }

                progressSub.textContent = `Selesai! ${success} berhasil, ${failed} gagal.`;
                await fetchGuru();
                document.getElementById('fileUpload').value = '';
                setTimeout(() => progressOverlay.style.display = 'none', 2000);
            };
            reader.readAsText(file);
        };
    </script>
</body>
</html>
