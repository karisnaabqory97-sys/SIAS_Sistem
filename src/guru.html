<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Guru | SAIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #10b981;
            --bg-main: #0b0f1a;
            --bg-sidebar: #111827;
            --bg-card: #1f2937;
            --border: rgba(255, 255, 255, 0.06);
            --text-main: #f3f4f6;
            --text-dim: #9ca3af;
            --sidebar-width: 280px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* Main Content */
        main {
            flex: 1;
            margin-left: 260px;
            padding: 40px 60px;
        }

        header {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 48px;
        }

        .header-title h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; letter-spacing: -1px; }
        .header-title p { color: var(--text-dim); font-size: 15px; }

        .search-bar {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px 20px;
            width: 320px;
            color: white; outline: none;
            transition: var(--transition);
        }
        .search-bar:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.07); }

        /* Buttons Modern */
        .btn {
            padding: 12px 24px; border-radius: 14px; font-weight: 600; font-size: 14px;
            cursor: pointer; transition: var(--transition); border: none;
            display: flex; align-items: center; gap: 8px;
        }

        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2); }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }

        .btn-secondary { background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid var(--border); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--primary); }

        .btn-success { background: var(--accent); color: white; }
        .btn-success:hover { background: #059669; }

        /* Table Container Modern */
        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 24px;
            overflow: hidden;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { padding: 16px; font-size: 12px; color: var(--text-dim); text-align: left; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 16px; background: rgba(255, 255, 255, 0.02); font-size: 14px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        td:first-child { border-left: 1px solid var(--border); border-radius: 16px 0 0 16px; }
        td:last-child { border-right: 1px solid var(--border); border-radius: 0 16px 16px 0; }

        tr:hover td { background: rgba(255, 255, 255, 0.04); }

        .status { padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .status-aktif { background: rgba(16, 185, 129, 0.1); color: var(--accent); }
        .status-nonaktif { background: rgba(239, 68, 68, 0.1); color: #f87171; }

        .action-btn { background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-size: 16px; transition: 0.3s; margin-right: 12px; }
        .action-btn:hover { color: var(--primary); }

        /* Modal Redesign */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000;
        }

        .modal {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 32px; padding: 40px; width: 100%; max-width: 700px;
            max-height: 90vh; overflow-y: auto;
        }

        .modal-header h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 32px; }
        .section-title { grid-column: 1 / -1; font-size: 14px; font-weight: 700; color: var(--primary); margin-top: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
        .form-control { width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; color: white; outline: none; }
        .form-control:focus { border-color: var(--primary); }

        /* Progress Modal */
        .progress-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .progress-overlay.active { display: flex; }
        .progress-box { background: var(--bg-card); border-radius: 32px; padding: 40px; width: 400px; text-align: center; border: 1px solid var(--border); }
        .progress-bar-wrap { background: rgba(255,255,255,0.05); border-radius: 99px; height: 12px; overflow: hidden; margin: 24px 0; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: 0.3s; }
    </style>
</head>
<body data-page="guru">
    <div id="sidebar-container"></div>

    <main>
        <header>
            <div class="header-title">
                <h1>Manajemen Guru</h1>
                <p>Total 0 guru terdaftar</p>
            </div>
            <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                <input type="text" class="search-bar" placeholder="Cari NUPTK atau Nama...">
                <button class="btn btn-secondary" id="btnTemplate"><i class="fas fa-download"></i> Template</button>
                <input type="file" id="fileUpload" accept=".csv" style="display: none;">
                <button class="btn btn-secondary" id="btnUpload"><i class="fas fa-upload"></i> Upload</button>
                <button class="btn btn-success" id="btnSimpan"><i class="fas fa-sync"></i> Sinkron</button>
                <button class="btn btn-primary" id="openAddModal"><i class="fas fa-plus"></i> Tambah Guru</button>
            </div>
        </header>

        <!-- Progress Upload Modal -->
        <div class="progress-overlay" id="progressOverlay">
            <div class="progress-box">
                <div class="progress-title">⏳ Mengimpor Data...</div>
                <div class="progress-sub" id="progressSub">Menyiapkan data...</div>
                <div class="progress-bar-wrap">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>
                <div class="progress-count" id="progressCount">0 / 0</div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>NUPTK</th>
                        <th>NAMA GURU</th>
                        <th>MATA PELAJARAN</th>
                        <th>USERNAME</th>
                        <th>STATUS</th>
                        <th>AKSI</th>
                    </tr>
                </thead>
                <tbody id="guruTableBody">
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal Tambah/Edit Guru -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Tambah Guru Baru</h2>
                <p style="color: var(--text-dim); font-size: 14px;">Masukkan data lengkap guru. <span class="required">*</span> wajib diisi.</p>
            </div>

            <div class="info-box" id="infoBox">
                <strong>Info:</strong> Password otomatis: <span id="autoPassword">-</span> (dapat diubah)
            </div>

            <form id="addGuruForm">
                <div class="form-grid">
                    <div class="section-title">Data Guru</div>

                    <div class="form-group">
                        <label>NUPTK <span class="required">*</span></label>
                        <input type="text" class="form-control" id="inputNUPTK" placeholder="Contoh: 198501012010011001" required>
                    </div>

                    <div class="form-group">
                        <label>Nama Lengkap <span class="required">*</span></label>
                        <input type="text" class="form-control" id="inputNama" placeholder="Nama lengkap guru" required>
                    </div>

                    <div class="form-group full-width">
                        <label>Mata Pelajaran <span class="required">*</span></label>
                        <select class="form-control" id="inputMapel" required>
                            <option value="">-- Pilih Mata Pelajaran --</option>
                        </select>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="section-title">Akun Login</div>

                    <div class="form-group">
                        <label>Username <span class="required">*</span></label>
                        <input type="text" class="form-control" id="inputUsername" placeholder="Username untuk login" required>
                    </div>

                    <div class="form-group">
                        <label>Password <span class="required">*</span></label>
                        <input type="text" class="form-control" id="inputPassword" placeholder="Password login" required>
                    </div>
                </div>

                <div class="form-grid" id="statusGroup" style="display: none;">
                    <div class="section-title">Status</div>
                    <div class="form-group">
                        <label>Status Akun</label>
                        <select class="form-control" id="inputStatus">
                            <option value="Aktif">Aktif</option>
                            <option value="Nonaktif">Nonaktif</option>
                        </select>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="closeAddModal">Batal</button>
                    <button type="submit" class="btn-save">Simpan Data</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Detail Guru -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Detail Guru</h2>
            </div>
            <div id="detailContent" style="display: flex; flex-direction: column; gap: 12px;">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-cancel" id="closeDetailModal">Tutup</button>
            </div>
        </div>
    </div>

    <script>
        // Data Default
        const defaultGuruData = [];

        let guruData = [];
        const tableBody = document.getElementById('guruTableBody');
        const searchBar = document.querySelector('.search-bar');
        const headerDesc = document.querySelector('header p');

        // Load Data
        async function fetchGuru() {
            try {
                const data = await window.db.getAllGuru();
                guruData = data;
            } catch (e) {
                console.error("Gagal mengambil data:", e);
                // Fallback ke localStorage
                try {
                    const stored = localStorage.getItem('sais_dataGuru');
                    if (stored) {
                        guruData = JSON.parse(stored);
                    } else {
                        guruData = JSON.parse(JSON.stringify(defaultGuruData));
                    }
                } catch (e2) {
                    guruData = JSON.parse(JSON.stringify(defaultGuruData));
                }
            }
            renderTable(searchBar.value);
        }

        function saveAndRender() {
            try {
                localStorage.setItem('sais_dataGuru', JSON.stringify(guruData));
            } catch (e) { console.error("Error saving to localStorage", e); }
            renderTable(searchBar.value);
        }

        function renderTable(filterQuery = '') {
            tableBody.innerHTML = '';
            let visibleCount = 0;
            const lowerQuery = filterQuery.toLowerCase();

            guruData.forEach((guru, index) => {
                const rowText = `${guru.nuptk} ${guru.nama} ${guru.mapel} ${guru.username || ''}`.toLowerCase();
                if (filterQuery && !rowText.includes(lowerQuery)) return;

                visibleCount++;
                const tr = document.createElement('tr');
                tr.dataset.index = index;
                tr.innerHTML = `
                    <td>${guru.nuptk}</td>
                    <td>${guru.nama}</td>
                    <td>${guru.mapel}</td>
                    <td><span style="color: var(--text-dim);">${guru.username || '-'}</span></td>
                    <td><span class="status status-${guru.status.toLowerCase()}">${guru.status}</span></td>
                    <td>
                        <button class="action-btn btn-edit">Edit</button>
                        <button class="action-btn btn-detail">Detail</button>
                        <button class="action-btn btn-delete" style="color: #ef4444;">Hapus</button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });

            headerDesc.innerText = filterQuery
                ? `Menampilkan ${visibleCount} guru`
                : `Total ${guruData.length} guru terdaftar`;
        }

        async function fetchMapelOptions() {
            const inputMapel = document.getElementById('inputMapel');
            if (!inputMapel) return;
            try {
                const mapelList = await window.db.getAllMapel();
                inputMapel.innerHTML = '<option value="">-- Pilih Mata Pelajaran --</option>';
                if (mapelList && mapelList.length > 0) {
                    mapelList.forEach(mapel => {
                        const option = document.createElement('option');
                        option.value = mapel.nama;
                        option.textContent = mapel.nama;
                        inputMapel.appendChild(option);
                    });
                } else {
                    const option = document.createElement('option');
                    option.value = "";
                    option.textContent = "Belum ada pelajaran (Tambahkan di Manajemen Pelajaran)";
                    inputMapel.appendChild(option);
                }
            } catch (err) {
                console.error("Gagal memuat mata pelajaran:", err);
                inputMapel.innerHTML = `
                    <option value="">-- Pilih Mata Pelajaran --</option>
                    <option value="Matematika">Matematika</option>
                    <option value="Bahasa Indonesia">Bahasa Indonesia</option>
                    <option value="Bahasa Inggris">Bahasa Inggris</option>
                    <option value="IPA / Fisika">IPA / Fisika</option>
                    <option value="IPS">IPS</option>
                    <option value="Pendidikan Agama">Pendidikan Agama</option>
                    <option value="PKn">PKn</option>
                    <option value="Seni Budaya">Seni Budaya</option>
                    <option value="PJOK">PJOK</option>
                    <option value="Prakarya">Prakarya</option>
                `;
            }
        }

        async function initPage() {
            await fetchMapelOptions();
            await fetchGuru();
        }

        initPage();

        // Template & Upload
        document.getElementById('btnTemplate').addEventListener('click', () => {
            const csv = 'NUPTK,Nama,Mata Pelajaran,Username,Password\n198501012010011001,Drs. Heru Sujatmiko,Matematika,heru.sujatmiko,guru2024';
            const link = document.createElement('a');
            link.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
            link.download = 'template_guru.csv';
            link.click();
            alert('Template berhasil diunduh.');
        });

        document.getElementById('btnUpload').addEventListener('click', () => {
            document.getElementById('fileUpload').click();
        });

        document.getElementById('fileUpload').addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                const reader = new FileReader();

                reader.onload = function(event) {
                    const csvText = event.target.result;
                    const parsedData = parseCSV(csvText);

                    if (parsedData.length === 0) {
                        alert('Format CSV tidak valid atau tidak ada data!\n\nPastikan file menggunakan format:\nNUPTK,Nama,Mata Pelajaran,Username,Password');
                        return;
                    }

                    const confirmImport = confirm(`Ditemukan ${parsedData.length} data guru.\nApakah ingin mengimpor semua data ke database?`);

                    if (confirmImport) {
                        async function importData() {
                            const progressOverlay = document.getElementById('progressOverlay');
                            const progressFill = document.getElementById('progressFill');
                            const progressSub = document.getElementById('progressSub');
                            const progressCount = document.getElementById('progressCount');

                            progressOverlay.classList.add('active');

                            let importedCount = 0;
                            let updatedCount = 0;
                            let skippedCount = 0;
                            let errorCount = 0;
                            const total = parsedData.length;

                            for (let i = 0; i < parsedData.length; i++) {
                                const row = parsedData[i];
                                const pct = Math.round(((i + 1) / total) * 100);
                                progressFill.style.width = pct + '%';
                                progressCount.textContent = `${i + 1} / ${total}`;
                                progressSub.textContent = `Mengimpor: ${row.Nama || row.NUPTK || 'baris ' + (i + 1)}`;

                                if (!row.NUPTK || !row.Nama) {
                                    skippedCount++;
                                    continue;
                                }

                                const namaLower = (row.Nama || '').toLowerCase().replace(/\s+/g, '.').replace(/[^a-z.]/g, '');
                                const username = row.Username || namaLower;
                                const password = row.Password || 'guru' + (row.NUPTK ? String(row.NUPTK).slice(-4) : Date.now().toString().slice(-4));

                                const newGuru = {
                                    nuptk: String(row.NUPTK).trim(),
                                    nama: String(row.Nama).trim(),
                                    mapel: (row['Mata Pelajaran'] || row.Mapel || '').trim(),
                                    username: username.trim(),
                                    password: password.trim(),
                                    status: (row.Status || 'Aktif').trim()
                                };

                                try {
                                    const existing = guruData.find(g => g.nuptk === newGuru.nuptk);
                                    if (existing) {
                                        await window.db.updateGuru(existing.id, newGuru);
                                        updatedCount++;
                                    } else {
                                        await window.db.insertGuru(newGuru);
                                        importedCount++;
                                    }
                                } catch (err) {
                                    console.error(`Gagal mengimpor baris ${i + 1} (${newGuru.nuptk}):`, err.message || err);
                                    errorCount++;
                                }
                            }

                            progressOverlay.classList.remove('active');

                            await fetchGuru();
                            alert(
                                `✅ Import Selesai!\n` +
                                `➕ Baru ditambahkan : ${importedCount} data\n` +
                                `✏️ Diperbarui       : ${updatedCount} data\n` +
                                `⏭️ Dilewati         : ${skippedCount} data (NUPTK/Nama kosong)\n` +
                                `❌ Gagal ke DB      : ${errorCount} data`
                            );
                        }
                        importData();
                    }
                };

                reader.readAsText(file);
                e.target.value = '';
            }
        });

        // Fungsi parser CSV
        function parseCSV(text) {
            const lines = text.split(/\r?\n/).filter(line => line.trim());
            if (lines.length < 2) return [];

            const headers = parseCSVLine(lines[0]);
            const data = [];

            for (let i = 1; i < lines.length; i++) {
                const values = parseCSVLine(lines[i]);
                if (values.length === headers.length) {
                    const row = {};
                    headers.forEach((header, idx) => {
                        row[header.trim()] = values[idx] ? values[idx].trim() : '';
                    });
                    data.push(row);
                }
            }
            return data;
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);
            return result;
        }

        document.getElementById('btnSimpan').addEventListener('click', async () => {
            try {
                await fetchGuru();
                alert('✅ Data guru berhasil disinkronkan dari database!');
            } catch (e) {
                saveAndRender();
                alert('Data disimpan ke penyimpanan lokal.');
            }
        });

        // Modal Logic
        const addModal = document.getElementById('addModal');
        const openBtn = document.getElementById('openAddModal');
        const closeBtn = document.getElementById('closeAddModal');
        const form = document.getElementById('addGuruForm');
        const detailModal = document.getElementById('detailModal');
        const closeDetailModal = document.getElementById('closeDetailModal');

        let currentEditIndex = null;

        openBtn.addEventListener('click', () => {
            currentEditIndex = null;
            document.getElementById('modalTitle').innerText = 'Tambah Guru Baru';
            document.getElementById('statusGroup').style.display = 'none';
            document.getElementById('infoBox').classList.remove('hidden');
            document.getElementById('inputPassword').value = 'guru' + Date.now().toString().slice(-4);
            document.getElementById('autoPassword').innerText = document.getElementById('inputPassword').value;
            form.reset();
            addModal.style.display = 'flex';
        });

        closeBtn.addEventListener('click', () => {
            addModal.style.display = 'none';
            form.reset();
        });

        closeDetailModal.addEventListener('click', () => {
            detailModal.style.display = 'none';
        });

        window.addEventListener('click', (e) => {
            if (e.target === addModal) { addModal.style.display = 'none'; form.reset(); }
            if (e.target === detailModal) { detailModal.style.display = 'none'; }
        });

        // Auto-generate username dari nama
        document.getElementById('inputNama').addEventListener('input', function() {
            if (!currentEditIndex) {
                const namaLower = this.value.toLowerCase().replace(/\s+/g, '.').replace(/[^a-z.]/g, '');
                document.getElementById('inputUsername').value = namaLower;
            }
        });

        // Table Actions
        tableBody.addEventListener('click', (e) => {
            const tr = e.target.closest('tr');
            if (!tr) return;
            const index = parseInt(tr.dataset.index, 10);
            const guru = guruData[index];

            if (e.target.classList.contains('btn-edit')) {
                currentEditIndex = index;
                document.getElementById('modalTitle').innerText = 'Edit Guru';
                document.getElementById('statusGroup').style.display = 'block';
                document.getElementById('infoBox').classList.add('hidden');

                document.getElementById('inputNUPTK').value = guru.nuptk;
                document.getElementById('inputNama').value = guru.nama;
                document.getElementById('inputMapel').value = guru.mapel;
                document.getElementById('inputUsername').value = guru.username || '';
                document.getElementById('inputPassword').value = guru.password || '';
                document.getElementById('inputStatus').value = guru.status || 'Aktif';

                addModal.style.display = 'flex';

            } else if (e.target.classList.contains('btn-detail')) {
                const detailContent = document.getElementById('detailContent');
                detailContent.innerHTML = `
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div>
                            <span style="font-size: 11px; color: var(--text-dim);">NUPTK</span>
                            <div style="font-weight: 500;">${guru.nuptk}</div>
                        </div>
                        <div>
                            <span style="font-size: 11px; color: var(--text-dim);">Nama Lengkap</span>
                            <div style="font-weight: 500;">${guru.nama}</div>
                        </div>
                        <div>
                            <span style="font-size: 11px; color: var(--text-dim);">Mata Pelajaran</span>
                            <div style="font-weight: 500;">${guru.mapel}</div>
                        </div>
                        <div>
                            <span style="font-size: 11px; color: var(--text-dim);">Status</span>
                            <div><span class="status status-${guru.status.toLowerCase()}">${guru.status}</span></div>
                        </div>
                    </div>
                    <div style="border-top: 1px solid var(--border); padding-top: 16px;">
                        <span style="font-size: 12px; font-weight: 600; color: var(--primary);">Akun Login</span>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div>
                            <span style="font-size: 11px; color: var(--text-dim);">Username</span>
                            <div style="font-weight: 500; color: var(--success);">${guru.username || '-'}</div>
                        </div>
                        <div>
                            <span style="font-size: 11px; color: var(--text-dim);">Password</span>
                            <div style="font-weight: 500;">${guru.password ? '********' : '-'}</div>
                        </div>
                    </div>
                `;
                detailModal.style.display = 'flex';
            } else if (e.target.classList.contains('btn-delete')) {
                const confirmDelete = confirm(`Apakah Anda yakin ingin menghapus guru "${guru.nama}" (NUPTK: ${guru.nuptk})?\n\nTindakan ini tidak dapat dibatalkan.`);
                if (confirmDelete) {
                    async function deleteGuru() {
                        try {
                            await window.db.deleteGuru(guru.id);
                        } catch (e) {
                            console.error('Error:', e);
                        }
                        guruData.splice(index, 1);
                        saveAndRender();
                        alert(`Guru "${guru.nama}" berhasil dihapus.`);
                    }
                    deleteGuru();
                }
            }
        });

        // Form Submit
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const newData = {
                nuptk: document.getElementById('inputNUPTK').value,
                nama: document.getElementById('inputNama').value,
                mapel: document.getElementById('inputMapel').value,
                username: document.getElementById('inputUsername').value,
                password: document.getElementById('inputPassword').value,
                status: document.getElementById('inputStatus').value || 'Aktif'
            };

            async function saveGuru() {
                try {
                    if (currentEditIndex !== null) {
                        // Update existing
                        const guru = guruData[currentEditIndex];
                        await window.db.updateGuru(guru.id, newData);
                        alert('Data guru berhasil diperbarui!');
                    } else {
                        // Insert new
                        await window.db.insertGuru(newData);
                        alert('Data guru baru berhasil ditambahkan!\n\nUsername: ' + newData.username + '\nPassword: ' + newData.password);
                    }
                    // Refresh data
                    await fetchGuru();
                } catch (e) {
                    console.error('Error saving:', e);
                    // Fallback ke localStorage
                    if (currentEditIndex !== null) {
                        guruData[currentEditIndex] = newData;
                        alert('Data guru berhasil diperbarui!');
                    } else {
                        guruData.push(newData);
                        alert('Data guru baru berhasil ditambahkan!\n\nUsername: ' + newData.username + '\nPassword: ' + newData.password);
                    }
                    saveAndRender();
                }
            }
            saveGuru();

            addModal.style.display = 'none';
            form.reset();
        });

        // Search
        searchBar.addEventListener('input', (e) => {
            renderTable(e.target.value);
        });
    </script>
    <script src="js/load-sidebar.js"></script>
</body>
</html>
