<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenaikan Kelas | SAIS Siswa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { background: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; }

        .mobile-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .back-btn {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border-radius: 12px; color: white; text-decoration: none;
        }

        main { flex: 1; padding: 20px; width: 100%; max-width: 600px; margin: 0 auto; text-align: center; }

        .status-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 40px 20px; margin-top: 20px; }
        .status-icon { font-size: 64px; margin-bottom: 20px; }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .status-desc { font-size: 14px; color: var(--text-dim); line-height: 1.6; margin-bottom: 32px; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; text-align: left; }
        .info-item { background: rgba(255,255,255,0.03); padding: 16px; border-radius: 16px; border: 1px solid var(--border); }
        .info-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; text-transform: uppercase; }
        .info-value { font-size: 15px; font-weight: 600; color: white; }
    </style>
</head>
<body>
    <div class="mobile-header">
        <a href="dashboard_siswa.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div style="text-align: right;">
            <p id="userNama" style="font-size: 13px; font-weight: 600;">Nama Siswa</p>
            <p id="userKelas" style="font-size: 11px; color: var(--text-dim);">Kelas -</p>
        </div>
    </div>

    <main>
        <div class="status-card">
            <div class="status-icon">⏳</div>
            <h1>Status Kenaikan Kelas</h1>
            <p class="status-desc">Proses kenaikan kelas sedang disiapkan oleh admin sekolah. Hasil akan muncul di sini setelah tahun ajaran berakhir.</p>

            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">Kelas Sekarang</div>
                    <div class="info-value" id="currentKelas">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Tahun Ajaran</div>
                    <div class="info-value">2025/2026</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userNama').textContent = currentUser.nama || 'Siswa';
            document.getElementById('userKelas').textContent = 'Kelas ' + (currentUser.kelas || '-');
            document.getElementById('currentKelas').textContent = currentUser.kelas || '-';
        });
    </script>
</body>
</html>
