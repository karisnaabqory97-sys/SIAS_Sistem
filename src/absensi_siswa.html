<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kehadiran Saya | SAIS Siswa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; }

        .mobile-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .back-btn {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border-radius: 12px; color: white; text-decoration: none;
        }

        main { flex: 1; padding: 20px; width: 100%; max-width: 800px; margin: 0 auto; }

        header { margin-bottom: 24px; }
        h1 { font-size: 20px; font-weight: 700; }
        .subtitle { font-size: 13px; color: var(--text-dim); }

        .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
        .summary-card { background: var(--card-bg); padding: 16px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
        .summary-card .value { font-size: 24px; font-weight: 700; color: var(--primary); }
        .summary-card .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-top: 4px; }

        .attendance-list { display: flex; flex-direction: column; gap: 12px; }
        .attendance-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 16px; display: flex; justify-content: space-between; align-items: center; }
        .att-info h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .att-info p { font-size: 12px; color: var(--text-dim); }

        .status-badge { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; }
        .status-h { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .status-i { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .status-s { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .status-a { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    </style>
</head>
<body>
    <div class="mobile-header">
        <a href="dashboard_siswa.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div style="text-align: right;">
            <p id="userNama" style="font-size: 13px; font-weight: 600;">Siswa</p>
            <p id="userKelas" style="font-size: 11px; color: var(--text-dim);">Kelas -</p>
        </div>
    </div>

    <main>
        <header>
            <h1>Ringkasan Kehadiran</h1>
            <p class="subtitle">Rekapitulasi kehadiran Anda semester ini.</p>
        </header>

        <div class="summary-grid">
            <div class="summary-card"><div class="value" id="countH">0</div><div class="label">Hadir</div></div>
            <div class="summary-card"><div class="value" id="countISA" style="color:#f59e0b;">0</div><div class="label">Ijin/Sakit/Alpa</div></div>
        </div>

        <h3 style="font-size: 15px; margin-bottom: 16px;">Riwayat Kehadiran Terbaru</h3>
        <div id="attendanceList" class="attendance-list">
            <!-- Populated by JS -->
            <p style="text-align:center; padding:40px; color:var(--text-dim);">Memuat data...</p>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userNama').textContent = user.nama || 'Siswa';
            document.getElementById('userKelas').textContent = 'Kelas ' + (user.kelas || '-');
            
            await loadAttendance();
        });

        async function loadAttendance() {
            const user = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            const list = document.getElementById('attendanceList');

            try {
                const data = await window.db.getPresensiBySiswa(user.nisn);
                
                if (data.length === 0) {
                    list.innerHTML = '<p style="text-align:center; padding:40px; color:var(--text-dim);">Belum ada data kehadiran.</p>';
                    return;
                }

                // Update summary
                document.getElementById('countH').textContent = data.filter(d => d.status === 'H').length;
                document.getElementById('countISA').textContent = data.filter(d => d.status !== 'H').length;

                list.innerHTML = data.sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal)).map(d => `
                    <div class="attendance-card">
                        <div class="att-info">
                            <h4>${d.mapel}</h4>
                            <p>${d.tanggal} • Pertemuan Ke-${d.pertemuan}</p>
                        </div>
                        <div class="status-badge status-${d.status.toLowerCase()}">${d.status}</div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
