<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Mengajar | SAIS Guru</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { background: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; }

        .mobile-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .back-btn {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border-radius: 12px; color: white; text-decoration: none;
        }

        main { flex: 1; padding: 20px; width: 100%; max-width: 1000px; margin: 0 auto; }

        header { margin-bottom: 24px; }
        h1 { font-size: 20px; font-weight: 700; }
        .subtitle { font-size: 13px; color: var(--text-dim); }

        .table-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 15px; overflow: hidden; }
        .table-wrapper { overflow-x: auto; margin: 0 -15px; padding: 0 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { padding: 12px; font-size: 11px; color: var(--text-dim); border-bottom: 1px solid var(--border); text-align: center; }
        td { padding: 16px 12px; border-bottom: 1px solid var(--border); text-align: center; vertical-align: top; }

        .time-col { font-weight: 600; color: var(--primary); font-size: 12px; }

        .subject-block {
            background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px; padding: 10px; margin-bottom: 6px; color: #818cf8;
            text-align: left;
        }
        .subject-name { font-weight: 600; font-size: 13px; margin-bottom: 2px; color: white; }
        .subject-info { font-size: 10px; color: var(--text-dim); }

        .istirahat { background: rgba(255,255,255,0.03); color: var(--text-dim); border: none; text-align: center; padding: 8px; font-size: 11px; }
    </style>
</head>
<body>
    <div class="mobile-header">
        <a href="dashboard_guru.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div style="text-align: right;">
            <p id="userNama" style="font-size: 13px; font-weight: 600;">Nama Guru</p>
            <p id="userMapel" style="font-size: 11px; color: var(--text-dim);">Mapel -</p>
        </div>
    </div>

    <main>
        <header>
            <h1>Jadwal Mengajar</h1>
            <p class="subtitle" id="scheduleSubtitle">Jadwal mengajar mingguan Anda.</p>
        </header>

        <div class="table-card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 100px;">Waktu</th>
                            <th>Senin</th>
                            <th>Selasa</th>
                            <th>Rabu</th>
                            <th>Kamis</th>
                            <th>Jumat</th>
                        </tr>
                    </thead>
                    <tbody id="scheduleBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userNama').textContent = currentUser.nama || 'Guru';
            document.getElementById('userMapel').textContent = currentUser.mapel || '-';
            
            renderSchedule();
        });

        function renderSchedule() {
            const tbody = document.getElementById('scheduleBody');
            const times = ['07:30-09:00', '09:00-10:30', '10:30-10:45', '10:45-12:15'];
            
            tbody.innerHTML = times.map(time => {
                if (time === '10:30-10:45') {
                    return `<tr><td class="time-col">10:30 - 10:45</td><td colspan="5" class="istirahat">ISTIRAHAT</td></tr>`;
                }
                
                const cols = ['senin', 'selasa', 'rabu', 'kamis', 'jumat'].map(day => {
                    return `<td><div class="subject-block"><div class="subject-name">VII-A</div><div class="subject-info">Ruang 101</div></div></td>`;
                }).join('');

                return `<tr><td class="time-col">${time.replace('-', ' - ')}</td>${cols}</tr>`;
            }).join('');
        }
    </script>
</body>
</html>
