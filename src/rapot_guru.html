<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Nilai Rapot | SAIS Guru</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { background: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; }

        .mobile-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .back-btn {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border-radius: 12px; color: white; text-decoration: none;
        }

        main { flex: 1; padding: 20px; width: 100%; max-width: 1000px; margin: 0 auto; }

        header { margin-bottom: 24px; }
        h1 { font-size: 20px; font-weight: 700; }
        .subtitle { font-size: 13px; color: var(--text-dim); }

        .filter-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-select {
            background: var(--bg-sidebar); border: 1px solid var(--border); color: white;
            padding: 10px 14px; border-radius: 10px; font-size: 13px; outline: none; flex: 1; min-width: 140px;
        }

        .progress-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin-top: 12px; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: 0.5s; }

        .table-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 15px; overflow: hidden; }
        .table-wrapper { overflow-x: auto; margin: 0 -15px; padding: 0 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { padding: 12px; font-size: 11px; color: var(--text-dim); text-align: left; border-bottom: 1px solid var(--border); text-transform: uppercase; }
        td { padding: 14px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }

        .input-nilai {
            width: 60px; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 8px; padding: 6px; color: white; text-align: center; outline: none;
        }
        .input-nilai:focus { border-color: var(--primary); }

        .btn-save-all {
            position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white;
            padding: 14px 24px; border-radius: 16px; border: none; font-weight: 600; font-size: 14px;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4); display: flex; align-items: center; gap: 8px; z-index: 90;
        }

        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 600; }
        .status-sudah { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .status-belum { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
    </style>
</head>
<body>
    <div class="mobile-header">
        <a href="dashboard_guru.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div style="text-align: right;">
            <p id="userNama" style="font-size: 13px; font-weight: 600;">Nama Guru</p>
            <p id="userMapel" style="font-size: 11px; color: var(--text-dim);">Mapel -</p>
        </div>
    </div>

    <main>
        <header>
            <h1>Nilai Pelajaran</h1>
            <p class="subtitle">Kelola nilai akademik siswa sesuai mata pelajaran yang diampu.</p>
        </header>

        <div class="filter-group">
            <select class="filter-select" id="filterKelas">
                <option value="">-- Pilih Kelas --</option>
            </select>
            <select class="filter-select" id="filterJenisUjian">
                <option value="">-- Pilih Jenis Ujian --</option>
                <optgroup label="Ujian Harian">
                    <option value="Harian 1">Harian ke-1</option>
                    <option value="Harian 2">Harian ke-2</option>
                    <option value="Harian 3">Harian ke-3</option>
                    <option value="Harian 4">Harian ke-4</option>
                </optgroup>
                <optgroup label="Ujian Tengah Semester">
                    <option value="PTS Semester 1">PTS Semester 1</option>
                    <option value="PTS Semester 2">PTS Semester 2</option>
                </optgroup>
                <optgroup label="Ujian Akhir">
                    <option value="PAS">PAS (Akhir Semester)</option>
                    <option value="PAT">PAT (Akhir Tahun)</option>
                </optgroup>
            </select>
            <select class="filter-select" id="filterMapel">
                <option value="">-- Pilih Pelajaran --</option>
            </select>
        </div>

        <div id="inputSection" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div class="progress-card" style="margin-bottom: 0; flex: 1; margin-right: 20px;">
                    <div style="display:flex; justify-content:space-between; font-size:12px;">
                        <span>Progress Input Data</span>
                        <span id="progressText">0%</span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                </div>
                <button class="btn btn-primary" onclick="saveAll()" style="padding: 12px 24px; border-radius: 12px; display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-save"></i> Simpan Data Nilai
                </button>
            </div>

            <div class="table-card">
                <div class="table-wrapper">
                    <table class="responsive-table">
                        <thead>
                            <tr>
                                <th width="50px">No</th>
                                <th width="150px">NIS / NISN</th>
                                <th>Nama Siswa</th>
                                <th width="100px">Kelas</th>
                                <th width="120px">Input Nilai</th>
                            </tr>
                        </thead>
                        <tbody id="nilaiTableBody">
                            <!-- Rows will be populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="placeholderMsg" style="text-align: center; padding: 60px; color: var(--text-dim);">
            <i class="fas fa-filter" style="font-size: 40px; margin-bottom: 16px; opacity: 0.3;"></i>
            <p>Silakan pilih Kelas, Jenis Ujian, dan Mata Pelajaran untuk memulai input nilai.</p>
        </div>
    </main>

    <script>
        let currentUser = {};
        let allMapel = [];
        let students = [];
        let gradeState = {}; // nisn -> nilai

        document.addEventListener('DOMContentLoaded', async () => {
            currentUser = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userNama').textContent = currentUser.nama || 'Guru';
            document.getElementById('userMapel').textContent = currentUser.mapel || '-';
            
            await initPage();
        });

        async function initPage() {
            try {
                const [kelasData, mapelData] = await Promise.all([
                    window.db.getAllKelas(),
                    window.db.getAllMapel()
                ]);

                allMapel = mapelData;
                const filterKelas = document.getElementById('filterKelas');
                
                // Only show classes where this teacher is assigned in Manajemen Pelajaran
                const assignedClasses = new Set();
                mapelData.forEach(m => {
                    const penugasan = m.penugasan || [];
                    penugasan.forEach(p => {
                        if (p.guru === currentUser.nama) assignedClasses.add(p.kelas);
                    });
                });

                Array.from(assignedClasses).sort().forEach(className => {
                    const opt = document.createElement('option');
                    opt.value = className; opt.textContent = className;
                    filterKelas.appendChild(opt);
                });

                setupListeners();
            } catch (e) { console.error(e); }
        }

        function setupListeners() {
            const fKelas = document.getElementById('filterKelas');
            const fJenis = document.getElementById('filterJenisUjian');
            const fMapel = document.getElementById('filterMapel');

            fKelas.onchange = () => {
                updateMapelFilter();
                checkFilters();
            };
            fJenis.onchange = checkFilters;
            fMapel.onchange = checkFilters;
        }

        function updateMapelFilter() {
            const fKelas = document.getElementById('filterKelas').value;
            const fMapel = document.getElementById('filterMapel');
            fMapel.innerHTML = '<option value="">-- Pilih Pelajaran --</option>';

            if (!fKelas) return;

            const myMapels = allMapel.filter(m => {
                const penugasan = m.penugasan || [];
                return penugasan.some(p => p.guru === currentUser.nama && p.kelas === fKelas);
            });

            myMapels.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.nama; opt.textContent = m.nama;
                fMapel.appendChild(opt);
            });

            // Auto select if only one
            if (myMapels.length === 1) {
                fMapel.selectedIndex = 1;
            }
        }

        async function checkFilters() {
            const kelas = document.getElementById('filterKelas').value;
            const jenis = document.getElementById('filterJenisUjian').value;
            const mapel = document.getElementById('filterMapel').value;

            if (kelas && jenis && mapel) {
                document.getElementById('placeholderMsg').style.display = 'none';
                document.getElementById('inputSection').style.display = 'block';
                await loadStudents(kelas, mapel, jenis);
            } else {
                document.getElementById('placeholderMsg').style.display = 'block';
                document.getElementById('inputSection').style.display = 'none';
            }
        }

        async function loadStudents(kelas, mapel, jenis) {
            const tbody = document.getElementById('nilaiTableBody');
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:30px;">Memuat data siswa...</td></tr>';

            try {
                const allSiswa = await window.db.getAllSiswa();
                students = allSiswa.filter(s => s.kelas === kelas);
                
                // Fetch existing grades for this combination
                const existingNilai = await window.db.getNilaiByFilter(kelas, mapel, jenis);
                gradeState = {};
                existingNilai.forEach(n => {
                    gradeState[n.nisn] = n.nilai;
                });

                renderTable();
            } catch (e) { console.error(e); }
        }

        function renderTable() {
            const tbody = document.getElementById('nilaiTableBody');
            tbody.innerHTML = '';

            students.forEach((s, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${i + 1}</td>
                    <td>${s.nisn}</td>
                    <td style="font-weight:600;">${s.nama}</td>
                    <td><span class="badge badge-purple">${s.kelas}</span></td>
                    <td>
                        <input type="number" class="input-nilai" 
                            value="${gradeState[s.nisn] || ''}" 
                            oninput="updateState('${s.nisn}', this.value)"
                            placeholder="0-100" min="0" max="100">
                    </td>
                `;
                tbody.appendChild(tr);
            });
            updateProgress();
        }

        window.updateState = (nisn, val) => {
            gradeState[nisn] = val;
            updateProgress();
        };

        function updateProgress() {
            const total = students.length;
            const filled = Object.values(gradeState).filter(v => v !== '' && v !== null).length;
            const percent = total > 0 ? Math.round((filled / total) * 100) : 0;
            
            document.getElementById('progressText').textContent = `${percent}%`;
            document.getElementById('progressFill').style.width = `${percent}%`;
        }

        window.saveAll = async () => {
            const confirmed = confirm("Apa Sudah yakin Data yang ada masukan benar, dan tidak ada yang terlewat?");
            if (!confirmed) return;

            const kelas = document.getElementById('filterKelas').value;
            const mapel = document.getElementById('filterMapel').value;
            const jenis = document.getElementById('filterJenisUjian').value;

            const payload = students.map(s => ({
                nisn: s.nisn,
                nama: s.nama,
                kelas: kelas,
                mapel: mapel,
                jenis_ujian: jenis,
                nilai: gradeState[s.nisn] || 0
            }));

            try {
                await window.db.upsertNilai(payload);
                alert('✅ Berhasil menyimpan data nilai pelajaran.');
            } catch (e) {
                alert('❌ Gagal menyimpan data.');
                console.error(e);
            }
        };
    </script>
</body>
</html>
