<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Nilai Rapot | SAIS Guru</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { background: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; }

        .mobile-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .back-btn {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border-radius: 12px; color: white; text-decoration: none;
        }

        main { flex: 1; padding: 20px; width: 100%; max-width: 1000px; margin: 0 auto; }

        header { margin-bottom: 24px; }
        h1 { font-size: 20px; font-weight: 700; }
        .subtitle { font-size: 13px; color: var(--text-dim); }

        .filter-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-select {
            background: var(--bg-sidebar); border: 1px solid var(--border); color: white;
            padding: 10px 14px; border-radius: 10px; font-size: 13px; outline: none; flex: 1; min-width: 140px;
        }

        .progress-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin-top: 12px; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: 0.5s; }

        .table-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 15px; overflow: hidden; }
        .table-wrapper { overflow-x: auto; margin: 0 -15px; padding: 0 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { padding: 12px; font-size: 11px; color: var(--text-dim); text-align: left; border-bottom: 1px solid var(--border); text-transform: uppercase; }
        td { padding: 14px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }

        .input-nilai {
            width: 60px; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 8px; padding: 6px; color: white; text-align: center; outline: none;
        }
        .input-nilai:focus { border-color: var(--primary); }

        .btn-save-all {
            position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white;
            padding: 14px 24px; border-radius: 16px; border: none; font-weight: 600; font-size: 14px;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4); display: flex; align-items: center; gap: 8px; z-index: 90;
        }

        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 600; }
        .status-sudah { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .status-belum { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
    </style>
</head>
<body>
    <div class="mobile-header">
        <a href="dashboard_guru.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div style="text-align: right;">
            <p id="userNama" style="font-size: 13px; font-weight: 600;">Nama Guru</p>
            <p id="userMapel" style="font-size: 11px; color: var(--text-dim);">Mapel -</p>
        </div>
    </div>

    <main>
        <header>
            <h1>Input Nilai Rapot</h1>
            <p class="subtitle">Kelola nilai akademik siswa Anda.</p>
        </header>

        <div class="filter-group">
            <select class="filter-select" id="filterKelas"><option value="">Pilih Kelas</option></select>
            <select class="filter-select" id="filterMapel"><option value="">Pilih Mapel</option></select>
        </div>

        <div class="progress-card">
            <div style="display:flex; justify-content:space-between; font-size:12px;">
                <span>Progress Penginputan</span>
                <span id="progressText">0%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        </div>

        <div class="table-card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Nama Siswa</th>
                            <th>Nilai</th>
                            <th>Grade</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="nilaiTableBody">
                        <tr><td colspan="4" style="text-align:center; padding:30px; color:var(--text-dim);">Silakan pilih kelas dan mapel.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <button class="btn-save-all" onclick="saveAll()">
        <i class="fas fa-save"></i> Simpan Semua
    </button>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userNama').textContent = user.nama || 'Guru';
            document.getElementById('userMapel').textContent = user.mapel || '-';
            
            // Populate filters and load data
            await initPage();
        });

        async function initPage() {
            // Logic to load classes/mapel from DB
            const kelasList = await window.db.getAllKelas();
            const filterKelas = document.getElementById('filterKelas');
            kelasList.forEach(k => {
                const opt = document.createElement('option');
                opt.value = k.nama || k; opt.textContent = k.nama || k;
                filterKelas.appendChild(opt);
            });
        }

        window.saveAll = () => alert('Berhasil menyimpan semua nilai!');
    </script>
</body>
</html>
