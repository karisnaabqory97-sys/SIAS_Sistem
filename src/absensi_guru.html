<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Absensi Siswa | SAIS Guru</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style_guru_siswa.css">
    <style>
        :root {
            --primary: #10b981;
        }

        main { width: 100%; max-width: 1000px; margin: 0 auto; }

        .controls-card { background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .form-group label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; }
        .form-control { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 10px; padding: 10px; color: white; outline: none; font-size: 13px; }

        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .search-box { position: relative; flex: 1; margin-right: 12px; }
        .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 12px; }
        .search-box input { width: 100%; padding: 10px 12px 10px 35px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 12px; color: white; font-size: 13px; outline: none; }

        .btn-all-present { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); padding: 10px 16px; border-radius: 12px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }

        .attendance-table-card { background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 24px; overflow: hidden; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 12px 16px; font-size: 11px; color: var(--text-dim); text-align: left; border-bottom: 1px solid var(--glass-border); text-transform: uppercase; }
        td { padding: 12px 16px; border-bottom: 1px solid var(--glass-border); font-size: 13px; }

        .status-options { display: flex; gap: 4px; }
        .status-btn {
            width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.03); color: var(--text-dim); font-size: 11px;
            font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .status-btn.active.h { background: #10b981; color: white; border-color: #10b981; }
        .status-btn.active.i { background: #3b82f6; color: white; border-color: #3b82f6; }
        .status-btn.active.s { background: #f59e0b; color: white; border-color: #f59e0b; }
        .status-btn.active.a { background: #ef4444; color: white; border-color: #ef4444; }

        .save-bar { background: var(--bg-card); padding: 16px 20px; border-top: 1px solid var(--glass-border); display: flex; justify-content: center; margin-top: 20px; border-radius: 20px; }
        .btn-save { width: 100%; max-width: 400px; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
    </style>
</head>
<body data-page="absensi">
    <div id="sidebar-container"></div>

    <div class="wrapper">
        <div class="top-bar">
            <div style="display: flex; align-items: center; gap: 16px;">
                <button id="menuToggle" style="background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer; display: none;">
                    <i class="fas fa-bars"></i>
                </button>
                <a href="dashboard_guru.html" class="back-btn" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border-radius: 12px; color: white; text-decoration: none;">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h1 style="font-size: 18px; font-weight: 700;">Absensi Siswa</h1>
            </div>
            <div style="text-align: right;">
                <p id="userNama" style="font-size: 13px; font-weight: 600;">Guru</p>
                <p id="userMapel" style="font-size: 11px; color: var(--text-dim);">Mapel -</p>
            </div>
        </div>

        <main>
        <div class="controls-card">
            <div class="form-grid">
                <div class="form-group">
                    <label>Tanggal</label>
                    <input type="date" id="attDate" class="form-control">
                </div>
                <div class="form-group">
                    <label>Pertemuan Ke</label>
                    <select id="attMeeting" class="form-control">
                        <option value="1">Pertemuan Ke-1</option>
                        <option value="2">Pertemuan Ke-2</option>
                        <option value="3">Pertemuan Ke-3</option>
                        <option value="4">Pertemuan Ke-4</option>
                        <option value="5">Pertemuan Ke-5</option>
                        <option value="6">Pertemuan Ke-6</option>
                        <option value="7">Pertemuan Ke-7</option>
                        <option value="8">Pertemuan Ke-8</option>
                        <option value="9">Pertemuan Ke-9</option>
                        <option value="10">Pertemuan Ke-10</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Kelas</label>
                <select id="attKelas" class="form-control"><option value="">Pilih Kelas</option></select>
            </div>
            <div class="form-group">
                <label>Mata Pelajaran</label>
                <select id="attMapel" class="form-control"><option value="">Pilih Mapel</option></select>
            </div>
        </div>

        <div class="table-header">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="studentSearch" placeholder="Cari nama siswa...">
            </div>
            <button class="btn-all-present" onclick="markAllHadir()">Isi Semua Hadir</button>
        </div>

        <div class="attendance-table-card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th width="50px">No</th>
                            <th>Nama Siswa</th>
                            <th width="150px">Status Absen</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceBody">
                        <tr><td colspan="3" style="text-align:center; padding:40px; color:var(--text-dim);">Silakan pilih kelas terlebih dahulu.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div style="height: 100px;"></div>
    </main>

    <div class="save-bar">
        <button class="btn-save" onclick="saveAttendance()">Simpan Absensi Hari Ini</button>
    </div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
        <a href="dashboard_guru.html" class="nav-link">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="absensi_guru.html" class="nav-link active">
            <i class="fas fa-clipboard-check"></i>
            <span>Absen</span>
        </a>
        <a href="jadwal_guru.html" class="nav-link">
            <i class="fas fa-calendar-day"></i>
            <span>Jadwal</span>
        </a>
        <div class="nav-link" onclick="toggleProfile()" style="cursor: pointer;">
            <i class="fas fa-user-circle"></i>
            <span>Profil</span>
        </div>
    </div>

    </div> <!-- End Wrapper -->

    <script src="js/load-sidebar.js"></script>
    <script src="js/utils_guru_siswa.js"></script>
    <script>
        let currentSiswa = [];
        let attendanceState = {}; // nisn -> status
        let allMapel = [];

        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userNama').textContent = user.nama || 'Guru';
            document.getElementById('userMapel').textContent = user.mapel || '-';
            document.getElementById('attDate').value = new Date().toISOString().split('T')[0];

            await loadFilters();
        });

        async function loadFilters() {
            const [kelasList, mapelData] = await Promise.all([
                window.db.getAllKelas(),
                window.db.getAllMapel()
            ]);
            allMapel = mapelData;
            const currentUser = JSON.parse(localStorage.getItem('sais_current_user') || '{}');

            const selKelas = document.getElementById('attKelas');
            kelasList.forEach(k => {
                const opt = document.createElement('option');
                opt.value = k.nama || k; opt.textContent = k.nama || k;
                selKelas.appendChild(opt);
            });

            const selMapel = document.getElementById('attMapel');
            const assignedMapels = new Set();
            mapelData.forEach(m => {
                const penugasan = m.penugasan || [];
                penugasan.forEach(p => {
                    if (p.guru === currentUser.nama) assignedMapels.add(m.nama);
                });
            });
            Array.from(assignedMapels).sort().forEach(nama => {
                const opt = document.createElement('option');
                opt.value = nama; opt.textContent = nama;
                selMapel.appendChild(opt);
            });

            function checkAndLoad() {
                const kelas = selKelas.value;
                const mapel = selMapel.value;
                if (kelas && mapel) loadSiswa(kelas);
            }

            selKelas.onchange = checkAndLoad;
            selMapel.onchange = checkAndLoad;

            document.getElementById('studentSearch').addEventListener('input', (e) => renderTable(e.target.value));
        }

        async function loadSiswa(kelas) {
            try {
                const all = await window.db.getAllSiswa();
                currentSiswa = all.filter(s => s.kelas === kelas);
                attendanceState = {};
                renderTable();
            } catch (e) { console.error(e); }
        }

        function renderTable(filter = '') {
            const tbody = document.getElementById('attendanceBody');
            tbody.innerHTML = '';
            
            const filtered = currentSiswa.filter(s => s.nama.toLowerCase().includes(filter.toLowerCase()));

            filtered.forEach((s, i) => {
                const status = attendanceState[s.nisn] || '';
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${i+1}</td>
                    <td style="font-weight:600;">${s.nama}</td>
                    <td>
                        <div class="status-options">
                            <button class="status-btn h ${status==='H'?'active':''}" onclick="setStatus('${s.nisn}', 'H')">H</button>
                            <button class="status-btn i ${status==='I'?'active':''}" onclick="setStatus('${s.nisn}', 'I')">I</button>
                            <button class="status-btn s ${status==='S'?'active':''}" onclick="setStatus('${s.nisn}', 'S')">S</button>
                            <button class="status-btn a ${status==='A'?'active':''}" onclick="setStatus('${s.nisn}', 'A')">A</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.setStatus = (nisn, status) => {
            attendanceState[nisn] = status;
            renderTable(document.getElementById('studentSearch').value);
        };

        window.markAllHadir = () => {
            currentSiswa.forEach(s => attendanceState[s.nisn] = 'H');
            renderTable();
        };

        async function saveAttendance() {
            const date = document.getElementById('attDate').value;
            const meeting = document.getElementById('attMeeting').value;
            const kelas = document.getElementById('attKelas').value;
            const mapel = document.getElementById('attMapel').value;

            if (!kelas) return alert('Pilih kelas!');
            if (!mapel) return alert('Pilih mata pelajaran!');

            const records = currentSiswa.map(s => ({
                nisn: s.nisn,
                nama: s.nama,
                kelas: kelas,
                mapel: mapel,
                tanggal: date,
                pertemuan: meeting,
                status: attendanceState[s.nisn] || 'A'
            }));

            try {
                await window.db.upsertPresensi(records);
                alert('Absensi berhasil disimpan!');
            } catch (e) { alert('Gagal menyimpan absensi.'); }
        }
    </script>
</body>
</html>
