<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Kelas | SAIS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style_admin_shared.css">
    <style>
        /* Specific management styles for Kelas */
        .kelas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .kelas-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 32px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .kelas-card:hover { border-color: var(--accent); transform: translateY(-8px); }

        .kelas-icon {
            width: 56px; height: 56px;
            background: rgba(108, 99, 255, 0.1);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            color: var(--accent); font-size: 24px; font-weight: 700;
            margin-bottom: 24px;
        }

        .kelas-info h3 { font-size: 22px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.5px; }
        .kelas-info p { font-size: 14px; color: var(--text-dim); margin-bottom: 24px; }

        .kelas-stats {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 16px; margin-bottom: 28px;
            padding: 20px; background: rgba(255, 255, 255, 0.02);
            border-radius: 20px; border: 1px solid var(--border);
        }

        .stat-label { font-size: 11px; text-transform: uppercase; color: var(--text-dim); font-weight: 600; display: block; margin-bottom: 4px; }
        .stat-value { font-weight: 700; font-size: 15px; color: white; }

        .btn-action {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 10px; border-radius: 12px;
            color: var(--text-dim); font-size: 13px;
            font-weight: 500; cursor: pointer; transition: 0.3s;
        }

        .btn-action:hover { background: rgba(108, 99, 255, 0.1); color: white; border-color: var(--accent); }

        /* Modal Styles */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 32px; padding: 40px; width: 100%; max-width: 540px;
        }
        .form-control {
            width: 100%; padding: 14px 18px; border-radius: 16px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
            color: white; font-size: 14px; outline: none; transition: 0.3s;
        }
        .form-control:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.07); }
    </style>
</head>
<body data-page="kelas">
    <div id="sidebar-container"></div>

    <div class="wrapper">
        <header class="global-header">
            <div class="top-bar-left">
                <button id="menuToggle"><i class="fas fa-bars"></i></button>
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" placeholder="Cari data, menu, atau bantuan...">
                </div>
            </div>

            <div class="header-actions">
                <div class="user-profile">
                    <div class="user-info">
                        <span class="user-name" id="userName">Admin</span>
                        <span class="user-role">Administrator</span>
                    </div>
                    <div class="user-avatar" id="userInitial">A</div>
                </div>
            </div>
        </header>

        <main>
            <div class="page-header">
                <div class="header-title">
                    <h1>Manajemen Kelas</h1>
                    <p id="totalKelasText">Total 0 rombongan belajar aktif</p>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button class="btn btn-secondary" id="btnTemplate" title="Unduh format excel"><i class="fas fa-download"></i> Template</button>
                    <input type="file" id="fileUpload" accept=".xls,.xlsx,.csv" style="display: none;">
                    <button class="btn btn-secondary" id="btnUpload" title="Upload data dari excel"><i class="fas fa-upload"></i> Upload</button>
                    <button class="btn btn-success" id="btnSimpan"><i class="fas fa-sync"></i> Sinkron</button>
                    <button class="btn btn-primary" id="btnTambahKelas" style="margin-left: 12px;"><i class="fas fa-plus"></i> Tambah Kelas</button>
                </div>
            </div>

            <div class="kelas-grid" id="kelasGrid">
                <!-- Cards will be rendered here by JavaScript -->
                <p style="grid-column: 1/-1; text-align: center; color: var(--text-dim); padding: 40px;">Memuat data kelas...</p>
            </div>
        </main>
    </div>

    <!-- Modal Tambah Kelas -->
    <div class="modal-overlay" id="modalTambahKelas">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Tambah Kelas Baru</h2>
                <button class="btn-close" id="btnCloseModal" style="background:transparent; border:none; color:var(--text-dim); font-size:24px; cursor:pointer;">&times;</button>
            </div>
            <form id="formTambahKelas">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display:block; font-size:13px; color:var(--text-dim); margin-bottom:8px;">Nama Kelas</label>
                    <input type="text" id="inputNamaKelas" class="form-control" placeholder="Contoh: Kelas IX-A" required>
                </div>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display:block; font-size:13px; color:var(--text-dim); margin-bottom:8px;">Kode Kelas (Singkatan)</label>
                    <input type="text" id="inputKodeKelas" class="form-control" placeholder="Contoh: 9A" required>
                </div>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display:block; font-size:13px; color:var(--text-dim); margin-bottom:8px;">Ruang</label>
                    <input type="text" id="inputRuang" class="form-control" placeholder="Contoh: Ruang Teori 1 - Lantai 2" required>
                </div>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display:block; font-size:13px; color:var(--text-dim); margin-bottom:8px;">Wali Kelas</label>
                    <select id="inputWaliKelas" class="form-control" required>
                        <option value="" disabled selected>-- Memuat daftar guru... --</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display:block; font-size:13px; color:var(--text-dim); margin-bottom:8px;">Jumlah Siswa</label>
                    <input type="number" id="inputSiswa" class="form-control" placeholder="0" required>
                </div>
                <div class="modal-footer" style="display:flex; justify-content:flex-end; gap:12px; margin-top:32px;">
                    <button type="button" class="btn btn-secondary" id="btnBatalModal">Batal</button>
                    <button type="submit" class="btn btn-success">Simpan Kelas</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/load-sidebar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            // Load User Info
            const user = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userName').textContent = user.nama || 'Admin';
            document.getElementById('userInitial').textContent = (user.nama || 'A').charAt(0).toUpperCase();

            // Element References
            const btnTambahKelas = document.getElementById('btnTambahKelas');
            const modalTambahKelas = document.getElementById('modalTambahKelas');
            const btnCloseModal = document.getElementById('btnCloseModal');
            const btnBatalModal = document.getElementById('btnBatalModal');
            const formTambahKelas = document.getElementById('formTambahKelas');
            const kelasGrid = document.getElementById('kelasGrid');

            let kelasData = [];
            let currentEditIndex = null;

            async function fetchKelas() {
                try {
                    const data = await window.db.getAllKelas();
                    kelasData = data || [];
                } catch (e) {
                    console.error("Gagal mengambil data kelas:", e);
                    kelasData = [];
                }
                renderKelas();
            }

            function renderKelas() {
                kelasGrid.innerHTML = '';
                if (kelasData.length === 0) {
                    kelasGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-dim); padding: 40px;">Belum ada data kelas.</p>';
                    return;
                }

                kelasData.forEach((kelas, index) => {
                    const card = document.createElement('div');
                    card.className = 'kelas-card';
                    card.dataset.index = index;
                    card.innerHTML = `
                        <div class="kelas-icon">${kelas.kode || ''}</div>
                        <div class="kelas-info">
                            <h3>${kelas.nama || ''}</h3>
                            <p>${kelas.ruang || ''}</p>
                        </div>
                        <div class="kelas-stats">
                            <div class="stat-item">
                                <span class="stat-label">Wali Kelas</span>
                                <span class="stat-value">${kelas.wali || '-'}</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">Siswa</span>
                                <span class="stat-value">${kelas.siswa || 0} Orang</span>
                            </div>
                        </div>
                        <div class="card-actions" style="display: flex; gap: 8px;">
                            <button class="btn-action" style="flex: 1;" onclick="window.location.href='siswa.html?kelas=${encodeURIComponent(kelas.nama)}'">Siswa</button>
                            <button class="btn-action" style="flex: 1;" onclick="editKelas(${index})">Edit</button>
                            <button class="btn-action" style="flex: 1; color: #ef4444; border-color: rgba(239, 68, 68, 0.2);" onclick="deleteKelas(${index})">Hapus</button>
                        </div>
                    `;
                    kelasGrid.appendChild(card);
                });

                document.getElementById('totalKelasText').innerText = `Total ${kelasData.length} rombongan belajar aktif`;
            }

            // Global functions for inline onclicks
            window.editKelas = async (index) => {
                currentEditIndex = index;
                const kelas = kelasData[index];
                document.querySelector('.modal-title').innerText = 'Edit Kelas';
                document.getElementById('inputKodeKelas').value = kelas.kode || '';
                document.getElementById('inputNamaKelas').value = kelas.nama || '';
                document.getElementById('inputRuang').value = kelas.ruang || '';
                document.getElementById('inputSiswa').value = kelas.siswa || '0';
                modalTambahKelas.classList.add('active');
                await populateGuruDropdown(kelas.wali || '');
            };

            window.deleteKelas = async (index) => {
                const kelas = kelasData[index];
                if (confirm(`Hapus kelas "${kelas.nama}"?`)) {
                    try {
                        await window.db.deleteKelas(kelas.id);
                        await fetchKelas();
                    } catch (e) { alert('Gagal menghapus data.'); }
                }
            };

            async function populateGuruDropdown(selectedWali = '') {
                const selectEl = document.getElementById('inputWaliKelas');
                try {
                    const guruList = await window.db.getAllGuru();
                    selectEl.innerHTML = '<option value="">-- Pilih Wali Kelas --</option>';
                    guruList.forEach(guru => {
                        const opt = document.createElement('option');
                        opt.value = guru.nama;
                        opt.textContent = guru.nama;
                        if (guru.nama === selectedWali) opt.selected = true;
                        selectEl.appendChild(opt);
                    });
                } catch (err) { selectEl.innerHTML = '<option value="">Gagal memuat guru</option>'; }
            }

            btnTambahKelas.onclick = async () => {
                currentEditIndex = null;
                document.querySelector('.modal-title').innerText = 'Tambah Kelas Baru';
                formTambahKelas.reset();
                modalTambahKelas.classList.add('active');
                await populateGuruDropdown();
            };

            btnCloseModal.onclick = btnBatalModal.onclick = () => modalTambahKelas.classList.remove('active');

            formTambahKelas.onsubmit = async (e) => {
                e.preventDefault();
                const newData = {
                    nama: document.getElementById('inputNamaKelas').value,
                    kode: document.getElementById('inputKodeKelas').value,
                    ruang: document.getElementById('inputRuang').value,
                    wali: document.getElementById('inputWaliKelas').value,
                    siswa: parseInt(document.getElementById('inputSiswa').value) || 0
                };

                try {
                    if (currentEditIndex !== null) {
                        await window.db.updateKelas(kelasData[currentEditIndex].id, newData);
                    } else {
                        await window.db.insertKelas(newData);
                    }
                    await fetchKelas();
                    modalTambahKelas.classList.remove('active');
                } catch (err) { alert('Gagal menyimpan data.'); }
            };

            await fetchKelas();
        });
    </script>
</body>
</html>
