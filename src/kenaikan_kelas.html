<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Kenaikan Kelas | SAIS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style_admin_shared.css">
    <style>
        /* Specific management styles for Kenaikan */
        .stats-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 24px; margin-bottom: 32px;
        }
        .stat-card {
            background: var(--bg-card); border-radius: 20px;
            padding: 24px; border: 1px solid var(--border);
            text-align: center;
        }
        .stat-icon { color: var(--accent); font-size: 24px; margin-bottom: 12px; }
        .stat-value { font-size: 28px; font-weight: 700; }
        .stat-label { font-size: 12px; color: var(--text-dim); }

        .info-banner {
            background: rgba(108, 99, 255, 0.1); border: 1px solid var(--border);
            border-radius: 20px; padding: 20px; margin-bottom: 32px; display: flex; align-items: center; gap: 16px;
        }
        
        .kelas-select {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border);
            color: white; padding: 8px 12px; border-radius: 10px; font-size: 13px; outline: none;
        }
    </style>
</head>
<body data-page="kenaikan">
    <div id="sidebar-container"></div>

    <div class="wrapper">
        <header class="global-header">
            <div class="top-bar-left">
                <button id="menuToggle"><i class="fas fa-bars"></i></button>
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" placeholder="Cari data, menu, atau bantuan...">
                </div>
            </div>

            <div class="header-actions">
                <div class="user-profile">
                    <div class="user-info">
                        <span class="user-name" id="userName">Admin</span>
                        <span class="user-role">Administrator</span>
                    </div>
                    <div class="user-avatar" id="userInitial">A</div>
                </div>
            </div>
        </header>

        <main>
            <div class="page-header">
                <div class="header-title">
                    <h1>Kenaikan Kelas</h1>
                    <p>Kelola transisi jenjang pendidikan siswa.</p>
                </div>
                <div style="display: flex; gap: 12px; align-items: center;">
                    <select id="filterKelasAsal" class="kelas-select">
                        <option value="">-- Pilih Kelas Asal --</option>
                    </select>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-value" id="totalSiswa">0</div>
                    <div class="stat-label">Total Siswa</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-value" id="siapNaik">0</div>
                    <div class="stat-label">Siap Dinaikkan</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-value" id="sudahNaik">0</div>
                    <div class="stat-label">Sudah Selesai</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-graduation-cap"></i></div>
                    <div class="stat-value" id="totalLulus">0</div>
                    <div class="stat-label">Lulus Tahun Ini</div>
                </div>
            </div>

            <div class="content-card">
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>NISN</th>
                                <th>NAMA LENGKAP</th>
                                <th>KELAS ASAL</th>
                                <th>KELAS TUJUAN</th>
                                <th>STATUS</th>
                                <th>AKSI</th>
                            </tr>
                        </thead>
                        <tbody id="kenaikanTableBody">
                            <tr><td colspan="6" style="text-align: center; padding: 40px; color: var(--text-dim);">Silakan pilih kelas asal terlebih dahulu.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/load-sidebar.js"></script>
    <script>
        let allSiswa = [];
        let allKelas = [];

        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userName').textContent = user.nama || 'Admin';
            document.getElementById('userInitial').textContent = (user.nama || 'A').charAt(0).toUpperCase();

            await initPage();
        });

        async function initPage() {
            try {
                allSiswa = await window.db.getAllSiswa();
                allKelas = await window.db.getAllKelas();
                
                updateStats();
                populateFilters();
                
                document.getElementById('filterKelasAsal').onchange = (e) => renderTable(e.target.value);
            } catch (e) { console.error(e); }
        }

        function updateStats() {
            document.getElementById('totalSiswa').textContent = allSiswa.length;
            document.getElementById('siapNaik').textContent = allSiswa.filter(s => !s.kelas.includes('IX')).length;
            document.getElementById('totalLulus').textContent = allSiswa.filter(s => s.status === 'Lulus').length;
            document.getElementById('sudahNaik').textContent = allSiswa.filter(s => s.updated_at && new Date(s.updated_at).getFullYear() === new Date().getFullYear()).length;
        }

        function populateFilters() {
            const select = document.getElementById('filterKelasAsal');
            select.innerHTML = '<option value="">-- Pilih Kelas Asal --</option>';
            
            allKelas.forEach(k => {
                const opt = document.createElement('option');
                opt.value = k.nama || k;
                opt.textContent = k.nama || k;
                select.appendChild(opt);
            });
        }

        function renderTable(selectedKelas) {
            const tbody = document.getElementById('kenaikanTableBody');
            if (!selectedKelas) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: var(--text-dim);">Silakan pilih kelas asal terlebih dahulu.</td></tr>';
                return;
            }

            const filtered = allSiswa.filter(s => s.kelas === selectedKelas);
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: var(--text-dim);">Tidak ada siswa di kelas ini.</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(s => `
                <tr id="row-${s.id}">
                    <td>${s.nisn}</td>
                    <td style="font-weight:600;">${s.nama}</td>
                    <td><span class="badge" style="background:rgba(255,255,255,0.05); color:white;">${s.kelas}</span></td>
                    <td>
                        <select class="kelas-select target-kelas">
                            <option value="">Pilih Tujuan...</option>
                            ${allKelas.map(k => `<option value="${k.nama || k}">${k.nama || k}</option>`).join('')}
                            <option value="LULUS">LULUS</option>
                        </select>
                    </td>
                    <td><span class="status-label" style="color:var(--text-dim); font-size:11px;"><i class="fas fa-clock"></i> Menunggu</span></td>
                    <td>
                        <button class="btn btn-primary" style="padding: 6px 16px; font-size: 11px;" onclick="processKenaikan('${s.id}', this)">
                            <i class="fas fa-check"></i> Set
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function processKenaikan(siswaId, btn) {
            const row = btn.closest('tr');
            const targetSelect = row.querySelector('.target-kelas');
            const targetKelas = targetSelect.value;
            const statusLabel = row.querySelector('.status-label');

            if (!targetKelas) {
                alert('Silakan pilih kelas tujuan terlebih dahulu.');
                return;
            }

            const siswa = allSiswa.find(s => s.id === siswaId);
            const msg = targetKelas === 'LULUS' 
                ? `Apakah Anda yakin meluluskan ${siswa.nama}?` 
                : `Apakah Anda yakin menaikkan ${siswa.nama} ke kelas ${targetKelas}?`;

            if (!confirm(msg)) return;

            try {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

                const updateData = {
                    ...siswa,
                    kelas: targetKelas === 'LULUS' ? siswa.kelas : targetKelas,
                    status: targetKelas === 'LULUS' ? 'Lulus' : 'Aktif'
                };

                await window.db.updateSiswa(siswaId, updateData);

                // Update Local State
                const idx = allSiswa.findIndex(s => s.id === siswaId);
                allSiswa[idx] = { ...allSiswa[idx], ...updateData, updated_at: new Date().toISOString() };

                // Visual Feedback
                statusLabel.innerHTML = '<i class="fas fa-check-circle" style="color:#10b981;"></i> Berhasil';
                statusLabel.style.color = '#10b981';
                
                setTimeout(() => {
                    row.style.opacity = '0.5';
                    row.style.pointerEvents = 'none';
                    // Reset action UI if needed, or just let it stay marked
                    btn.innerHTML = '<i class="fas fa-check"></i> Set';
                    btn.style.background = 'var(--text-dim)';
                }, 1000);

                updateStats();
                alert(`Data ${siswa.nama} berhasil diperbarui!`);
            } catch (err) {
                alert('Gagal memproses kenaikan.');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check"></i> Set';
                console.error(err);
            }
        }
    </script>
</body>
</html>
</body>
</html>
