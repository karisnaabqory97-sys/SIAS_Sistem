<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Kenaikan Kelas | SAIS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style_admin_shared.css">
    <style>
        /* Specific management styles for Kenaikan */
        .stats-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 24px; margin-bottom: 32px;
        }
        .stat-card {
            background: var(--bg-card); border-radius: 20px;
            padding: 24px; border: 1px solid var(--border);
            text-align: center;
        }
        .stat-icon { color: var(--accent); font-size: 24px; margin-bottom: 12px; }
        .stat-value { font-size: 28px; font-weight: 700; }
        .stat-label { font-size: 12px; color: var(--text-dim); }

        .info-banner {
            background: rgba(108, 99, 255, 0.1); border: 1px solid var(--border);
            border-radius: 20px; padding: 20px; margin-bottom: 32px; display: flex; align-items: center; gap: 16px;
        }
        
        .kelas-select {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border);
            color: white; padding: 8px 12px; border-radius: 10px; font-size: 13px; outline: none;
        }
    </style>
</head>
<body data-page="kenaikan">
    <div id="sidebar-container"></div>

    <div class="wrapper">
        <header class="global-header">
            <div class="top-bar-left">
                <button id="menuToggle"><i class="fas fa-bars"></i></button>
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" placeholder="Cari data, menu, atau bantuan...">
                </div>
            </div>

            <div class="header-actions">
                <div class="user-profile">
                    <div class="user-info">
                        <span class="user-name" id="userName">Admin</span>
                        <span class="user-role">Administrator</span>
                    </div>
                    <div class="user-avatar" id="userInitial">A</div>
                </div>
            </div>
        </header>

        <main>
            <div class="page-header">
                <div class="header-title">
                    <h1>Kenaikan Kelas</h1>
                    <p>Kelola transisi jenjang pendidikan siswa.</p>
                </div>
                <div style="display: flex; gap: 12px;">
                    <select id="filterKelasAsal" class="kelas-select">
                        <option value="">Semua Kelas Asal</option>
                    </select>
                    <button class="btn btn-primary" onclick="alert('Mengeksekusi kenaikan...')"><i class="fas fa-check-double"></i> Eksekusi Kenaikan</button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-value" id="totalSiswa">0</div>
                    <div class="stat-label">Total Siswa</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-value" id="siapNaik">0</div>
                    <div class="stat-label">Siap Dinaikkan</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-value" id="sudahNaik">0</div>
                    <div class="stat-label">Sudah Selesai</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-graduation-cap"></i></div>
                    <div class="stat-value" id="totalLulus">0</div>
                    <div class="stat-label">Lulus Tahun Ini</div>
                </div>
            </div>

            <div class="content-card">
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>NISN</th>
                                <th>NAMA LENGKAP</th>
                                <th>KELAS ASAL</th>
                                <th>KELAS TUJUAN</th>
                                <th>STATUS</th>
                                <th>AKSI</th>
                            </tr>
                        </thead>
                        <tbody id="kenaikanTableBody">
                            <tr><td colspan="6" style="text-align: center; padding: 40px;">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/load-sidebar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userName').textContent = user.nama || 'Admin';
            document.getElementById('userInitial').textContent = (user.nama || 'A').charAt(0).toUpperCase();

            await initPage();
        });

        async function initPage() {
            try {
                const siswa = await window.db.getAllSiswa();
                const kelas = await window.db.getAllKelas();
                
                document.getElementById('totalSiswa').textContent = siswa.length;
                document.getElementById('siapNaik').textContent = siswa.filter(s => !s.kelas.includes('IX')).length;
                document.getElementById('totalLulus').textContent = siswa.filter(s => s.kelas.includes('IX')).length;

                const tbody = document.getElementById('kenaikanTableBody');
                tbody.innerHTML = siswa.slice(0, 10).map(s => `
                    <tr>
                        <td>${s.nisn}</td>
                        <td style="font-weight:600;">${s.nama}</td>
                        <td>${s.kelas}</td>
                        <td>
                            <select class="kelas-select">
                                <option value="">Pilih Tujuan...</option>
                                ${kelas.map(k => `<option value="${k.nama || k}">${k.nama || k}</option>`).join('')}
                                <option value="LULUS">LULUS</option>
                            </select>
                        </td>
                        <td><span style="color:var(--text-dim);">⏳ Menunggu</span></td>
                        <td><button class="btn btn-secondary" style="padding: 6px 12px; font-size: 11px;">Set</button></td>
                    </tr>
                `).join('');
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
