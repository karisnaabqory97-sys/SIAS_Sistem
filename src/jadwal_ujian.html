<!DOCTYPE html>
<html lang="id">
<head>
    <script src="neon-config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Jadwal Ujian | SAIS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style_admin_shared.css">
    <style>
        .filter-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .filter-select { background: var(--bg-card); border: 1px solid var(--border); color: white; padding: 10px 16px; border-radius: 12px; font-size: 13px; outline: none; cursor: pointer; }
        .filter-select:focus { border-color: var(--accent); }
        .badge-uts { background: rgba(59,130,246,0.15); color: #3b82f6; padding: 2px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; }
        .badge-uas { background: rgba(16,185,129,0.15); color: #10b981; padding: 2px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; }
        .badge-pas { background: rgba(168,85,247,0.15); color: #a855f7; padding: 2px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; }
        .badge-pat { background: rgba(249,115,22,0.15); color: #f97316; padding: 2px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; }
    </style>
</head>
<body data-page="ujian">
    <div id="sidebar-container"></div>

    <div class="wrapper">
        <header class="global-header">
            <div class="top-bar-left">
                <button id="menuToggle"><i class="fas fa-bars"></i></button>
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" id="globalSearch" placeholder="Cari data, menu, atau bantuan...">
                </div>
            </div>
            <div class="header-actions">
                <div class="user-profile">
                    <div class="user-info">
                        <span class="user-name" id="userName">Admin</span>
                        <span class="user-role">Administrator</span>
                    </div>
                    <div class="user-avatar" id="userInitial">A</div>
                </div>
            </div>
        </header>

        <main>
            <div class="page-header">
                <div class="header-title">
                    <h1>Manajemen Jadwal Ujian</h1>
                    <p id="totalText">Total 0 jadwal ujian</p>
                </div>
                <div class="filter-row">
                    <select class="filter-select" id="semesterFilter">
                        <option value="">Semua Semester</option>
                        <option value="Ganjil">Semester Ganjil</option>
                        <option value="Genap">Semester Genap</option>
                    </select>
                    <select class="filter-select" id="kelasFilter">
                        <option value="">Semua Kelas</option>
                    </select>
                    <button class="btn btn-primary" id="btnTambah"><i class="fas fa-plus"></i> Tambah Ujian</button>
                </div>
            </div>

            <div class="content-card">
                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th style="width:40px;">No</th>
                                <th>Mata Pelajaran</th>
                                <th>Jenis</th>
                                <th>Tanggal</th>
                                <th>Waktu</th>
                                <th>Ruang</th>
                                <th>Kelas</th>
                                <th>Semester</th>
                                <th style="width:100px;">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-dim);">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content" style="max-width:520px;">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Tambah Jadwal Ujian</h2>
                <button class="btn-close" id="btnCloseModal" style="background:transparent;border:none;color:var(--text-dim);font-size:24px;cursor:pointer;">&times;</button>
            </div>
            <form id="form">
                <div class="form-group" style="margin-bottom:16px;">
                    <label style="display:block;font-size:13px;color:var(--text-dim);margin-bottom:6px;">Mata Pelajaran</label>
                    <input type="text" id="inputMapel" class="form-control" placeholder="Contoh: Matematika" required>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
                    <div class="form-group">
                        <label style="display:block;font-size:13px;color:var(--text-dim);margin-bottom:6px;">Jenis</label>
                        <select id="inputJenis" class="form-control" required>
                            <option value="">-- Pilih --</option>
                            <option value="UTS">UTS</option>
                            <option value="UAS">UAS</option>
                            <option value="PAS">PAS</option>
                            <option value="PAT">PAT</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label style="display:block;font-size:13px;color:var(--text-dim);margin-bottom:6px;">Tanggal</label>
                        <input type="date" id="inputTanggal" class="form-control" required>
                    </div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
                    <div class="form-group">
                        <label style="display:block;font-size:13px;color:var(--text-dim);margin-bottom:6px;">Waktu</label>
                        <input type="text" id="inputWaktu" class="form-control" placeholder="08:00 - 10:00" required>
                    </div>
                    <div class="form-group">
                        <label style="display:block;font-size:13px;color:var(--text-dim);margin-bottom:6px;">Ruang</label>
                        <input type="text" id="inputRuang" class="form-control" placeholder="Lab Komputer" required>
                    </div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
                    <div class="form-group">
                        <label style="display:block;font-size:13px;color:var(--text-dim);margin-bottom:6px;">Kelas</label>
                        <select id="inputKelas" class="form-control" required>
                            <option value="">-- Pilih Kelas --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label style="display:block;font-size:13px;color:var(--text-dim);margin-bottom:6px;">Semester</label>
                        <select id="inputSemester" class="form-control">
                            <option value="Ganjil">Ganjil</option>
                            <option value="Genap">Genap</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer" style="display:flex;justify-content:flex-end;gap:12px;">
                    <button type="button" class="btn btn-secondary" id="btnBatal">Batal</button>
                    <button type="submit" class="btn btn-success">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/load-sidebar.js"></script>
    <script>
        let ujianData = [];
        let allKelas = [];
        let editId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userName').textContent = user.nama || 'Admin';
            document.getElementById('userInitial').textContent = (user.nama || 'A').charAt(0).toUpperCase();

            // Auto-create table if not exists (safe, IF NOT EXISTS)
            try { await fetch('/api/db', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({table:'ujian',action:'create_table'}) }); } catch(e) {}

            await loadKelas();
            await fetchData();

            document.getElementById('btnTambah').onclick = () => openModal();
            document.getElementById('btnCloseModal').onclick = document.getElementById('btnBatal').onclick = () => closeModal();
            document.getElementById('form').onsubmit = handleSave;
            document.getElementById('globalSearch').addEventListener('input', () => renderTable());
            document.getElementById('semesterFilter').onchange = () => renderTable();
            document.getElementById('kelasFilter').onchange = () => renderTable();
        });

        async function loadKelas() {
            try {
                allKelas = await window.db.getAllKelas();
                const kelasFilter = document.getElementById('kelasFilter');
                const inputKelas = document.getElementById('inputKelas');
                allKelas.forEach(k => {
                    kelasFilter.innerHTML += `<option value="${k.nama}">${k.nama}</option>`;
                    inputKelas.innerHTML += `<option value="${k.nama}">${k.nama}</option>`;
                });
            } catch (e) { console.error(e); }
        }

        async function fetchData() {
            try {
                ujianData = await window.db.getAllUjian();
            } catch (e) { console.error(e); ujianData = []; }
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const search = (document.getElementById('globalSearch').value || '').toLowerCase();
            const semester = document.getElementById('semesterFilter').value;
            const kelas = document.getElementById('kelasFilter').value;

            let filtered = ujianData;
            if (semester) filtered = filtered.filter(u => u.semester === semester);
            if (kelas) filtered = filtered.filter(u => u.kelas === kelas);
            if (search) filtered = filtered.filter(u =>
                (u.mapel || '').toLowerCase().includes(search) ||
                (u.jenis || '').toLowerCase().includes(search) ||
                (u.ruang || '').toLowerCase().includes(search) ||
                (u.kelas || '').toLowerCase().includes(search)
            );

            document.getElementById('totalText').textContent = `Total ${filtered.length} jadwal ujian`;

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-dim);">Belum ada data jadwal ujian.</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map((u, i) => {
                const badgeClass = 'badge-' + (u.jenis || '').toLowerCase();
                return `<tr>
                    <td>${i + 1}</td>
                    <td>${u.mapel || '-'}</td>
                    <td><span class="${badgeClass}">${u.jenis || '-'}</span></td>
                    <td>${u.tanggal || '-'}</td>
                    <td>${u.waktu || '-'}</td>
                    <td>${u.ruang || '-'}</td>
                    <td>${u.kelas || '-'}</td>
                    <td>${u.semester || '-'}</td>
                    <td>
                        <button class="btn-action" onclick="editData(${i})" style="padding:6px 12px;font-size:12px;"><i class="fas fa-edit"></i></button>
                        <button class="btn-action" onclick="deleteData(${i})" style="padding:6px 12px;font-size:12px;color:#ef4444;border-color:rgba(239,68,68,0.2);"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            }).join('');
        }

        function openModal(data) {
            editId = data ? data.id : null;
            document.querySelector('.modal-title').textContent = data ? 'Edit Jadwal Ujian' : 'Tambah Jadwal Ujian';
            document.getElementById('inputMapel').value = data ? data.mapel : '';
            document.getElementById('inputJenis').value = data ? data.jenis : '';
            document.getElementById('inputTanggal').value = data ? data.tanggal : '';
            document.getElementById('inputWaktu').value = data ? data.waktu : '';
            document.getElementById('inputRuang').value = data ? data.ruang : '';
            document.getElementById('inputKelas').value = data ? data.kelas : '';
            document.getElementById('inputSemester').value = data ? data.semester : 'Ganjil';
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('form').reset();
            editId = null;
        }

        window.editData = (index) => openModal(ujianData[index]);

        window.deleteData = async (index) => {
            const u = ujianData[index];
            if (!confirm(`Hapus jadwal ujian "${u.mapel}" (${u.tanggal})?`)) return;
            try {
                await window.db.deleteUjian(u.id);
                await fetchData();
            } catch (e) { alert('Gagal menghapus.'); }
        };

        async function handleSave(e) {
            e.preventDefault();
            const data = {
                mapel: document.getElementById('inputMapel').value,
                jenis: document.getElementById('inputJenis').value,
                tanggal: document.getElementById('inputTanggal').value,
                waktu: document.getElementById('inputWaktu').value,
                ruang: document.getElementById('inputRuang').value,
                kelas: document.getElementById('inputKelas').value,
                semester: document.getElementById('inputSemester').value
            };

            try {
                if (editId) {
                    await window.db.updateUjian(editId, data);
                } else {
                    await window.db.insertUjian(data);
                }
                await fetchData();
                closeModal();
            } catch (e) { alert('Gagal menyimpan.'); }
        }
    </script>
</body>
</html>
