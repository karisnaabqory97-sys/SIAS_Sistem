<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Informasi | SAIS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style_admin_shared.css">
    <style>
        /* Specific styles for Informasi */
        .status-aktif { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .status-nonaktif { background: rgba(239, 68, 68, 0.1); color: #f87171; }
        
        .action-btn {
            padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
            background: transparent; color: var(--text-dim); cursor: pointer;
            font-size: 14px; margin-right: 4px; transition: 0.3s;
        }
        .action-btn:hover { color: var(--accent); border-color: var(--accent); }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 24px; padding: 32px; width: 100%; max-width: 500px;
        }
        .form-control {
            width: 100%; background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border); border-radius: 12px; padding: 12px;
            color: white; outline: none; margin-bottom: 16px;
        }
    </style>
</head>
<body data-page="informasi">
    <div id="sidebar-container"></div>

    <div class="wrapper">
        <header class="global-header">
            <div class="top-bar-left">
                <button id="menuToggle"><i class="fas fa-bars"></i></button>
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" placeholder="Cari informasi...">
                </div>
            </div>

            <div class="header-actions">
                <div class="user-profile">
                    <div class="user-info">
                        <span class="user-name" id="userName">Admin</span>
                        <span class="user-role">Administrator</span>
                    </div>
                    <div class="user-avatar" id="userInitial">A</div>
                </div>
            </div>
        </header>

        <main>
            <div class="page-header">
                <div class="header-title">
                    <h1>Manajemen Informasi</h1>
                    <p>Kelola Pengumuman & Berita Sekolah</p>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button class="btn btn-success" id="btnSimpan">💾 Simpan</button>
                    <button class="btn btn-primary" id="openAddModal"><i class="fas fa-plus"></i> Tambah Informasi</button>
                </div>
            </div>

            <div class="content-card">
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>TANGGAL</th>
                                <th>JUDUL PENGUMUMAN</th>
                                <th>SASARAN</th>
                                <th>STATUS</th>
                                <th>AKSI</th>
                            </tr>
                        </thead>
                        <tbody id="infoTableBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Tambah/Edit Informasi -->
    <div class="modal-overlay" id="infoModal">
        <div class="modal">
            <h2 id="modalTitle" style="margin-bottom: 24px;">Tambah Informasi Baru</h2>
            <form id="infoForm">
                <label style="font-size:12px; color:var(--text-dim);">Tanggal</label>
                <input type="date" class="form-control" id="infoDate" required>
                
                <label style="font-size:12px; color:var(--text-dim);">Judul</label>
                <input type="text" class="form-control" id="infoTitle" required>
                
                <label style="font-size:12px; color:var(--text-dim);">Isi Pengumuman</label>
                <textarea class="form-control" id="infoContent" style="min-height:100px;" required></textarea>
                
                <label style="font-size:12px; color:var(--text-dim);">Sasaran</label>
                <select class="form-control" id="infoTarget">
                    <option value="Semua">Semua</option>
                    <option value="Siswa">Siswa</option>
                    <option value="Guru">Guru</option>
                </select>

                <div class="modal-footer" style="display:flex; justify-content:flex-end; gap:12px;">
                    <button type="button" class="btn btn-secondary" id="closeModal">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/load-sidebar.js"></script>
    <script>
        let allInfo = [];
        let currentEditId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userName').textContent = user.nama || 'Admin';
            document.getElementById('userInitial').textContent = (user.nama || 'A').charAt(0).toUpperCase();

            await fetchInfo();
            setupListeners();
        });

        async function fetchInfo() {
            try {
                const data = await window.db.getAllInformasi();
                allInfo = data || [];
                renderTable();
            } catch (e) { console.error(e); }
        }

        function renderTable(query = '') {
            const tbody = document.getElementById('infoTableBody');
            const filtered = allInfo.filter(i => 
                i.judul.toLowerCase().includes(query.toLowerCase()) || 
                i.isi.toLowerCase().includes(query.toLowerCase())
            );

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px;">Data tidak ditemukan.</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map((i, index) => `
                <tr>
                    <td>${i.tanggal || '-'}</td>
                    <td>
                        <div style="font-weight:600;">${i.judul}</div>
                        <div style="font-size:11px; color:var(--text-dim); margin-top:4px;">${i.isi.substring(0, 80)}...</div>
                    </td>
                    <td><span class="badge badge-purple">${i.sasaran}</span></td>
                    <td><span class="badge badge-success">Aktif</span></td>
                    <td>
                        <button class="action-btn" onclick="openEdit(${index})"><i class="fas fa-edit"></i></button>
                        <button class="action-btn" style="color:#ef4444;" onclick="deleteInfo('${i.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function setupListeners() {
            document.getElementById('openAddModal').onclick = () => {
                currentEditId = null;
                document.getElementById('modalTitle').textContent = 'Tambah Informasi Baru';
                document.getElementById('infoForm').reset();
                document.getElementById('infoModal').classList.add('active');
            };

            document.getElementById('closeModal').onclick = () => document.getElementById('infoModal').classList.remove('active');

            document.getElementById('infoForm').onsubmit = async (e) => {
                e.preventDefault();
                const data = {
                    tanggal: document.getElementById('infoDate').value,
                    judul: document.getElementById('infoTitle').value,
                    isi: document.getElementById('infoContent').value,
                    sasaran: document.getElementById('infoTarget').value,
                    kategori: 'Pengumuman' // Default
                };

                try {
                    if (currentEditId) {
                        await window.db.updateInformasi(currentEditId, data);
                    } else {
                        await window.db.insertInformasi(data);
                    }
                    await fetchInfo();
                    document.getElementById('infoModal').classList.remove('active');
                } catch (err) { alert('Gagal menyimpan.'); }
            };

            document.querySelector('.search-input').oninput = (e) => renderTable(e.target.value);
            
            document.getElementById('btnSimpan').onclick = () => alert('Seluruh perubahan data sudah tersimpan di database.');
        }

        window.openEdit = (index) => {
            const i = allInfo[index];
            currentEditId = i.id;
            document.getElementById('modalTitle').textContent = 'Edit Informasi';
            document.getElementById('infoDate').value = i.tanggal;
            document.getElementById('infoTitle').value = i.judul;
            document.getElementById('infoContent').value = i.isi;
            document.getElementById('infoTarget').value = i.sasaran;
            document.getElementById('infoModal').classList.add('active');
        };

        window.deleteInfo = async (id) => {
            if (confirm('Hapus informasi ini?')) {
                try {
                    await window.db.deleteInformasi(id);
                    await fetchInfo();
                } catch (e) { alert('Gagal menghapus.'); }
            }
        };
    </script>
</body>
</html>
