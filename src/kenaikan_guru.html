<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murid Baru & Kenaikan | SAIS Guru</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { background: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; }

        .mobile-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .back-btn {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border-radius: 12px; color: white; text-decoration: none;
        }

        main { flex: 1; padding: 20px; width: 100%; max-width: 1000px; margin: 0 auto; }

        header { margin-bottom: 24px; }
        h1 { font-size: 20px; font-weight: 700; }
        .subtitle { font-size: 13px; color: var(--text-dim); }

        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .filter-select {
            background: var(--card-bg); border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: 14px; font-size: 13px; outline: none;
        }

        .table-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 16px 20px; font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); }
        td { padding: 14px 20px; font-size: 13px; border-bottom: 1px solid var(--border); }
        tr:last-child td { border-bottom: none; }
        
        .badge-gender { padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; }
        .badge-l { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .badge-p { background: rgba(236, 72, 153, 0.1); color: #ec4899; }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
    </style>
</head>
<body>
    <div class="mobile-header">
        <a href="dashboard_guru.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div style="text-align: right;">
            <p id="userNama" style="font-size: 13px; font-weight: 600;">Nama Guru</p>
            <p id="userMapel" style="font-size: 11px; color: var(--text-dim);">Mapel -</p>
        </div>
    </div>

    <main>
        <header>
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <h1>Murid Baru & Kenaikan</h1>
                    <p class="subtitle">Data siswa berdasarkan penugasan mengajar Anda.</p>
                </div>
                <a href="dashboard_guru.html" class="btn-back-main" style="font-size: 12px; color: var(--primary); text-decoration: none; font-weight: 600;"><i class="fas fa-chevron-left"></i> Kembali</a>
            </div>
        </header>

        <div class="filter-grid">
            <select class="filter-select" id="filterLevel">
                <option value="">-- Pilih Level --</option>
            </select>
            <select class="filter-select" id="filterKelas">
                <option value="">-- Pilih Kelas --</option>
            </select>
        </div>

        <div class="table-card">
            <div class="table-wrapper" id="tableWrapper">
                <div class="empty-state">
                    <i class="fas fa-filter" style="font-size: 32px; margin-bottom: 12px; opacity: 0.3;"></i>
                    <p>Silakan pilih Level dan Kelas untuk melihat data siswa.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentUser = {};
        let myAssignments = [];
        let allSiswa = [];

        document.addEventListener('DOMContentLoaded', async () => {
            currentUser = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userNama').textContent = currentUser.nama || 'Guru';
            document.getElementById('userMapel').textContent = currentUser.mapel || '-';
            
            await initPage();
        });

        async function initPage() {
            try {
                // 1. Get assignments from Management Pelajaran
                const mapels = await window.db.getAllMapel();
                myAssignments = [];
                mapels.forEach(m => {
                    const penugasan = m.penugasan || [];
                    penugasan.forEach(p => {
                        if (p.guru === currentUser.nama) {
                            myAssignments.push(p);
                        }
                    });
                });

                // 2. Populate Level Selector
                const levelSelect = document.getElementById('filterLevel');
                const levels = [...new Set(myAssignments.map(a => a.level))].sort();
                levels.forEach(l => {
                    const opt = document.createElement('option');
                    opt.value = l; opt.textContent = l;
                    levelSelect.appendChild(opt);
                });

                // 3. Setup Listeners
                levelSelect.onchange = updateKelasFilter;
                document.getElementById('filterKelas').onchange = loadStudents;

                // 4. Preload Siswa
                allSiswa = await window.db.getAllSiswa();

            } catch (e) { console.error(e); }
        }

        function updateKelasFilter() {
            const level = document.getElementById('filterLevel').value;
            const kelasSelect = document.getElementById('filterKelas');
            kelasSelect.innerHTML = '<option value="">-- Pilih Kelas --</option>';

            if (!level) return;

            const classes = [...new Set(myAssignments.filter(a => a.level === level).map(a => a.kelas))].sort();
            classes.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.textContent = c;
                kelasSelect.appendChild(opt);
            });
            
            // Auto load if only one class
            if (classes.length === 1) {
                kelasSelect.selectedIndex = 1;
                loadStudents();
            }
        }

        async function loadStudents() {
            const kelas = document.getElementById('filterKelas').value;
            const wrapper = document.getElementById('tableWrapper');

            if (!kelas) {
                wrapper.innerHTML = `<div class="empty-state"><i class="fas fa-filter" style="font-size: 32px; margin-bottom: 12px; opacity: 0.3;"></i><p>Silakan pilih Kelas untuk melihat data siswa.</p></div>`;
                return;
            }

            const students = allSiswa.filter(s => s.kelas === kelas);

            if (students.length === 0) {
                wrapper.innerHTML = `<div class="empty-state"><i class="fas fa-user-slash" style="font-size: 32px; margin-bottom: 12px; opacity: 0.3;"></i><p>Tidak ada data siswa untuk kelas ini.</p></div>`;
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th width="150px">NIS / NISN</th>
                            <th>NAMA LENGKAP</th>
                            <th width="100px">KELAS</th>
                            <th width="120px">JENIS KELAMIN</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            students.forEach(s => {
                const gender = (s.jk || 'L').toUpperCase();
                html += `
                    <tr>
                        <td style="font-weight: 600;">${s.nisn}</td>
                        <td style="font-weight: 500;">${s.nama}</td>
                        <td><span style="color: var(--primary); font-weight: 600;">${s.kelas}</span></td>
                        <td><span class="badge-gender badge-${gender.toLowerCase()}">${gender === 'L' ? 'LAKI-LAKI' : 'PEREMPUAN'}</span></td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            wrapper.innerHTML = html;
        }
    </script>
</body>
</html>
</body>
</html>
