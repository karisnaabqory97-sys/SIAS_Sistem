<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Konfigurasi Database Neon -->
    <script src="neon-config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murid Baru & Kenaikan | SAIS Guru</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { background: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; }

        .mobile-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .back-btn {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border-radius: 12px; color: white; text-decoration: none;
        }

        main { flex: 1; padding: 20px; width: 100%; max-width: 800px; margin: 0 auto; }

        header { margin-bottom: 24px; }
        h1 { font-size: 20px; font-weight: 700; }
        .subtitle { font-size: 13px; color: var(--text-dim); }

        .class-section { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; margin-bottom: 20px; overflow: hidden; }
        .class-header { padding: 16px 20px; background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .class-badge { background: var(--primary); color: white; padding: 4px 12px; border-radius: 8px; font-size: 14px; font-weight: 700; }
        
        .student-list { padding: 0; list-style: none; }
        .student-item { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .student-item:last-child { border-bottom: none; }
        .student-name { font-size: 14px; font-weight: 500; }
        .student-meta { font-size: 11px; color: var(--text-dim); }
        
        .status-pill { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: rgba(16, 185, 129, 0.1); color: #10b981; }
    </style>
</head>
<body>
    <div class="mobile-header">
        <a href="dashboard_guru.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div style="text-align: right;">
            <p id="userNama" style="font-size: 13px; font-weight: 600;">Nama Guru</p>
            <p id="userMapel" style="font-size: 11px; color: var(--text-dim);">Mapel -</p>
        </div>
    </div>

    <main>
        <header>
            <h1>Murid Baru & Kenaikan</h1>
            <p class="subtitle">Daftar siswa yang masuk ke kelas Anda.</p>
        </header>

        <div id="classContainer">
            <!-- Populated by JS -->
            <p style="text-align: center; padding: 40px; color: var(--text-dim);">Memuat data siswa...</p>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = JSON.parse(localStorage.getItem('sais_current_user') || '{}');
            document.getElementById('userNama').textContent = currentUser.nama || 'Guru';
            document.getElementById('userMapel').textContent = currentUser.mapel || '-';
            
            renderStudents();
        });

        function renderStudents() {
            const container = document.getElementById('classContainer');
            // Mock data for teacher's incoming students
            const data = [
                { kelas: 'VIII-A', students: [
                    { nama: 'Ahmad Fauzi', asal: 'VII-A' },
                    { nama: 'Citra Lestari', asal: 'VII-A' }
                ]}
            ];

            container.innerHTML = data.map(c => `
                <div class="class-section">
                    <div class="class-header">
                        <div class="class-badge">${c.kelas}</div>
                        <span style="font-size: 12px; color: var(--text-dim);">${c.students.length} Siswa</span>
                    </div>
                    <div class="student-list">
                        ${c.students.map(s => `
                            <div class="student-item">
                                <div>
                                    <div class="student-name">${s.nama}</div>
                                    <div class="student-meta">Asal: Kelas ${s.asal}</div>
                                </div>
                                <span class="status-pill">Dinaikkan</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
