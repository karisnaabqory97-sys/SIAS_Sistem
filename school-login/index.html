<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SAIS - Sistem Informasi SMP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../src/supabase-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text-main);
        }

        /* Subtle animated background shapes */
        .shape {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            border-radius: 50%;
        }
        .shape-1 {
            width: 300px;
            height: 300px;
            background: rgba(37, 99, 235, 0.2);
            top: -100px;
            right: -50px;
        }
        .shape-2 {
            width: 400px;
            height: 400px;
            background: rgba(37, 99, 235, 0.15);
            bottom: -150px;
            left: -100px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: var(--primary);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 24px;
            font-weight: 700;
            color: white;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.4);
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 14px;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-dim);
            margin-bottom: 8px;
            margin-left: 4px;
        }

        input, select {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        select option {
            background: #1e293b;
            color: white;
        }

        .input-wrapper {
            position: relative;
        }

        input[type="password"] {
            padding-right: 44px;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            cursor: pointer;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: white;
        }

        .forgot-password {
            text-align: right;
            margin-top: -12px;
            margin-bottom: 24px;
        }

        .forgot-password a {
            color: var(--primary);
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .forgot-password a:hover {
            color: white;
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-dim);
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
        }

        button.login-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button.login-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        button.login-btn:active {
            transform: translateY(0);
        }

        /* Success/Loading state styles */
        .loading .login-btn {
            pointer-events: none;
            opacity: 0.8;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading .spinner {
            display: block;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin-bottom: 24px;
            color: var(--text-dim);
            font-size: 12px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--glass-border);
        }

        .divider:not(:empty)::before { margin-right: .75em; }
        .divider:not(:empty)::after { margin-left: .75em; }

        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .social-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 10px;
            color: white;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .demo-info {
            margin-top: 32px;
            background: rgba(37, 99, 235, 0.05);
            border: 1px solid rgba(37, 99, 235, 0.2);
            border-radius: 16px;
            padding: 16px;
            font-size: 11px;
        }

        .demo-info h4 {
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .demo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            color: var(--text-dim);
        }

        .demo-item b {
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="login-container">
        <div class="login-card" id="loginCard">
            <div class="logo-section">
                <div class="logo-icon">S</div>
                <h1>SAIS</h1>
                <p class="subtitle">Sistem Informasi SMP</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="role">Masuk Sebagai</label>
                    <select id="role" required>
                        <option value="siswa">Siswa / Orang Tua</option>
                        <option value="guru">Guru Mapel / Wali Kelas</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="email">Email atau NISN</label>
                    <input type="text" id="email" placeholder="contoh@smp.sch.id" required>
                </div>

                <div class="form-group">
                    <label for="password">Kata Sandi</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                </div>

                <div class="options">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span>Ingat Saya</span>
                    </label>
                    <div class="forgot-password">
                        <a href="#">Lupa kata sandi?</a>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="submitBtn">
                    <div class="spinner"></div>
                    <span id="btnText">Masuk ke Sistem</span>
                </button>
            </form>

            <div class="divider">atau lanjut dengan</div>

            <div class="social-login">
                <button class="social-btn">Google</button>
                <button class="social-btn">Apple</button>
            </div>

            <div class="demo-info">
                <h4>Akun Demo (Default)</h4>
                <div class="demo-grid">
                    <div class="demo-item">
                        <p><b>Admin:</b></p>
                        <p>User: admin</p>
                        <p>Pass: admin123</p>
                    </div>
                    <div class="demo-item">
                        <p><b>Guru:</b></p>
                        <p>User: guru</p>
                        <p>Pass: guru123</p>
                    </div>
                    <div class="demo-item">
                        <p><b>Siswa:</b></p>
                        <p>User: siswa</p>
                        <p>Pass: siswa123</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Toggle Password Visibility
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });

        // Login Form Handler
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const role = document.getElementById('role').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const card = document.getElementById('loginCard');

            // Toggle loading state
            card.classList.add('loading');
            document.getElementById('btnText').innerText = 'Memverifikasi...';

            if (window.isSupabaseConfigured && window.isSupabaseConfigured()) {
                try {
                    // Authenticate with Supabase Auth
                    const { data, error } = await window.supabaseClient.auth.signInWithPassword({
                        email: email,
                        password: password
                    });

                    if (error) throw error;

                    // Fetch profile role from public.profiles
                    const { data: profile, error: profileError } = await window.supabaseClient
                        .from('profiles')
                        .select('role')
                        .eq('id', data.user.id)
                        .single();

                    if (profileError || !profile) {
                        throw new Error("Profil pengguna tidak ditemukan atau tidak memiliki hak akses.");
                    }

                    const userRole = profile.role;

                    // Validate role matches dropdown or redirect automatically
                    if (userRole === 'siswa') {
                        window.location.href = '../src/dashboard_siswa.html';
                    } else if (userRole === 'guru') {
                        window.location.href = '../src/dashboard_guru.html';
                    } else if (userRole === 'admin') {
                        window.location.href = '../src/dashboard.html';
                    } else {
                        throw new Error("Peran pengguna tidak dikenali.");
                    }

                } catch (err) {
                    card.classList.remove('loading');
                    document.getElementById('btnText').innerText = 'Masuk ke Sistem';
                    alert('Login Gagal: ' + err.message);
                }
            } else {
                // Simulate API call with role-based routing (Offline Fallback Mode)
                setTimeout(() => {
                    if (role === 'siswa') {
                        window.location.href = '../src/dashboard_siswa.html';
                    } else if (role === 'guru') {
                        window.location.href = '../src/dashboard_guru.html';
                    } else {
                        window.location.href = '../src/dashboard.html';
                    }
                }, 1000);
            }
        });
    </script>
</body>
</html>
